// ── AI abstraction layer ──────────────────────
function getAIConfig() {
  const provider = localStorage.getItem(LS.ai_provider) || 'anthropic';
  const defaults = AI_DEFAULTS[provider] || AI_DEFAULTS.anthropic;
  return {
    provider,
    apiKey:  localStorage.getItem(LS.apikey)    || '',
    model:   localStorage.getItem(LS.ai_model)  || defaults.model,
    baseurl: localStorage.getItem(LS.ai_baseurl)|| defaults.baseurl
  };
}

async function callAI(prompt, maxTokens = 400, useWebSearch = false) {
  const cfg = getAIConfig();
  if (!cfg.apiKey && cfg.provider !== 'ollama') throw new Error('No API key configured. Add one in Setup → AI Settings.');

  if (cfg.provider === 'anthropic') {
    const body = { model: cfg.model, max_tokens: maxTokens, messages: [{ role:'user', content: prompt }] };
    if (useWebSearch) body.tools = [{ type:'web_search_20250305', name:'web_search' }];
    const res = await fetch(`${cfg.baseurl}/v1/messages`, {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-api-key': cfg.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return data.content?.map(b => b.text || '').join('') || '';

  } else if (cfg.provider === 'openai' || cfg.provider === 'custom') {
    const res = await fetch(`${cfg.baseurl}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${cfg.apiKey}` },
      body: JSON.stringify({ model: cfg.model, max_tokens: maxTokens, messages: [{ role:'user', content: prompt }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return data.choices?.[0]?.message?.content || '';

  } else if (cfg.provider === 'ollama') {
    const res = await fetch(`${cfg.baseurl}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ model: cfg.model, prompt, stream: false })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.response || '';
  }
  throw new Error(`Unknown provider: ${cfg.provider}`);
}

// ── Static warmth-tier templates ─────────────
function getStaticTemplate(warmthTier, contact, profile) {
  const firstName = (contact.name || '').split(' ')[0];
  const company   = contact.company || 'your company';
  const target    = (profile?.target || 'a product role').split(',')[0].trim();
  const myName    = profile?.name || '';
  const myLevel   = profile?.currentLevel || 'product professional';

  const T = {
    recommender: `Hi ${firstName},\n\nThank you again for the recommendation — it genuinely meant a lot.\n\nI'm actively exploring ${target} opportunities and ${company} is high on my list. Given your experience there, I'd love your honest perspective on the team and what it takes to succeed.\n\nWould you be open to a quick call? Happy to work around your schedule.`,
    'close-colleague': `Hi ${firstName},\n\nHope things are going well at ${company}!\n\nI'm actively looking at ${target} roles and your team came up as a natural fit. Given our time together, I'd value your honest take — any open roles or people I should speak with?\n\nWorth a quick catch-up?`,
    colleague: `Hi ${firstName},\n\nGreat to have stayed connected since our time together.\n\nI'm exploring ${target} opportunities and ${company} stood out. Would you be open to sharing your perspective on the team and culture?\n\nEven 15 minutes would be really helpful.`,
    'active-contact': `Hi ${firstName},\n\nPicking up from our last exchange — I'm actively looking at ${target} roles and ${company} is high on my list.\n\nAny open positions on your radar, or someone I should speak with?\n\nAppreciate any steer.`,
    known: `Hi ${firstName},\n\nWe connected a while back — I'm ${myName}, a ${myLevel}.\n\nI'm exploring ${target} opportunities and ${company} stood out as a strong fit. Would you be open to a short chat?\n\nNo pressure either way — appreciate your time.`,
    'warm-unknown': `Hi ${firstName},\n\nI've been following ${company}'s work and came across your profile.\n\nI'm a ${myLevel} exploring ${target} roles — your team looks like a strong fit for what I'm looking for. Would you be open to a 15-minute conversation?\n\nHappy to share more context if helpful.`,
    cold: `Hi ${firstName},\n\nI'm ${myName}, a ${myLevel} exploring ${target} opportunities.\n\nYour work at ${company} caught my attention and I'd be grateful for 15 minutes to learn more about the team.\n\nWould that be possible?`
  };
  return T[warmthTier] || T.cold;
}

// ── Referral ask template (second message after contact replies) ──
function getReferralAskTemplate(contact, profile, roleHint) {
  const firstName = (contact.name || '').split(' ')[0];
  const company   = contact.company || 'your company';
  const target    = (profile?.target || 'a product role').split(',')[0].trim();
  const myName    = profile?.name || '';
  const roleRef   = roleHint && !isUrl(roleHint) ? roleHint
    : roleHint && isUrl(roleHint) ? `the role I shared`
    : `a ${target} role`;
  const linkLine  = roleHint && isUrl(roleHint) ? `\n\nHere's the link if helpful: ${roleHint}` : '';

  return `Hi ${firstName},\n\nThanks for getting back to me — really appreciate it.\n\nI'm formally applying for ${roleRef} at ${company}. If you'd be open to referring me through your internal system, it would make a real difference — referrals typically move much faster through the process.\n\nNo obligation at all if it's not something you're comfortable with, but I'd be grateful if you are.${linkLine}\n\nThanks again,\n${myName}`;
}

async function generateMessage(idx) {
  const c = state.contacts[idx];
  if (!c) return;
  const cfg = getAIConfig();

  const roleHint = (document.getElementById(`role-input-${idx}`)?.value || '').trim();
  const spinner  = document.getElementById(`gen-spinner-${idx}`);
  const ta       = document.getElementById(`msg-ta-${idx}`);

  // No AI configured — use static template
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    const scored = smartScore(c, state);
    let tmpl = getStaticTemplate(scored.warmthTier, c, state.profile);
    if (isUrl(roleHint)) tmpl += `\n\nRole I had in mind: ${roleHint}`;
    if (ta) ta.value = tmpl;
    state.contacts[idx]._draftMsg = tmpl;
    setDrawerStatus(idx, 'Template applied — edit before sending.', 'info');
    return;
  }

  if (spinner) spinner.classList.remove('hidden');
  setDrawerStatus(idx, 'Generating…', 'info');

  const scored  = smartScore(c, state);
  const toneMap = {
    'recommender':    { tone: 'Warm, personal, first-name, casual. Reference the recommendation.', opening: 'Reference something specific from their recommendation text or shared project.' },
    'close-colleague':{ tone: 'Casual, warm, first-name. Many messages exchanged.', opening: 'Specific shared memory, project, or inside reference. Not "hope you\'re well".' },
    'colleague':      { tone: 'Warm, collegial, peer-to-peer.', opening: 'Reference the specific company or project worked on together.' },
    'active-contact': { tone: 'Friendly, direct. Skip formalities entirely.', opening: 'Acknowledge prior contact, get to the point fast.' },
    'known':          { tone: 'Professional but human. Establish the connection anchor.', opening: 'One sentence on how you know each other, then the point.' },
    'warm-unknown':   { tone: 'Professional, peer-to-peer. Specific hook.', opening: 'Lead with something specific about their company, role, or recent work.' },
    'cold':           { tone: 'Formal but not stiff. Short, respectful of their time.', opening: 'Reference something very specific about their company or problem space.' }
  };
  const tone = toneMap[scored.warmthTier] || toneMap['cold'];
  const profile = state.profile;

  const prompt = `You are writing a LinkedIn direct message on behalf of ${profile.name || 'the user'}.

USER'S BACKGROUND:
${profile.bg || 'Senior product professional'}
Headline: ${profile.headline || ''}
Target roles: ${profile.target || ''}
Top skills: ${(profile.topSkills || []).slice(0,5).join(', ')}

CONTACT INTELLIGENCE:
Name: ${c.name}
Current role: ${c.role || ''}
Company: ${c.company || ''}
Relationship: ${c.relationship || ''}
Messages exchanged historically: ${scored.msgCount}
Warmth tier: ${scored.warmthTier}
Grade: ${scored.grade}
Signals: ${scored.reasons.join(', ')}

TARGET ROLE: ${roleHint || 'a product platform role at ' + (c.company || 'their company')}
${isUrl(roleHint) ? `JOB LINK: ${roleHint}` : ''}

TONE: ${tone.tone}
OPENING: ${tone.opening}

RULES:
- Under 130 words total
- 3–4 short paragraphs
- Do NOT use: "hope this message finds you well", "I am passionate about", "synergy", "leverage", "circle back", "reach out", "I came across your profile"
- Do NOT start with "Hi [name], I hope..."
- If a job link is provided, include it naturally in the message (e.g. "I spotted this role: <link>")
- End with a no-pressure close
- Output ONLY the message text — no subject line, no preamble, no explanation`;

  try {
    const msg = await callAI(prompt, 400);
    if (ta) ta.value = msg;
    state.contacts[idx]._draftMsg = msg;
    setDrawerStatus(idx, 'Message generated ✓', 'success');
  } catch(e) {
    // Fallback to static template on any AI error
    let tmpl = getStaticTemplate(scored.warmthTier, c, state.profile);
    if (isUrl(roleHint)) tmpl += `\n\nRole I had in mind: ${roleHint}`;
    if (ta) ta.value = tmpl;
    state.contacts[idx]._draftMsg = tmpl;
    const isCors = e.message?.includes('Failed to fetch') || e.message?.includes('CORS');
    const errMsg = isCors
      ? 'AI unavailable (CORS — use launch.command). Template loaded instead.'
      : `AI error: ${e.message}. Template loaded instead.`;
    setDrawerStatus(idx, errMsg, 'warn');
  } finally {
    if (spinner) spinner.classList.add('hidden');
  }
}

function setDrawerStatus(idx, msg, type) {
  const el = document.getElementById(`drawer-status-${idx}`);
  if (!el) return;
  const colors = { success:'var(--teal)', error:'var(--red)', warn:'var(--amber)', info:'var(--muted)' };
  el.style.color = colors[type] || colors.info;
  el.textContent = msg;
}

function copyMessage(idx) {
  const ta = document.getElementById(`msg-ta-${idx}`);
  if (!ta?.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    setDrawerStatus(idx, 'Copied to clipboard ✓', 'success');
  }).catch(() => {
    ta.select();
    document.execCommand('copy');
    setDrawerStatus(idx, 'Copied ✓', 'success');
  });
}

function copyRefAsk(idx) {
  const ta = document.getElementById(`ref-ask-ta-${idx}`);
  if (!ta?.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const el = document.getElementById(`ref-ask-status-${idx}`);
    if (el) { el.style.color='var(--teal)'; el.textContent='Copied ✓'; }
  }).catch(() => { ta.select(); document.execCommand('copy'); });
  // persist the current textarea text
  if (state.contacts[idx]) {
    state.contacts[idx]._refAskMsg = ta.value;
    saveContacts();
  }
}

async function regenerateRefAsk(idx) {
  const c = state.contacts[idx];
  if (!c) return;
  const ta = document.getElementById(`ref-ask-ta-${idx}`);
  const statusEl = document.getElementById(`ref-ask-status-${idx}`);
  const roleHint = (document.getElementById(`role-input-${idx}`)?.value || c.savedRole || '').trim();
  const cfg = getAIConfig();

  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    const tmpl = getReferralAskTemplate(c, state.profile, roleHint);
    if (ta) ta.value = tmpl;
    c._refAskMsg = tmpl;
    saveContacts();
    if (statusEl) { statusEl.style.color='var(--muted)'; statusEl.textContent='Template applied.'; }
    return;
  }

  if (statusEl) { statusEl.style.color='var(--muted)'; statusEl.textContent='Generating…'; }
  const profile = state.profile;
  const prompt = `Write a short LinkedIn follow-up message from ${profile.name || 'the user'} (${profile.currentLevel || 'senior professional'}) to ${c.name} at ${c.company || 'their company'} asking for a formal referral. The contact has already replied to a previous outreach. Keep it concise, grateful, and human — not salesy. ${roleHint && !isUrl(roleHint) ? `The role is: ${roleHint}.` : ''} ${roleHint && isUrl(roleHint) ? `Include this job link: ${roleHint}.` : ''} Under 120 words. No subject line.`;
  try {
    const result = await callAI(prompt, 300);
    if (ta) ta.value = result.trim();
    c._refAskMsg = result.trim();
    saveContacts();
    if (statusEl) { statusEl.style.color='var(--teal)'; statusEl.textContent='Generated ✓'; }
  } catch(e) {
    const tmpl = getReferralAskTemplate(c, state.profile, roleHint);
    if (ta) ta.value = tmpl;
    c._refAskMsg = tmpl;
    saveContacts();
    if (statusEl) { statusEl.style.color='var(--muted)'; statusEl.textContent='Used template (AI error).'; }
  }
}

function logAsSent(idx) {
  const c = state.contacts[idx];
  if (!c) return;
  const ta       = document.getElementById(`msg-ta-${idx}`);
  const roleInput= document.getElementById(`role-input-${idx}`);
  const msg      = ta?.value || '';
  const role     = roleInput?.value?.trim() || '';

  c.status        = 'Message sent';
  c.lastContacted = new Date().toISOString().slice(0,10);
  if (role) c.savedRole = role;
  if (msg) {
    const preview = msg.slice(0,120) + (msg.length > 120 ? '…' : '');
    c.notes = (c.notes ? c.notes + '\n' : '') + `[${c.lastContacted}] ${preview}`;
  }
  saveContacts();
  updateNavCounts();
  setDrawerStatus(idx, 'Logged as sent ✓', 'success');
  // refresh the grade/status badge on the card without closing the drawer
  const nameRow = document.querySelector(`#card-${idx} .contact-name-row`);
  if (nameRow) {
    const badges = nameRow.querySelectorAll('.badge');
    badges.forEach(b => b.remove());
    nameRow.insertAdjacentHTML('beforeend', gradeBadge(c.grade) + statusBadge(c.status));
  }
}

async function loadCompanyIntel(idx) {
  const c = state.contacts[idx];
  if (!c || !c.company) return;
  const cfg = getAIConfig();
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    const row = document.getElementById(`intel-row-${idx}`);
    if (row) row.innerHTML = `<span style="color:var(--red);font-size:12px">Add an AI provider in Setup to load intel.</span>`;
    return;
  }

  // Show loading state on all open drawers for the same company
  const key = coKey(c.company);
  state.contacts.forEach((ct, i) => {
    if (coKey(ct.company) === key) {
      const btn = document.getElementById(`intel-btn-${i}`);
      if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    }
  });

  const prompt = `What do you know about "${c.company}" as a place to work?
Return ONLY a JSON object:
{"glassdoorRating":number_or_null,"salaryRange":"e.g. ₹35-55L for Staff PM or null","reviewSentiment":"one sentence or null"}
No other text. Use null for unknown fields.`;

  try {
    // Try with web search first (Anthropic only), fall back to plain
    let text = '';
    try {
      text = await callAI(prompt, 300, cfg.provider === 'anthropic');
    } catch(e2) {
      text = await callAI(prompt, 300, false);
    }
    // Extract JSON from response (model may wrap it in prose)
    const match = text.match(/\{[\s\S]*\}/);
    const intel = match ? JSON.parse(match[0]) : {};
    intel.fetchedAt = new Date().toISOString();

    // Write to shared cache (not per-contact)
    state.COMPANY_INTEL[key] = intel;
    saveCompanyIntel();

    // Refresh all open drawers for contacts at this company
    state.contacts.forEach((ct, i) => {
      if (coKey(ct.company) === key) renderDrawerContent(i);
    });
    // Refresh any open application card too
    renderApplicationsTab();
  } catch(e) {
    state.contacts.forEach((ct, i) => {
      if (coKey(ct.company) === key) {
        const row = document.getElementById(`intel-row-${i}`);
        if (row) row.innerHTML = `
          <span style="color:var(--red);font-size:12px">Failed: ${h(e.message)}</span>
          <button class="btn btn-secondary btn-sm" onclick="loadCompanyIntel(${i})">Retry</button>`;
      }
    });
  }
}

// SECTION 9 · Batch grade reviewer
// ─────────────────────────────────────────────
function openGradeReviewer() {
  const modal = document.getElementById('grade-review-modal');
  const candidates = [...state.contacts]
    .map((c, i) => ({ c, i }))
    .filter(({ c }) => (c.score || 0) > 0)
    .sort((a, b) => (b.c.score || 0) - (a.c.score || 0))
    .slice(0, 80);

  let rows = candidates.map(({ c, i }) => `
    <tr>
      <td>${h(c.name)}</td>
      <td style="color:var(--muted)">${h(c.company || '—')}</td>
      <td>${gradeBadge(c.grade)}</td>
      <td>${gradeBadge(smartScore(c, state).grade)}</td>
      <td>
        <select class="grade-select-inline" data-idx="${i}">
          <option value="" selected>— keep —</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
      </td>
    </tr>`).join('');

  modal.innerHTML = `<div class="modal-card">
    <div class="modal-title">Smart grade review</div>
    <div class="modal-sub">Top ${candidates.length} contacts by score. Override grades or accept suggestions.</div>
    <table class="reviewer-table">
      <thead><tr>
        <th>Name</th><th>Company</th><th>Current</th><th>Suggested</th><th>Override</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeGradeReviewer()">Cancel</button>
      <button class="btn btn-secondary" onclick="acceptAllGrades()">Accept all suggested</button>
      <button class="btn btn-primary" onclick="saveGradeOverrides()">Save changes</button>
    </div>
  </div>`;
  modal.style.display = 'flex';
}

function closeGradeReviewer() {
  document.getElementById('grade-review-modal').style.display = 'none';
}

function acceptAllGrades() {
  state.contacts.forEach((c, i) => {
    const suggested = smartScore(c, state).grade;
    state.contacts[i].grade = suggested;
  });
  saveContacts();
  updateNavCounts();
  closeGradeReviewer();
  renderContactsTab();
}

function saveGradeOverrides() {
  const selects = document.querySelectorAll('#grade-review-modal [data-idx]');
  selects.forEach(sel => {
    const idx = parseInt(sel.dataset.idx, 10);
    const val = sel.value;
    if (val && state.contacts[idx]) {
      state.contacts[idx].grade  = val;
      state.contacts[idx].source = 'manual';
    }
  });
  saveContacts();
  updateNavCounts();
  closeGradeReviewer();
  renderContactsTab();
}

function toggleAddForm() {
  const form  = document.getElementById('add-contact-form');
  const arrow = document.getElementById('add-form-arrow');
  if (!form) return;
  const open = form.classList.toggle('open');
  if (arrow) arrow.textContent = open ? '▼' : '▶';
}

function saveManualContact() {
  const name = (document.getElementById('cf-name')?.value || '').trim();
  if (!name) { alert('Name is required.'); return; }
  const company  = document.getElementById('cf-company')?.value?.trim() || '';
  const position = document.getElementById('cf-role')?.value?.trim()    || '';
  const rel      = document.getElementById('cf-rel')?.value?.trim()     || 'Manual entry';
  const grade    = document.getElementById('cf-grade')?.value           || 'B';
  const status   = document.getElementById('cf-status')?.value          || 'Not contacted';
  const url      = document.getElementById('cf-url')?.value?.trim()     || '';
  const notes    = document.getElementById('cf-notes')?.value?.trim()   || '';
  const role     = [position, company].filter(Boolean).join(', ');

  const scored = smartScore({ name, company, position, url, notes, connectedOn: null }, state);

  const contact = {
    name, company, position, role, relationship: rel,
    grade, score: scored.score, gradeReasons: scored.reasons,
    warmthTier: scored.warmthTier, msgCount: scored.msgCount,
    status, notes, url, connectedOn: '',
    source: 'manual', lastContacted: null, savedRole: ''
  };

  state.contacts.unshift(contact);
  saveContacts();
  updateNavCounts();
  importBanner = { msg: `${name} added.`, type: 'success' };
  renderContactsTab();
}

function updateContactGrade(idx, grade) {
  if (!state.contacts[idx]) return;
  state.contacts[idx].grade = grade;
  state.contacts[idx].source = 'manual';
  saveContacts();
  updateNavCounts();
  renderContactsList();
}

function updateContactStatus(idx, status) {
  if (!state.contacts[idx]) return;
  state.contacts[idx].status = status;
  if (status !== 'Not contacted' && !state.contacts[idx].lastContacted) {
    state.contacts[idx].lastContacted = new Date().toISOString().slice(0,10);
  }
  saveContacts();
  updateNavCounts();
  renderContactsList();
}

// ─────────────────────────────────────────────
// SECTION 3 · Scoring engine  (exact from spec)
// ─────────────────────────────────────────────
function smartScore(contact, archiveData) {
  const { MSG_LOOKUP, RECOMMENDERS, POSITIONS_DATA, COMPANY_FOLLOWS, TARGET_COS } = archiveData;

  const co      = (contact.company || '').toLowerCase();
  const pos     = (contact.position || contact.role || '').toLowerCase();
  const name    = (contact.name || '').toLowerCase();
  const connDate = contact.connectedOn ? new Date(contact.connectedOn) : null;
  const urlSlug  = ((contact.url || '').split('/in/')[1] || '').replace(/\/$/, '').split('/')[0].toLowerCase();

  let score = 0;
  const reasons = [];

  // Signal 1: Message history
  const msgData  = urlSlug ? MSG_LOOKUP[urlSlug] : null;
  const msgCount = msgData ? msgData.c : 0;
  if      (msgCount >= 20) { score += 55; reasons.push(`${msgCount} messages exchanged`); }
  else if (msgCount >= 10) { score += 40; reasons.push(`${msgCount} messages`); }
  else if (msgCount >= 5)  { score += 28; reasons.push(`${msgCount} messages`); }
  else if (msgCount >= 2)  { score += 15; reasons.push('messaged before'); }

  // Signal 2: Wrote a recommendation
  const isRec = RECOMMENDERS.some(r => {
    const parts = r.toLowerCase().split(' ');
    return parts[0] && name.includes(parts[0]) && (parts[1] ? name.includes(parts[1]) : true);
  });
  if (isRec) { score += 50; reasons.push('wrote you a recommendation'); }

  // Signal 3: At a target company (exclude user's current company)
  const currentCo = (archiveData.profile?.currentCompany || '').toLowerCase().trim();
  const isCurrentCo = currentCo && co.includes(currentCo);
  if (!isCurrentCo && TARGET_COS.some(t => co.includes(t))) { score += 40; reasons.push('at target company'); }

  // Signal 4: PM or product title
  const pmTitles = ['product manager','head of product','vp product','director of product',
    'chief product','group pm','principal pm','staff pm','cpo',' pm ','pm,'];
  if (pmTitles.some(t => pos.includes(t))) { score += 35; reasons.push('product role'); }

  // Signal 5: Exact tenure overlap
  const careerPeriods = POSITIONS_DATA.map(p => ({
    co: p.co.toLowerCase(),
    display: p.co_display,
    from: new Date(p.from),
    to: new Date(p.to)
  }));

  if (connDate && careerPeriods.length > 0) {
    for (const p of careerPeriods) {
      if (connDate >= p.from && connDate <= p.to && co.includes(p.co)) {
        score += 35; reasons.push(`colleague at ${p.display}`); break;
      }
    }
    if (!reasons.some(r => r.includes('colleague'))) {
      for (const p of careerPeriods) {
        if (connDate >= p.from && connDate <= p.to) {
          score += 15; reasons.push(`connected during ${p.display} era`); break;
        }
      }
    }
  }

  // Signal 6: Company follow
  const fk = Object.keys(COMPANY_FOLLOWS).find(k =>
    co.includes(k) || (k.length > 4 && co.includes(k.split(' ')[0])));
  if (fk) {
    const daysSince = (Date.now() - new Date(COMPANY_FOLLOWS[fk])) / 86400000;
    if (daysSince < 60)  { score += 20; reasons.push('following their company'); }
    else if (daysSince < 180) { score += 10; }
  }

  // Signal 7: Connection recency
  if (connDate) {
    const daysAgo = (Date.now() - connDate) / 86400000;
    if      (daysAgo < 90)  { score += 20; reasons.push('connected recently'); }
    else if (daysAgo < 365) { score += 12; reasons.push('connected this year'); }
    else if (daysAgo < 730) { score +=  5; }
  }

  // Signal 8: Adjacent roles
  const adjTitles = ['engineer','developer','designer','founder','cto','ceo',
    'recruiter','talent','engineering manager','tech lead','architect'];
  if (adjTitles.some(t => pos.includes(t)) && score < 50) {
    score += 15; reasons.push('eng / adjacent role');
  }

  // Signal 9: Has email address
  if ((contact.notes || '').includes('Email:')) { score += 5; reasons.push('has email'); }

  // Signal 10: Recruiter / talent at a target company (high-value for referrals)
  const isRecruiter = ['recruiter','talent acquisition','talent partner','head of talent','hr business'].some(t => pos.includes(t));
  if (isRecruiter && !isCurrentCo && TARGET_COS.some(t => co.includes(t))) { score += 30; reasons.push('recruiter at target company'); }

  // Signal 11: Their title matches or is senior to user's target role
  const userTarget = (archiveData.profile?.target || '').toLowerCase();
  const seniorityWords = ['vp','head of','director','chief','principal','staff','lead','senior'];
  if (userTarget) {
    const targetWords = userTarget.split(/[,;\/]/)[0].split(' ').filter(w => w.length > 2);
    const titleMatchesTarget = targetWords.some(w => pos.includes(w));
    const isSenior = seniorityWords.some(w => pos.includes(w));
    if (titleMatchesTarget && isSenior) { score += 25; reasons.push('senior in your target role'); }
    else if (titleMatchesTarget)        { score += 15; reasons.push('in your target role'); }
  }

  // Signal 12: Message recency bonus (recent contact > old contact)
  if (msgData && msgData.l) {
    const daysSinceMsg = (Date.now() - new Date(msgData.l)) / 86400000;
    if (daysSinceMsg < 90)  { score += 10; reasons.push('messaged recently'); }
    else if (daysSinceMsg < 365) { score += 5; }
  }

  // Derive grade and warmth tier
  const isExColleague = reasons.some(r => r.includes('colleague'));
  const isHighMsg     = msgCount >= 10;

  const warmthTier =
    isRec                        ? 'recommender'     :
    isExColleague && isHighMsg   ? 'close-colleague' :
    isExColleague                ? 'colleague'       :
    isHighMsg                    ? 'active-contact'  :
    msgCount >= 2                ? 'known'           :
    score >= 55                  ? 'warm-unknown'    :
                                   'cold';

  const grade = score >= 55 ? 'A' : score >= 25 ? 'B' : 'C';

  return { grade, score, reasons, warmthTier, msgCount };
}

// SECTION 5 · CSV parser  (exact from spec)
// ─────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const result = [];
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }
    row.push(cur.trim());
    result.push(row);
  }
  return result;
}

function findHeaderRow(rows) {
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const h = rows[i].map(x => (x || '').toLowerCase());
    if (h.some(x => x.includes('first name') || x.includes('name') || x.includes('from'))) {
      return i;
    }
  }
  return 0;
}

// mergeOrAddContact  (exact from spec)
function mergeOrAddContact(newC, contacts) {
  const idx = contacts.findIndex(c =>
    c.name.toLowerCase().trim() === (newC.name || '').toLowerCase().trim()
  );
  if (idx === -1) {
    contacts.push(newC);
    return 'added';
  }
  const c = contacts[idx];
  if (!c.url && newC.url)                  c.url         = newC.url;
  if (!c.connectedOn && newC.connectedOn)  c.connectedOn = newC.connectedOn;
  if (!c.company && newC.company)          c.company     = newC.company;
  if (!c.position && newC.position)        c.position    = newC.position;
  if (!c.notes && newC.notes)              c.notes       = newC.notes;
  if (newC.score > (c.score || 0)) {
    c.score        = newC.score;
    c.gradeReasons = newC.gradeReasons;
    c.warmthTier   = newC.warmthTier;
    if (c.source !== 'manual' && newC.grade === 'A' && c.grade !== 'A') {
      c.grade = 'A';
    }
  }
  return 'merged';
}

// Date parser for LinkedIn "Oct 2024" style dates
function parseLinkedInDate(str, fallbackFuture) {
  if (!str || str.trim() === '') return fallbackFuture ? '2027-01-01' : null;
  const s = str.trim();
  // "Oct 2024"
  const m = s.match(/^([A-Za-z]+)\s+(\d{4})$/);
  if (m) {
    const months = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const mn = months[m[1].toLowerCase().slice(0,3)];
    if (mn) return `${m[2]}-${String(mn).padStart(2,'0')}-01`;
  }
  // "2024" bare year
  if (/^\d{4}$/.test(s)) return `${s}-01-01`;
  // Already ISO
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  return fallbackFuture ? '2027-01-01' : null;
}

function detectFileType(filename) {
  const f = filename.toLowerCase();
  if (f.includes('connection'))  return 'connections';
  if (f.includes('message'))     return 'messages';
  if (f.includes('position'))    return 'positions';
  if (f.includes('recommend'))   return 'recommendations';
  if (f.includes('endorsement')) return 'endorsements';
  if (f.includes('company'))     return 'company_follows';
  if (f.includes('skill'))       return 'skills';
  if (f.includes('profile'))     return 'profile';
  return null;
}

function processFile(filename, text) {
  const type = detectFileType(filename);
  if (!type) return null;
  if (type === 'connections')    return processConnections(text);
  if (type === 'messages')       return processMessages(text);
  if (type === 'positions')      return processPositions(text);
  if (type === 'recommendations')return processRecommendations(text);
  if (type === 'endorsements')   return processEndorsements(text);
  if (type === 'company_follows')return processCompanyFollows(text);
  if (type === 'skills')         return processSkills(text);
  if (type === 'profile')        return processProfile(text);
  return null;
}

function processConnections(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const col = k => headers.indexOf(headers.find(h => h.includes(k)) || '');
  const iFirst = col('first name');
  const iLast  = col('last name');
  const iURL   = col('url');
  const iEmail = col('email');
  const iCo    = col('company');
  const iPos   = col('position');
  const iDate  = col('connected');

  let added = 0, merged = 0;
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const firstName = r[iFirst] || '';
    const lastName  = r[iLast]  || '';
    const name = `${firstName} ${lastName}`.trim();
    if (!name) continue;

    const url      = iURL   >= 0 ? r[iURL]   : '';
    const email    = iEmail >= 0 ? r[iEmail] : '';
    const company  = iCo    >= 0 ? r[iCo]    : '';
    const position = iPos   >= 0 ? r[iPos]   : '';
    const connOn   = iDate  >= 0 ? r[iDate]  : '';
    const notes    = email ? `Email: ${email}` : '';

    const connectedOn = parseLinkedInDate(connOn, false);
    const role = [position, company].filter(Boolean).join(', ');

    const scored = smartScore({ name, company, position, url, connectedOn, notes }, state);

    const contact = {
      name, company, position, role,
      relationship: 'LinkedIn connection',
      grade: scored.grade, score: scored.score,
      gradeReasons: scored.reasons, warmthTier: scored.warmthTier,
      msgCount: scored.msgCount,
      status: 'Not contacted', notes,
      url, connectedOn: connectedOn || '',
      source: 'linkedin_import',
      lastContacted: null, savedRole: ''
    };

    const result = mergeOrAddContact(contact, state.contacts);
    if (result === 'added') added++; else merged++;
  }
  saveContacts();
  return { added, merged, total: added + merged };
}

function processMessages(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());

  // find columns
  const iFrom    = headers.findIndex(h => h === 'from');
  const iSender  = headers.findIndex(h => h.includes('sender profile'));
  const iTo      = headers.findIndex(h => h === 'to');
  const iRecip   = headers.findIndex(h => h.includes('recipient profile'));
  const iDate    = headers.findIndex(h => h === 'date');

  const userName = (state.profile.name || '').toLowerCase();
  const msgMap = {};

  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 3) continue;
    const from = (r[iFrom] || '').trim();
    const to   = (r[iTo]   || '').trim();
    const date = (r[iDate] || '').trim();

    let profileUrl = '';
    const fromLower = from.toLowerCase();
    // Determine the non-user participant
    const fromIsUser = userName && fromLower.includes(userName.split(' ')[0].toLowerCase());
    if (fromIsUser) {
      // partner is TO; URL from recipient profile urls
      profileUrl = iRecip >= 0 ? (r[iRecip] || '').split(',')[0].trim() : '';
    } else {
      profileUrl = iSender >= 0 ? (r[iSender] || '').trim() : '';
    }

    const slug = profileUrl.split('/in/')[1]?.split('/')[0]?.toLowerCase() || '';
    if (!slug) continue;

    if (!msgMap[slug]) msgMap[slug] = { c: 0, l: '' };
    msgMap[slug].c++;
    if (!msgMap[slug].l || date > msgMap[slug].l) msgMap[slug].l = date;
  }

  // Only keep slugs with 2+ messages
  Object.keys(msgMap).forEach(k => { if (msgMap[k].c < 2) delete msgMap[k]; });

  state.MSG_LOOKUP = { ...state.MSG_LOOKUP, ...msgMap };
  saveArchiveData();
  reScoreAll();
  return { slugs: Object.keys(state.MSG_LOOKUP).length };
}

function processPositions(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iCo    = headers.findIndex(h => h.includes('company'));
  const iTitle = headers.findIndex(h => h.includes('title'));
  const iFrom  = headers.findIndex(h => h === 'started on' || h.includes('started'));
  const iTo    = headers.findIndex(h => h === 'finished on' || h.includes('finished') || h.includes('ended'));

  state.POSITIONS_DATA = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const co = iCo >= 0 ? (r[iCo] || '').trim() : '';
    if (!co) continue;
    const title = iTitle >= 0 ? (r[iTitle] || '').trim() : '';
    const fromStr = iFrom >= 0 ? r[iFrom] : '';
    const toStr   = iTo   >= 0 ? r[iTo]   : '';
    const from = parseLinkedInDate(fromStr, false) || '2000-01-01';
    const to   = parseLinkedInDate(toStr, true);
    state.POSITIONS_DATA.push({ co: co.toLowerCase(), co_display: co, title, from, to });
  }
  saveArchiveData();
  reScoreAll();
  inferCurrentLevelFromPositions();
  return { positions: state.POSITIONS_DATA.length };
}

function processRecommendations(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iFirst = headers.findIndex(h => h.includes('first'));
  const iLast  = headers.findIndex(h => h.includes('last'));

  state.RECOMMENDERS = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const first = iFirst >= 0 ? (r[iFirst] || '').trim() : '';
    const last  = iLast  >= 0 ? (r[iLast]  || '').trim() : '';
    const name = `${first} ${last}`.trim();
    if (name) state.RECOMMENDERS.push(name);
  }
  saveArchiveData();
  reScoreAll();
  return { recommenders: state.RECOMMENDERS.length };
}

function processEndorsements(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iFirst = headers.findIndex(h => h.includes('first'));
  const iLast  = headers.findIndex(h => h.includes('last'));

  state.ENDORSERS = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 1) continue;
    const first = iFirst >= 0 ? (r[iFirst] || '').trim() : '';
    const last  = iLast  >= 0 ? (r[iLast]  || '').trim() : '';
    const name = `${first} ${last}`.trim().toLowerCase();
    if (name) state.ENDORSERS.push(name);
  }
  saveArchiveData();
  return { endorsers: state.ENDORSERS.length };
}

function processCompanyFollows(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iName = headers.findIndex(h => h.includes('organization') || h.includes('company') || h.includes('name'));
  const iDate = headers.findIndex(h => h.includes('followed') || h.includes('date'));

  state.COMPANY_FOLLOWS = {};
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 1) continue;
    const name = (iName >= 0 ? r[iName] : r[0] || '').trim().toLowerCase();
    const date = (iDate >= 0 ? r[iDate] : r[1] || '').trim();
    if (name) state.COMPANY_FOLLOWS[name] = date || new Date().toISOString();
  }
  saveArchiveData();
  reScoreAll();
  return { followed: Object.keys(state.COMPANY_FOLLOWS).length };
}

function processSkills(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iName  = headers.findIndex(h => h.includes('name') || h.includes('skill'));
  const iCount = headers.findIndex(h => h.includes('endors') || h.includes('count'));

  const skills = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 1) continue;
    const name  = (iName  >= 0 ? r[iName]  : r[0] || '').trim();
    const count = parseInt(iCount >= 0 ? r[iCount] : r[1] || '0', 10) || 0;
    if (name) skills.push({ name, count });
  }
  skills.sort((a, b) => b.count - a.count);
  state.SKILLS = skills.slice(0, 20);
  state.profile.topSkills = state.SKILLS.slice(0, 10).map(s => s.name);
  saveArchiveData();
  saveProfile();
  return { skills: state.SKILLS.length };
}

function processProfile(text) {
  const rows = parseCSV(text);
  if (!rows.length) return {};

  let first = '', last = '', headline = '', loc = '', summary = '';

  // Detect format: columnar (row 0 = headers, row 1 = values)
  // vs k-v (each row is [field, value])
  const firstCell = (rows[0][0] || '').trim().toLowerCase();
  if (firstCell === 'first name') {
    // Columnar format — LinkedIn exports this way in some regions
    const headers = rows[0].map(c => c.trim().toLowerCase());
    const vals    = rows[1] || [];
    const get = (...keys) => { for (const k of keys) { const i = headers.indexOf(k); if (i >= 0 && vals[i]) return vals[i].trim(); } return ''; };
    first    = get('first name');
    last     = get('last name');
    headline = get('headline');
    summary  = get('summary');
    loc      = get('geo location', 'location', 'address');
  } else {
    // K-V format (field per row)
    const kv = {};
    for (const r of rows) {
      if (r.length >= 2) kv[r[0].trim().toLowerCase()] = r[1].trim();
    }
    first    = kv['first name']   || '';
    last     = kv['last name']    || '';
    headline = kv['headline']     || '';
    summary  = kv['summary']      || '';
    loc      = kv['geo location'] || kv['address'] || kv['location'] || '';
  }

  if (!state.profile.name && (first || last)) {
    state.profile.name = `${first} ${last}`.trim();
  }
  if (!state.profile.headline && headline) state.profile.headline = headline;
  if (!state.profile.bg && summary)        state.profile.bg = summary.slice(0, 400);
  if (!state.profile.location && loc)      state.profile.location = loc;

  saveProfile();
  return { name: state.profile.name };
}

function inferCurrentLevelFromPositions() {
  if (state.POSITIONS_DATA.length === 0) return;
  const sorted = [...state.POSITIONS_DATA].sort((a, b) => (b.from || '').localeCompare(a.from || ''));
  const latest = sorted[0];
  if (latest) {
    if (!state.profile.currentLevel && latest.title)      { state.profile.currentLevel = latest.title; }
    if (!state.profile.currentCompany && latest.co_display) { state.profile.currentCompany = latest.co_display; }
    saveProfile();
  }
}

async function processZipFile(file) {
  if (typeof JSZip === 'undefined') {
    throw new Error('JSZip is loading — try again in a moment.');
  }
  clearSampleData(); // remove sample contacts before loading real data
  const zip = await JSZip.loadAsync(file);
  const results = [];
  const filenames = Object.keys(zip.files).filter(f => !zip.files[f].dir);

  for (const filename of filenames) {
    const base = filename.split('/').pop();
    const type = detectFileType(base);
    if (!type) continue;
    try {
      const text = await zip.files[filename].async('text');
      const result = processFile(base, text);
      if (result) results.push({ file: base, type, result });
    } catch(e) {
      results.push({ file: base, type, error: e.message });
    }
  }
  return results;
}

// ─────────────────────────────────────────────
// RESUME GENERATION
// ─────────────────────────────────────────────
async function generateResume(idx) {
  const c        = state.contacts[idx];
  const profile  = state.profile;
  const roleHint = (document.getElementById(`role-input-${idx}`)?.value || '').trim();
  const cfg      = getAIConfig();

  setDrawerStatus(idx, 'Building resume…', 'info');

  const positions = [...state.POSITIONS_DATA]
    .sort((a, b) => (b.from || '').localeCompare(a.from || ''))
    .slice(0, 8); // cap at 8 roles to stay within token budget

  // Format positions for the prompt
  const posText = positions.map(p => {
    const from = p.from ? p.from.slice(0,7) : '';
    const to   = p.to && p.to < new Date().toISOString() ? p.to.slice(0,7) : 'Present';
    return `${p.title} at ${p.co_display} (${from} – ${to})`;
  }).join('\n');

  const skills = state.SKILLS.slice(0, 20).join(', ');
  const targetRole = roleHint || profile.target || 'a senior professional role';
  const company    = c?.company || '';
  const pastedResume = localStorage.getItem(LS.resume) || '';

  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    const resumeData = buildStaticResume(profile, positions, skills, targetRole, company);
    openResumeModal(resumeData, profile.name);
    setDrawerStatus(idx, 'Resume ready (template — no AI key)', 'info');
    return;
  }

  // Build the work history section — prefer pasted resume, fall back to positions CSV
  const workSection = pastedResume
    ? `EXISTING RESUME (use as the base — rewrite and tailor, do not fabricate new jobs):\n${pastedResume.slice(0, 3000)}`
    : `WORK HISTORY from LinkedIn (titles + dates only — infer relevant bullets):\n${posText || 'No positions data.'}`;

  const prompt = `You are tailoring a professional resume for ${profile.name || 'a senior professional'}.

PROFILE:
Name: ${profile.name || ''}
Headline: ${profile.headline || ''}
Background: ${profile.bg || 'Senior professional'}
Current level: ${profile.currentLevel || ''}
Location: ${profile.location || ''}
Company type preference: ${profile.companyType || 'any'}
${skills ? `Skills: ${skills}` : ''}

TARGET ROLE: ${targetRole}${company ? ` at ${company}` : ''}

${workSection}

INSTRUCTIONS:
Return a tailored resume as JSON with this exact structure:
{
  "summary": "3-sentence professional summary tailored to ${targetRole}. Confident, first-person, present tense.",
  "experience": [
    {
      "title": "job title",
      "company": "company name",
      "from": "Month YYYY",
      "to": "Month YYYY or Present",
      "bullets": ["strong action-verb achievement bullet", "quantified result where possible", "relevant to ${targetRole}"]
    }
  ],
  "skills": ["up to 12 skills most relevant to the target role"]
}

Rules:
- If existing resume was provided, use REAL content — rewrite bullets to emphasise relevance to "${targetRole}", do not invent new jobs
- If only LinkedIn positions provided, generate plausible achievement bullets based on title and seniority
- 2-3 bullets per role maximum
- Bullets start with strong action verbs, quantified where plausible
- skills array should be the most relevant 10-12 from the user's background
- Return ONLY the JSON object, no markdown, no explanation`;

  try {
    const raw = await callAI(prompt, 1200);
    // Extract JSON robustly
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response');
    const data = JSON.parse(jsonMatch[0]);
    data._positions = positions; // keep for rendering dates
    data._name      = profile.name || '';
    data._headline  = profile.headline || '';
    data._location  = profile.location || '';
    data._target    = targetRole;
    openResumeModal(data, profile.name || 'Resume');
    setDrawerStatus(idx, 'Resume ready ✓', 'success');
  } catch(e) {
    // Fall back to static resume
    const resumeData = buildStaticResume(profile, positions, skills, targetRole, company);
    openResumeModal(resumeData, profile.name);
    setDrawerStatus(idx, 'Used template (AI error: ' + e.message.slice(0,40) + ')', 'warn');
  }
}

function buildStaticResume(profile, positions, skills, targetRole, company) {
  return {
    _name:     profile.name || '',
    _headline: profile.headline || '',
    _location: profile.location || '',
    _target:   targetRole,
    summary: profile.bg || `${profile.currentLevel || 'Senior professional'} with extensive experience. Exploring ${targetRole} opportunities${company ? ' at ' + company : ''}.`,
    experience: positions.map(p => ({
      title:   p.title,
      company: p.co_display,
      from:    p.from ? new Date(p.from).toLocaleDateString('en-GB',{month:'short',year:'numeric'}) : '',
      to:      (!p.to || p.to >= new Date().toISOString()) ? 'Present' : new Date(p.to).toLocaleDateString('en-GB',{month:'short',year:'numeric'}),
      bullets: []
    })),
    skills: skills ? skills.split(',').map(s => s.trim()).filter(Boolean) : []
  };
}

function openResumeModal(data, name) {
  const modal = document.getElementById('resume-modal');

  const experienceHtml = (data.experience || []).map(job => `
    <div class="r-job">
      <div class="r-job-header">
        <div class="r-job-title">${h(job.title || '')}</div>
        <div class="r-job-dates">${h(job.from || '')}${job.to ? ' – ' + h(job.to) : ''}</div>
      </div>
      <div class="r-job-company">${h(job.company || '')}</div>
      ${job.bullets && job.bullets.length
        ? `<ul class="r-bullets">${job.bullets.map(b => `<li>${h(b)}</li>`).join('')}</ul>`
        : ''}
    </div>`).join('');

  const skillsHtml = (data.skills || []).length
    ? `<div class="r-section-title">Skills</div><div class="r-skills">${h((data.skills).join(' · '))}</div>`
    : '';

  modal.innerHTML = `
    <div class="resume-modal-card">
      <div class="resume-toolbar">
        <h2>📄 Tailored resume — ${h(data._target || 'role')}</h2>
        <button class="btn btn-primary btn-sm" onclick="printResume()">Download / Print PDF</button>
        <button class="btn btn-ghost btn-sm" onclick="closeResumeModal()">Close</button>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Review and edit below before printing. Use Cmd+P (Mac) or Ctrl+P (Windows) → Save as PDF.</div>

      <div class="resume-doc" id="resume-doc-content" contenteditable="true" spellcheck="false"
           style="border:1px solid var(--border);border-radius:8px;padding:32px 36px;min-height:600px;outline:none">
        <div class="r-name">${h(data._name || '')}</div>
        <div class="r-headline">${h(data._headline || data._target || '')}</div>
        <div class="r-contact">${h(data._location || '')}${data._location ? ' · ' : ''}Edit to add email / phone / LinkedIn URL</div>
        <hr class="r-divider">
        <div class="r-section-title">Summary</div>
        <div class="r-summary">${h(data.summary || '')}</div>
        <div class="r-section-title">Experience</div>
        ${experienceHtml}
        ${skillsHtml}
      </div>
    </div>`;

  modal.style.display = 'flex';
}

function closeResumeModal() {
  const modal = document.getElementById('resume-modal');
  if (modal) modal.style.display = 'none';
}

function printResume() {
  const content = document.getElementById('resume-doc-content');
  if (!content) return;
  const name    = content.querySelector('.r-name')?.textContent || 'Resume';
  const win     = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<!DOCTYPE html><html><head>
    <title>${name} — Resume</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Georgia, serif; color: #1a1a1a; line-height: 1.6;
             max-width: 760px; margin: 0 auto; padding: 40px 48px; font-size: 13px; }
      .r-name { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
      .r-headline { font-size: 14px; color: #444; margin-bottom: 5px; }
      .r-contact { font-size: 12px; color: #666; margin-bottom: 16px; }
      hr { border: none; border-top: 2px solid #1a1a1a; margin: 0 0 14px; }
      .r-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
             text-transform: uppercase; color: #444; margin: 16px 0 7px; }
      .r-summary { font-size: 13px; margin-bottom: 4px; }
      .r-job { margin-bottom: 14px; }
      .r-job-header { display: flex; justify-content: space-between; align-items: baseline; }
      .r-job-title { font-size: 13px; font-weight: 700; }
      .r-job-dates { font-size: 11px; color: #666; }
      .r-job-company { font-size: 12px; color: #444; margin-bottom: 4px; }
      ul { margin: 0; padding-left: 16px; }
      li { font-size: 12px; margin-bottom: 2px; }
      .r-skills { font-size: 12px; }
      @media print {
        body { padding: 24px 32px; }
        @page { margin: 0.5in; }
      }
    </style>
  </head><body>${content.innerHTML}</body></html>`);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 400);
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
function init() {
  // Migrate deprecated model names from localStorage
  const storedModel = localStorage.getItem(LS.ai_model);
  if (storedModel && storedModel.startsWith('claude-3')) {
    localStorage.removeItem(LS.ai_model);
  }

  // Migrate bad profile name caused by columnar Profile.csv parsing bug
  try {
    const stored = JSON.parse(localStorage.getItem(LS.profile) || '{}');
    const badNames = ['last name', 'first name', 'lastname', 'firstname'];
    if (stored.name && badNames.includes(stored.name.toLowerCase().trim())) {
      stored.name = '';
      localStorage.setItem(LS.profile, JSON.stringify(stored));
    }
  } catch(e) {}

  loadState();
  updateNavCounts();

  // Warn if opened directly as a file (localStorage won't persist across launchers)
  if (window.location.protocol === 'file:') {
    showBanner('You opened WarmPath directly. Use launch.command (Mac) or launch.bat (Windows) so your data persists consistently. ↗', 'warn');
  }

  // If no real data yet, inject sample contacts so new users can explore immediately
  if (state.contacts.length === 0) {
    state.contacts = SAMPLE_CONTACTS.map(c => ({ ...c }));
  }

  const onboarded = localStorage.getItem(LS.onboarded);
  if (!onboarded && !isSampleMode()) {
    renderContactsTab();
    showOnboarding(1);
  } else {
    renderContactsTab();
  }
}

init();
