function copyResumePrompt(idx) {
  const c         = state.contacts[idx];
  const profile   = state.profile;
  const jdContext = getJdContext(idx);
  const rawRole   = (document.getElementById(`role-input-${idx}`)?.value || c?.savedRole || '').trim();
  const roleHint  = (c?._jdFetchedTitle && c._jdMode !== 'paste') ? c._jdFetchedTitle : rawRole;
  const roleIsUrl = /^https?:\/\//i.test(roleHint);
  const displayRole = roleIsUrl ? (profile.target || 'a senior professional role') : (roleHint || profile.target || 'a senior professional role');
  const company   = c?.company || '';

  const positions = [...(state.POSITIONS_DATA || [])]
    .sort((a, b) => (b.from || '').localeCompare(a.from || ''))
    .slice(0, 8);
  const posText = positions.map(p => {
    const from = p.from ? p.from.slice(0, 7) : '';
    const to   = p.to && p.to < new Date().toISOString() ? p.to.slice(0, 7) : 'Present';
    return `${p.title} at ${p.co_display} (${from} – ${to})`;
  }).join('\n');
  const skills = (state.SKILLS || []).slice(0, 20).join(', ');
  const rawPasted = localStorage.getItem(LS.resume) || '';
  const pastedResume = rawPasted
    .replace(/https?:\/\/(?!(?:www\.)?linkedin\.com\/in\/)\S+/g, '')
    .replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
  const workSection = pastedResume
    ? `EXISTING RESUME (use as base — rewrite and tailor, do not fabricate new jobs):\n${pastedResume.slice(0, 3000)}`
    : `WORK HISTORY from LinkedIn:\n${posText || 'No positions data — list experience as best you can.'}`;

  const prompt = `Tailor my resume for the role below.

MY PROFILE:
Name: ${profile.name || ''}
Headline: ${profile.headline || ''}
Background: ${profile.bg || 'Senior professional'}
Level: ${profile.currentLevel || ''}
Location: ${profile.location || ''}${skills ? `\nSkills: ${skills}` : ''}

TARGET ROLE: ${displayRole}${company ? ` at ${company}` : ''}
${jdContext && jdContext !== roleHint && !roleIsUrl ? `\nJOB DESCRIPTION:\n${jdContext.slice(0, 2000)}` : ''}
CRITICAL: Use the LinkedIn work history dates exactly. Do NOT invent dates, roles, or companies.

${workSection}

Please write a complete, tailored resume with:
1. A concise 2–3 sentence professional summary targeted to the role
2. Experience section — strong action-verb bullets, quantify results, relevant to ${displayRole}
3. Skills section

Keep all employment history truthful.`;

  navigator.clipboard.writeText(prompt).then(() => {
    setDrawerStatus(idx, '✓ Copied! Paste into claude.ai →', 'success');
  }).catch(() => {
    // Clipboard blocked (file:// protocol) — show prompt in a temp textarea
    const ta = document.getElementById(`msg-ta-${idx}`);
    if (ta) { ta.value = prompt; ta.select(); }
    setDrawerStatus(idx, 'Clipboard blocked — prompt is in the message box, copy manually', 'warn');
  });
}

function copyResumePromptForCompany(company) {
  const coKeyName = coKey(company);
  const match = state.COMPANY_INTEL[coKeyName]?._jobMatch;
  if (!match) return;
  const contact = state.contacts
    .filter(c => coKey(c.company || '') === coKeyName)
    .sort((a, b) => (b.score || 0) - (a.score || 0))[0];
  if (!contact) return;
  const idx = state.contacts.indexOf(contact);
  // Pre-fill JD context from job match
  contact.savedRole = match.title;
  contact._jdMode   = 'paste';
  contact._jdText   = [match.title + ' at ' + company, match.summary, match.snippet].filter(Boolean).join('\n\n');
  saveContacts();
  copyResumePrompt(idx);
  // Brief status in the company card
  const statusEl = document.getElementById(`co-job-status-${coKeyName}`);
  if (statusEl) {
    statusEl.textContent = '✓ Prompt copied! Paste into claude.ai';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 4000);
  }
}

function updateContactStatus(idx, status) {
  if (!state.contacts[idx]) return;
  const c = state.contacts[idx];
  c.status = status;
  if (status !== 'Not contacted' && !c.lastContacted) {
    c.lastContacted = new Date().toISOString().slice(0,10);
  }
  saveContacts();
  updateNavCounts();

  // Update badge in-place — do NOT call renderContactsList() here.
  // In company view, renderContactsList() replaces listEl.innerHTML while the
  // select's onchange is still active, which crashes Safari (event fires on
  // a destroyed element → "A problem repeatedly occurred" crash loop).
  const nameRow = document.querySelector(`#card-${idx} .contact-name-row`);
  if (nameRow) {
    nameRow.querySelectorAll('.badge:not(.badge-referral)').forEach(b => b.remove());
    nameRow.insertAdjacentHTML('beforeend', gradeBadge(c.grade) + statusBadge(c.status));
  }

  // If a status filter is active this contact may now be hidden — defer re-render
  // until after the event fully completes so the select is no longer live
  if (contactFilters.status && contactFilters.status !== status) {
    setTimeout(() => renderContactsList(), 0);
  }

  // Refresh drawer if this contact is open
  if (sideDrawerIdx === idx) renderDrawerContent(idx);
}

// (openGradeReviewer defined above)

// ─────────────────────────────────────────────
// SECTION 3 · Scoring engine  (exact from spec)
// ─────────────────────────────────────────────
function smartScore(contact, archiveData, weights) {
  const { MSG_LOOKUP, RECOMMENDERS, POSITIONS_DATA, COMPANY_FOLLOWS, TARGET_COS } = archiveData;
  const w = weights || getWeights(); // configurable weights

  // Helper: scale base score by weight (0–10 scale; weight 0 disables signal)
  const ws = (base, signalId) => {
    const sig = SCORING_SIGNALS.find(s => s.id === signalId);
    if (!sig) return base;
    const wt = (signalId in w) ? w[signalId] : sig.defaultWeight;
    return wt === 0 ? 0 : Math.round(base * wt / sig.defaultWeight);
  };

  const co      = (contact.company || '').toLowerCase();
  const pos     = (contact.position || contact.role || '').toLowerCase();
  const name    = (contact.name || '').toLowerCase();
  const connDate = contact.connectedOn ? new Date(contact.connectedOn) : null;
  const urlSlug  = ((contact.url || '').split('/in/')[1] || '').replace(/\/$/, '').split('/')[0].toLowerCase();

  let score = 0;
  const reasons = [];

  // Signal 1: Message history (messageVolume weight)
  const msgData  = urlSlug ? MSG_LOOKUP[urlSlug] : null;
  const msgCount = msgData ? msgData.c : 0;
  if      (msgCount >= 20) { score += ws(55,'messageVolume'); reasons.push(`${msgCount} messages exchanged`); }
  else if (msgCount >= 10) { score += ws(40,'messageVolume'); reasons.push(`${msgCount} messages`); }
  else if (msgCount >= 5)  { score += ws(28,'messageVolume'); reasons.push(`${msgCount} messages`); }
  else if (msgCount >= 2)  { score += ws(15,'messageVolume'); reasons.push('messaged before'); }

  // Signal 2: Wrote a recommendation
  const isRec = RECOMMENDERS.some(r => {
    const parts = r.toLowerCase().split(' ');
    return parts[0] && name.includes(parts[0]) && (parts[1] ? name.includes(parts[1]) : true);
  });
  if (isRec) { score += ws(50,'recommendation'); reasons.push('wrote you a recommendation'); }

  // Signal 3: At a target company (exclude user's current company)
  const currentCo = (archiveData.profile?.currentCompany || '').toLowerCase().trim();
  const isCurrentCo = currentCo && co.includes(currentCo);
  if (!isCurrentCo && TARGET_COS.some(t => co.includes(t))) { score += ws(40,'targetCompany'); reasons.push('at target company'); }

  // Signal 4: Contact's title matches user's target role type
  // B1: try target → primaryGoal → headline keywords in order; last resort: PM hardcoded defaults
  const _stop4 = new Set(['at','a','an','the','in','of','for','and','or','to','·','|','-']);
  const _targetSrc = (state.profile.target || state.profile.primaryGoal || '').toLowerCase();
  let targetKeywords = _targetSrc.split(/[\s,;\/\-·|]+/).map(w => w.trim())
    .filter(w => w.length > 2 && !_stop4.has(w));
  if (!targetKeywords.length) {
    // B1 fallback: extract from headline
    const _hl = (state.profile.headline || '').toLowerCase();
    const _hlStop = new Set([..._stop4, 'senior','staff','lead','head','vp','director','manager','engineer','principal','product']);
    targetKeywords = _hl.split(/[\s·|,;\-\/]+/).map(w => w.trim())
      .filter(w => w.length > 2 && !_hlStop.has(w)).slice(0, 3);
  }
  const roleMatches = targetKeywords.length > 0
    ? targetKeywords.some(kw => pos.includes(kw))
    : ['product manager','head of product','vp product','director of product',
       'chief product','group pm','principal pm','staff pm','cpo',' pm ','pm,'].some(t => pos.includes(t));
  if (roleMatches) { score += ws(35,'pmTitle'); reasons.push('target role type'); }

  // Signal 5: Exact tenure overlap (exColleague weight)
  const careerPeriods = POSITIONS_DATA.map(p => ({
    co: p.co.toLowerCase(),
    display: p.co_display,
    from: new Date(p.from),
    to: new Date(p.to)
  }));

  if (connDate && careerPeriods.length > 0) {
    for (const p of careerPeriods) {
      if (connDate >= p.from && connDate <= p.to && co.includes(p.co)) {
        score += ws(35,'exColleague'); reasons.push(`colleague at ${p.display}`); break;
      }
    }
    if (!reasons.some(r => r.includes('colleague'))) {
      for (const p of careerPeriods) {
        if (connDate >= p.from && connDate <= p.to) {
          score += ws(15,'exColleague'); reasons.push(`connected during ${p.display} era`); break;
        }
      }
    }
  }

  // Signal 6: Company follow
  const fk = Object.keys(COMPANY_FOLLOWS).find(k =>
    co.includes(k) || (k.length > 4 && co.includes(k.split(' ')[0])));
  if (fk) {
    const daysSince = (Date.now() - new Date(COMPANY_FOLLOWS[fk])) / 86400000;
    if (daysSince < 60)  { score += ws(20,'companyFollow'); reasons.push('following their company'); }
    else if (daysSince < 180) { score += ws(10,'companyFollow'); }
  }

  // Signal 7: Connection recency
  if (connDate) {
    const daysAgo = (Date.now() - connDate) / 86400000;
    if      (daysAgo < 90)  { score += ws(20,'connRecency'); reasons.push('connected recently'); }
    else if (daysAgo < 365) { score += ws(12,'connRecency'); reasons.push('connected this year'); }
    else if (daysAgo < 730) { score += ws(5,'connRecency'); }
  }

  // Signal 8: Adjacent roles
  const adjTitles = ['engineer','developer','designer','founder','cto','ceo',
    'recruiter','talent','engineering manager','tech lead','architect'];
  if (adjTitles.some(t => pos.includes(t)) && score < 50) {
    score += ws(15,'adjacentRole'); reasons.push('eng / adjacent role');
  }

  // Signal 9: Has email address
  if ((contact.notes || '').includes('Email:')) { score += ws(5,'hasEmail'); reasons.push('has email'); }

  // Signal 10: Recruiter / talent at a target company
  const isRecruiter = ['recruiter','talent acquisition','talent partner','head of talent','hr business'].some(t => pos.includes(t));
  if (isRecruiter && !isCurrentCo && TARGET_COS.some(t => co.includes(t))) { score += ws(30,'recruiter'); reasons.push('recruiter at target company'); }

  // Signal 11: Their title matches or is senior to user's target role
  const userTarget = (archiveData.profile?.target || '').toLowerCase();
  const seniorityWords = ['vp','head of','director','chief','principal','staff','lead','senior'];
  if (userTarget) {
    const targetWords = userTarget.split(/[,;\/]/)[0].split(' ').filter(w => w.length > 2);
    const titleMatchesTarget = targetWords.some(w => pos.includes(w));
    const isSenior = seniorityWords.some(w => pos.includes(w));
    if (titleMatchesTarget && isSenior) { score += ws(25,'seniorTitle'); reasons.push('senior in your target role'); }
    else if (titleMatchesTarget)        { score += ws(15,'seniorTitle'); reasons.push('in your target role'); }
  }

  // Signal 12: Message recency bonus
  let lastMsgDate = null;
  if (msgData && msgData.l) {
    lastMsgDate = msgData.l;
    const daysSinceMsg = (Date.now() - new Date(msgData.l)) / 86400000;
    if (daysSinceMsg < 90)  { score += ws(10,'messageRecency'); reasons.push('messaged recently'); }
    else if (daysSinceMsg < 365) { score += ws(5,'messageRecency'); }
  }

  // Derive grade and warmth tier
  const isExColleague = reasons.some(r => r.includes('colleague'));
  const isHighMsg     = msgCount >= 10;

  const warmthTier =
    isRec                        ? 'recommender'     :
    isExColleague && isHighMsg   ? 'close-colleague' :
    isExColleague                ? 'colleague'       :
    isHighMsg                    ? 'active-contact'  :
    msgCount >= 2                ? 'known'           :
    score >= 55                  ? 'warm-unknown'    :
                                   'cold';

  const grade = score >= 55 ? 'A' : score >= 25 ? 'B' : 'C';

  return { grade, score, reasons, warmthTier, msgCount, lastMsgDate };
}

function loadState() {
  try { state.contacts     = JSON.parse(localStorage.getItem(LS.contacts)    || '[]'); } catch(e){ state.contacts = []; }
  try { state.applications = JSON.parse(localStorage.getItem(LS.applications)|| '[]'); } catch(e){ state.applications = []; }
  try { const p = JSON.parse(localStorage.getItem(LS.profile) || '{}'); state.profile = Object.assign({ name:'', headline:'', bg:'', target:'', currentLevel:'', topSkills:[], location:'', currentCompany:'', companyType:'', whyLooking:'' }, p); } catch(e){}
  try { state.MSG_LOOKUP      = JSON.parse(localStorage.getItem(LS.msg)  || '{}'); } catch(e){ state.MSG_LOOKUP = {}; }
  try { state.RECOMMENDERS    = JSON.parse(localStorage.getItem(LS.rec)  || '[]'); } catch(e){ state.RECOMMENDERS = []; }
  try { state.POSITIONS_DATA  = JSON.parse(localStorage.getItem(LS.pos)  || '[]'); } catch(e){ state.POSITIONS_DATA = []; }
  try { state.COMPANY_FOLLOWS = JSON.parse(localStorage.getItem(LS.cofo) || '{}'); } catch(e){ state.COMPANY_FOLLOWS = {}; }
  try { state.ENDORSERS       = JSON.parse(localStorage.getItem(LS.end)  || '[]'); } catch(e){ state.ENDORSERS = []; }
  try { state.SKILLS          = JSON.parse(localStorage.getItem(LS.skills)|| '[]'); } catch(e){ state.SKILLS = []; }
  try {
    const raw = localStorage.getItem(LS.custom_targets) || localStorage.getItem(LS.targets) || '[]';
    state.TARGET_COS = JSON.parse(raw).map(t => t.toLowerCase().trim()).filter(Boolean);
  } catch(e){ state.TARGET_COS = []; }
  try { state.COMPANY_INTEL = JSON.parse(localStorage.getItem(LS.company_intel) || '{}'); } catch(e){ state.COMPANY_INTEL = {}; }
  try { state.ACTIVITY_LOG  = JSON.parse(localStorage.getItem(LS.activity_log)  || '[]'); } catch(e){ state.ACTIVITY_LOG = []; }
  try { state.JOBS     = JSON.parse(localStorage.getItem(LS.jobs)     || '[]'); } catch(e){ state.JOBS = []; }
  try { state.OUTREACH = JSON.parse(localStorage.getItem(LS.outreach) || '[]'); } catch(e){ state.OUTREACH = []; }
  migrateStatuses();
}

function migrateStatuses() {
  const jobMap = { 'Actively Pursuing':'Pursuing', 'On Hold':'Pursuing', 'Offer':'Offer' };
  let jobsDirty = false;
  state.JOBS.forEach(j => {
    if (jobMap[j.status]) { j.status = jobMap[j.status]; jobsDirty = true; }
  });
  if (jobsDirty) saveJobs();

  const outreachMap = {
    'not_started':'planned', 'message_drafted':'planned',
    'message_sent':'messaged', 'response_received':'replied',
    'referral_requested':'referral_asked', 'resume_sent':'referral_asked',
    'post_referral_followup':'referred', 'interview_scheduled':'referred',
    'not_referred':'not_referring'
  };
  let outreachDirty = false;
  state.OUTREACH.forEach(o => {
    if (outreachMap[o.status]) { o.status = outreachMap[o.status]; outreachDirty = true; }
    if (o.statusHistory) o.statusHistory.forEach(h => {
      if (outreachMap[h.status]) { h.status = outreachMap[h.status]; outreachDirty = true; }
    });
  });
  if (outreachDirty) saveOutreach();

  const contactMap = { 'Message sent':'Messaged', 'Call done':'Met',
    'Referral given':'Referred me', 'Intro made':'Replied' };
  let contactsDirty = false;
  state.contacts.forEach(c => {
    if (contactMap[c.status]) { c.status = contactMap[c.status]; contactsDirty = true; }
  });
  if (contactsDirty) saveContacts();
}

function saveCustomTargets(arr) {
  const clean = arr.map(t => t.toLowerCase().trim()).filter(Boolean);
  localStorage.setItem(LS.custom_targets, JSON.stringify(clean));
  state.TARGET_COS = clean;
}

// Normalise a company name → cache key (lower, trimmed, strip Ltd/Inc/etc)
function coKey(name) {
  return (name || '').toLowerCase().trim()
    .replace(/\b(pvt|ltd|inc|llc|corp|limited|private)\b\.?/gi, '')
    .replace(/\s+/g, ' ').trim();
}

// Stronger normalisation used only for company-view grouping.
// Strips case, punctuation, and common noise suffixes so that
// "ThoughtWorks", "Thoughtworks", "thoughtworks technologies" all merge.
// Deliberately conservative — won't merge "Amazon" with "Amazon Web Services".
const CO_NOISE = /\b(technologies|technology|tech|solutions|services|software|systems|global|india|group|consulting|consultancy|corporation|private|pvt|limited|ltd|inc|llc|corp|co)\b\.?/gi;
function coGroupKey(name) {
  return (name || '').toLowerCase()
    .replace(CO_NOISE, '')
    .replace(/[^a-z0-9]/g, '')  // strip spaces, dots, dashes, ampersands
    .trim();
}

function saveCompanyIntel() {
  try { localStorage.setItem(LS.company_intel, JSON.stringify(state.COMPANY_INTEL)); } catch(e){}
}

// ─── Backup & Restore ─────────────────────────
function downloadBackup() {
  const backup = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('wp_')) backup[key] = localStorage.getItem(key);
  }
  backup._backupDate = new Date().toISOString();
  backup._version    = '2.2';
  const json     = JSON.stringify(backup, null, 2);
  const blob     = new Blob([json], { type: 'application/json' });
  const url      = URL.createObjectURL(blob);
  const now      = new Date();
  const pad      = n => String(n).padStart(2, '0');
  const filename = `warmpath-backup-${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.json`;
  const a        = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem(LS.last_backup, new Date().toISOString());
  showBanner(`Backup saved — ${filename}`, 'success');
  renderSetupTab();
}

function restoreFromBackup() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text  = await file.text();
      const data  = JSON.parse(text);
      if (!data._backupDate) { showBanner('Invalid backup file — missing backup date marker.', 'error'); return; }
      const dateStr = new Date(data._backupDate).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
      const ok = confirm(`This will replace ALL current data with the backup from ${dateStr}.\n\nContinue?`);
      if (!ok) return;
      // Restore all wp_ keys
      Object.entries(data).forEach(([key, val]) => {
        if (key.startsWith('wp_')) localStorage.setItem(key, val);
      });
      localStorage.setItem(LS.last_backup, new Date().toISOString());
      showBanner('Backup restored — reloading…', 'success');
      setTimeout(() => location.reload(), 1200);
    } catch(err) {
      showBanner('Invalid backup file — could not parse JSON.', 'error');
    }
  };
  input.click();
}

function deleteJob(jobId) {

function updateJobField(jobId, field, value) {
  const job = state.JOBS.find(j => j.id === jobId);
  if (job) { job[field] = value; saveJobs(); }
}

function addOutreachRecord(contactIdx, jobId) {
  const c = state.contacts[contactIdx];
  if (!c || !jobId) return null;
  // Avoid duplicate
  if (state.OUTREACH.find(o => o.contactIdx === contactIdx && o.jobId === jobId)) return null;
  const rec = { id:genId(), contactIdx, contactName:c.name, contactCompany:c.company||'',
    jobId, status:'planned',
    statusHistory:[{ status:'planned', date:new Date().toISOString() }],
    messageDraft:'', notes:'' };
  state.OUTREACH.push(rec);
  saveOutreach();
  return rec;
}

function updateOutreachStatus(outreachId, status) {
  const rec = state.OUTREACH.find(o => o.id === outreachId);
  if (!rec) return;
  rec.status = status;
  rec.statusHistory.push({ status, date:new Date().toISOString() });
  saveOutreach();
  // When referred, nudge the job to Applied
  if (status === 'referred') {
    const job = state.JOBS.find(j => j.id === rec.jobId);
    if (job && job.status === 'Pursuing') {
      updateJobField(job.id, 'status', 'Applied');
      showBanner(`${rec.contactName} referred you — "${job.title}" moved to Applied in Jobs tab`, 'success');
    }
  }
}

// Sync outreach status for a contact across all their linked job records
function syncOutreachForContact(contactIdx, newStatus) {
  const records = state.OUTREACH.filter(o => o.contactIdx === contactIdx);
  if (!records.length) return;
  const ORDER = ['planned','messaged','replied','had_a_call','referral_asked','referred','not_referring','no_response'];
  records.forEach(o => {
    const cur = ORDER.indexOf(o.status);
    const next = ORDER.indexOf(newStatus);
    // Only advance forward, never regress (except no_response which can always be set)
    if (next > cur || newStatus === 'no_response') {
      updateOutreachStatus(o.id, newStatus);
    }
  });
}

function getActivityStats(daysAgo = 0, span = 7) {
  const end   = Date.now() - daysAgo * 86400000;
  const start = end - span * 86400000;
  const log   = (state.ACTIVITY_LOG || []).filter(e => {
    const t = new Date(e.date).getTime();
    return t >= start && t < end;
  });
  const sent       = log.filter(e => e.type === 'message_sent').length;
  const responses  = log.filter(e => e.type === 'response_received').length;
  const resumes    = log.filter(e => e.type === 'resume_generated').length;
  const researched = new Set(
    log.filter(e => e.type === 'drawer_opened').map(e => `${e.contactIdx}-${new Date(e.date).toDateString()}`)
  ).size; // unique contact-days
  const replyRate  = sent > 0 ? Math.round(responses / sent * 100) : 0;
  return { sent, responses, resumes, researched, replyRate };
}

// SECTION 5 · CSV parser  (exact from spec)
// ─────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const result = [];
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }
    row.push(cur.trim());
    result.push(row);
  }
  return result;
}

function findHeaderRow(rows) {
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const h = rows[i].map(x => (x || '').toLowerCase());
    if (h.some(x => x.includes('first name') || x.includes('name') || x.includes('from'))) {
      return i;
    }
  }
  return 0;
}

// mergeOrAddContact  (exact from spec)
function mergeOrAddContact(newC, contacts) {
  const idx = contacts.findIndex(c =>
    c.name.toLowerCase().trim() === (newC.name || '').toLowerCase().trim()
  );
  if (idx === -1) {
    contacts.push(newC);
    return 'added';
  }
  const c = contacts[idx];
  if (!c.url && newC.url)                  c.url         = newC.url;
  if (!c.connectedOn && newC.connectedOn)  c.connectedOn = newC.connectedOn;
  if (!c.company && newC.company)          c.company     = newC.company;
  if (!c.position && newC.position)        c.position    = newC.position;
  if (!c.notes && newC.notes)              c.notes       = newC.notes;
  if (newC.score > (c.score || 0)) {
    c.score        = newC.score;
    c.gradeReasons = newC.gradeReasons;
    c.warmthTier   = newC.warmthTier;
    if (c.source !== 'manual' && newC.grade === 'A' && c.grade !== 'A') {
      c.grade = 'A';
    }
  }
  return 'merged';
}

// Date parser for LinkedIn "Oct 2024" style dates
function parseLinkedInDate(str, fallbackFuture) {
  if (!str || str.trim() === '') return fallbackFuture ? '2027-01-01' : null;
  const s = str.trim();
  // "Oct 2024"
  const m = s.match(/^([A-Za-z]+)\s+(\d{4})$/);
  if (m) {
    const months = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const mn = months[m[1].toLowerCase().slice(0,3)];
    if (mn) return `${m[2]}-${String(mn).padStart(2,'0')}-01`;
  }
  // "2024" bare year
  if (/^\d{4}$/.test(s)) return `${s}-01-01`;
  // Already ISO
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  return fallbackFuture ? '2027-01-01' : null;
}

function detectFileType(filename) {
  const f = filename.toLowerCase();
  if (f.includes('connection'))  return 'connections';
  if (f.includes('message'))     return 'messages';
  if (f.includes('position'))    return 'positions';
  if (f.includes('recommend') && f.includes('received'))   return 'recommendations';
  if (f.includes('endorsement')) return 'endorsements';
  if (f.includes('company'))     return 'company_follows';
  if (f.includes('skill'))       return 'skills';
  if (f.includes('profile'))     return 'profile';
  return null;
}

function processFile(filename, text) {
  const type = detectFileType(filename);
  if (!type) return null;
  if (type === 'connections')    return processConnections(text);
  if (type === 'messages')       return processMessages(text);
  if (type === 'positions')      return processPositions(text);
  if (type === 'recommendations')return processRecommendations(text);
  if (type === 'endorsements')   return processEndorsements(text);
  if (type === 'company_follows')return processCompanyFollows(text);
  if (type === 'skills')         return processSkills(text);
  if (type === 'profile')        return processProfile(text);
  return null;
}

function processConnections(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const col = k => headers.indexOf(headers.find(h => h.includes(k)) || '');
  const iFirst = col('first name');
  const iLast  = col('last name');
  const iURL   = col('url');
  const iEmail = col('email');
  const iCo    = col('company');
  const iPos   = col('position');
  const iDate  = col('connected');

  let added = 0, merged = 0;
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const firstName = r[iFirst] || '';
    const lastName  = r[iLast]  || '';
    const name = `${firstName} ${lastName}`.trim();
    if (!name) continue;

    const url      = iURL   >= 0 ? r[iURL]   : '';
    const email    = iEmail >= 0 ? r[iEmail] : '';
    const company  = iCo    >= 0 ? r[iCo]    : '';
    const position = iPos   >= 0 ? r[iPos]   : '';
    const connOn   = iDate  >= 0 ? r[iDate]  : '';
    const notes    = email ? `Email: ${email}` : '';

    const connectedOn = parseLinkedInDate(connOn, false);
    const role = [position, company].filter(Boolean).join(', ');

    const scored = smartScore({ name, company, position, url, connectedOn, notes }, state);

    const contact = {
      name, company, position, role,
      relationship: 'LinkedIn connection',
      grade: scored.grade, score: scored.score,
      gradeReasons: scored.reasons, warmthTier: scored.warmthTier,
      msgCount: scored.msgCount,
      status: 'Not contacted', notes,
      url, connectedOn: connectedOn || '',
      source: 'linkedin_import',
      lastContacted: null, savedRole: ''
    };

    const result = mergeOrAddContact(contact, state.contacts);
    if (result === 'added') added++; else merged++;
  }
  saveContacts();
  return { added, merged, total: added + merged };
}

function processMessages(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());

  // find columns
  const iFrom    = headers.findIndex(h => h === 'from');
  const iSender  = headers.findIndex(h => h.includes('sender profile'));
  const iTo      = headers.findIndex(h => h === 'to');
  const iRecip   = headers.findIndex(h => h.includes('recipient profile'));
  const iDate    = headers.findIndex(h => h === 'date');

  const userName = (state.profile.name || '').toLowerCase();
  const msgMap = {};

  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 3) continue;
    const from = (r[iFrom] || '').trim();
    const to   = (r[iTo]   || '').trim();
    const date = (r[iDate] || '').trim();

    let profileUrl = '';
    const fromLower = from.toLowerCase();
    // Determine the non-user participant
    const fromIsUser = userName && fromLower.includes(userName.split(' ')[0].toLowerCase());
    if (fromIsUser) {
      // partner is TO; URL from recipient profile urls
      profileUrl = iRecip >= 0 ? (r[iRecip] || '').split(',')[0].trim() : '';
    } else {
      profileUrl = iSender >= 0 ? (r[iSender] || '').trim() : '';
    }

    const slug = profileUrl.split('/in/')[1]?.split('/')[0]?.toLowerCase() || '';
    if (!slug) continue;

    if (!msgMap[slug]) msgMap[slug] = { c: 0, l: '' };
    msgMap[slug].c++;
    if (!msgMap[slug].l || date > msgMap[slug].l) msgMap[slug].l = date;
  }

  // Only keep slugs with 2+ messages
  Object.keys(msgMap).forEach(k => { if (msgMap[k].c < 2) delete msgMap[k]; });

  state.MSG_LOOKUP = { ...state.MSG_LOOKUP, ...msgMap };
  saveArchiveData();
  reScoreAll();
  return { slugs: Object.keys(state.MSG_LOOKUP).length };
}

function processPositions(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iCo    = headers.findIndex(h => h.includes('company'));
  const iTitle = headers.findIndex(h => h.includes('title'));
  const iFrom  = headers.findIndex(h => h === 'started on' || h.includes('started'));
  const iTo    = headers.findIndex(h => h === 'finished on' || h.includes('finished') || h.includes('ended'));

  state.POSITIONS_DATA = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const co = iCo >= 0 ? (r[iCo] || '').trim() : '';
    if (!co) continue;
    const title = iTitle >= 0 ? (r[iTitle] || '').trim() : '';
    const fromStr = iFrom >= 0 ? r[iFrom] : '';
    const toStr   = iTo   >= 0 ? r[iTo]   : '';
    const from = parseLinkedInDate(fromStr, false) || '2000-01-01';
    const to   = parseLinkedInDate(toStr, true);
    state.POSITIONS_DATA.push({ co: co.toLowerCase(), co_display: co, title, from, to });
  }
  saveArchiveData();
  reScoreAll();
  inferCurrentLevelFromPositions();
  return { positions: state.POSITIONS_DATA.length };
}

function processRecommendations(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iFirst = headers.findIndex(h => h.includes('first'));
  const iLast  = headers.findIndex(h => h.includes('last'));

  state.RECOMMENDERS = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const first = iFirst >= 0 ? (r[iFirst] || '').trim() : '';
    const last  = iLast  >= 0 ? (r[iLast]  || '').trim() : '';
    const name = `${first} ${last}`.trim();
    if (name) state.RECOMMENDERS.push(name);
  }
  saveArchiveData();
  reScoreAll();
  return { recommenders: state.RECOMMENDERS.length };
}

function processEndorsements(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iFirst = headers.findIndex(h => h.includes('first'));
  const iLast  = headers.findIndex(h => h.includes('last'));

  state.ENDORSERS = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 1) continue;
    const first = iFirst >= 0 ? (r[iFirst] || '').trim() : '';
    const last  = iLast  >= 0 ? (r[iLast]  || '').trim() : '';
    const name = `${first} ${last}`.trim().toLowerCase();
    if (name) state.ENDORSERS.push(name);
  }
  saveArchiveData();
  return { endorsers: state.ENDORSERS.length };
}

function processCompanyFollows(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iName = headers.findIndex(h => h.includes('organization') || h.includes('company') || h.includes('name'));
  const iDate = headers.findIndex(h => h.includes('followed') || h.includes('date'));

  state.COMPANY_FOLLOWS = {};
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 1) continue;
    const name = (iName >= 0 ? r[iName] : r[0] || '').trim().toLowerCase();
    const date = (iDate >= 0 ? r[iDate] : r[1] || '').trim();
    if (name) state.COMPANY_FOLLOWS[name] = date || new Date().toISOString();
  }
  saveArchiveData();
  reScoreAll();
  return { followed: Object.keys(state.COMPANY_FOLLOWS).length };
}

function processSkills(text) {
  const rows = parseCSV(text);
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(h => h.toLowerCase().trim());
  const iName  = headers.findIndex(h => h.includes('name') || h.includes('skill'));
  const iCount = headers.findIndex(h => h.includes('endors') || h.includes('count'));

  const skills = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 1) continue;
    const name  = (iName  >= 0 ? r[iName]  : r[0] || '').trim();
    const count = parseInt(iCount >= 0 ? r[iCount] : r[1] || '0', 10) || 0;
    if (name) skills.push({ name, count });
  }
  skills.sort((a, b) => b.count - a.count);
  state.SKILLS = skills.slice(0, 20);
  state.profile.topSkills = state.SKILLS.slice(0, 10).map(s => s.name);
  saveArchiveData();
  saveProfile();
  return { skills: state.SKILLS.length };
}

function processProfile(text) {
  const rows = parseCSV(text);
  if (!rows.length) return {};

  let first = '', last = '', headline = '', loc = '', summary = '';

  // Detect format: columnar (row 0 = headers, row 1 = values)
  // vs k-v (each row is [field, value])
  const firstCell = (rows[0][0] || '').trim().toLowerCase();
  if (firstCell === 'first name') {
    // Columnar format — LinkedIn exports this way in some regions
    const headers = rows[0].map(c => c.trim().toLowerCase());
    const vals    = rows[1] || [];
    const get = (...keys) => { for (const k of keys) { const i = headers.indexOf(k); if (i >= 0 && vals[i]) return vals[i].trim(); } return ''; };
    first    = get('first name');
    last     = get('last name');
    headline = get('headline');
    summary  = get('summary');
    loc      = get('geo location', 'location', 'address');
  } else {
    // K-V format (field per row)
    const kv = {};
    for (const r of rows) {
      if (r.length >= 2) kv[r[0].trim().toLowerCase()] = r[1].trim();
    }
    first    = kv['first name']   || '';
    last     = kv['last name']    || '';
    headline = kv['headline']     || '';
    summary  = kv['summary']      || '';
    loc      = kv['geo location'] || kv['address'] || kv['location'] || '';
  }

  if (!state.profile.name && (first || last)) {
    state.profile.name = `${first} ${last}`.trim();
  }
  if (!state.profile.headline && headline) state.profile.headline = headline;
  if (!state.profile.bg && summary)        state.profile.bg = summary.slice(0, 400);
  if (!state.profile.location && loc)      state.profile.location = loc;

  saveProfile();
  return { name: state.profile.name };
}

function inferCurrentLevelFromPositions() {
  if (state.POSITIONS_DATA.length === 0) return;
  const sorted = [...state.POSITIONS_DATA].sort((a, b) => (b.from || '').localeCompare(a.from || ''));
  const latest = sorted[0];
  if (latest) {
    if (!state.profile.currentLevel && latest.title)      { state.profile.currentLevel = latest.title; }
    if (!state.profile.currentCompany && latest.co_display) { state.profile.currentCompany = latest.co_display; }
    saveProfile();
  }
}

async function processZipFile(file) {
  if (typeof JSZip === 'undefined') {
    throw new Error('JSZip is loading — try again in a moment.');
  }
  clearSampleData(); // remove sample contacts before loading real data
  const zip = await JSZip.loadAsync(file);
  const results = [];
  const filenames = Object.keys(zip.files).filter(f => !zip.files[f].dir);

  for (const filename of filenames) {
    const base = filename.split('/').pop();
    const type = detectFileType(base);
    if (!type) continue;
    try {
      const text = await zip.files[filename].async('text');
      const result = processFile(base, text);
      if (result) results.push({ file: base, type, result });
    } catch(e) {
      results.push({ file: base, type, error: e.message });
    }
  }
  return results;
}

// ─────────────────────────────────────────────
// RESUME GENERATION
// ─────────────────────────────────────────────
async function generateResume(idx) {
  const c        = state.contacts[idx];
  const profile  = state.profile;
  const jdContext = getJdContext(idx);
  const rawRoleInput = (document.getElementById(`role-input-${idx}`)?.value || c?.savedRole || '').trim();
  // Prefer fetched/pasted JD title; fall back to manual input
  const roleHint = (c?._jdFetchedTitle && c._jdMode !== 'paste') ? c._jdFetchedTitle : rawRoleInput;
  const cfg      = getAIConfig();

  setDrawerStatus(idx, 'Building resume…', 'info');

  const positions = [...state.POSITIONS_DATA]
    .sort((a, b) => (b.from || '').localeCompare(a.from || ''))
    .slice(0, 8); // cap at 8 roles to stay within token budget

  // Format positions for the prompt — LinkedIn dates are authoritative
  const posText = positions.map(p => {
    const from = p.from ? p.from.slice(0,7) : '';
    const to   = p.to && p.to < new Date().toISOString() ? p.to.slice(0,7) : 'Present';
    return `${p.title} at ${p.co_display} (${from} – ${to})`;
  }).join('\n');

  const skills = state.SKILLS.slice(0, 20).join(', ');
  // If roleHint is a URL, use it as AI context but display profile.target as the clean role name
  const roleIsUrl  = /^https?:\/\//i.test(roleHint);
  const displayRole = roleIsUrl ? (profile.target || 'a senior professional role') : (roleHint || profile.target || 'a senior professional role');
  const targetRole  = roleHint || profile.target || 'a senior professional role'; // full value for AI context
  const company    = c?.company || '';

  // Strip non-profile URLs from pasted resume (PDF copy-paste embeds company/job links as text)
  const rawPasted = localStorage.getItem(LS.resume) || '';
  const pastedResume = rawPasted
    .replace(/https?:\/\/(?!(?:www\.)?linkedin\.com\/in\/)\S+/g, '') // keep only linkedin.com/in/ URLs
    .replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();

  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    const resumeData = buildStaticResume(profile, positions, skills, displayRole, company);
    openResumeModal(resumeData, profile.name);
    setDrawerStatus(idx, 'Resume ready (template — no AI key)', 'info');
    return;
  }

  // Build the work history section — prefer pasted resume, fall back to positions CSV
  const workSection = pastedResume
    ? `EXISTING RESUME (use as the base — rewrite and tailor, do not fabricate new jobs):\n${pastedResume.slice(0, 3000)}`
    : `WORK HISTORY from LinkedIn (titles + dates only — infer relevant bullets):\n${posText || 'No positions data.'}`;

  const prompt = `You are tailoring a professional resume for ${profile.name || 'a senior professional'}.

PROFILE:
Name: ${profile.name || ''}
Headline: ${profile.headline || ''}
Background: ${profile.bg || 'Senior professional'}
Current level: ${profile.currentLevel || ''}
Location: ${profile.location || ''}
Target role: ${displayRole}${roleIsUrl ? `\nJob URL for context (do NOT include in output): ${roleHint}` : ''}
Company type preference: ${profile.companyType || 'any'}
${skills ? `Skills: ${skills}` : ''}

TARGET ROLE: ${displayRole}${company ? ` at ${company}` : ''}
${roleIsUrl ? `JOB URL (for context only — do NOT include in output): ${roleHint}` : ''}
${jdContext && jdContext !== roleHint && !roleIsUrl ? `JOB DESCRIPTION (use to tailor bullets and summary):\n${jdContext.slice(0, 1500)}` : ''}
${jdContext && jdContext !== roleHint && !roleIsUrl ? '' : ''}
EMPLOYMENT DATE AUTHORITY: The "from" and "to" dates in the JSON must match the LinkedIn positions data exactly. Do NOT use dates from the pasted resume text — those may be imprecise. Always use the dates provided in WORK HISTORY.

${workSection}

INSTRUCTIONS:
Return a tailored resume as JSON with this exact structure:
{
  "summary": "3-sentence professional summary tailored to ${targetRole}. Confident, first-person, present tense.",
  "experience": [
    {
      "title": "job title",
      "company": "company name",
      "from": "Month YYYY",
      "to": "Month YYYY or Present",
      "bullets": ["strong action-verb achievement bullet", "quantified result where possible", "relevant to ${targetRole}"]
    }
  ],
  "skills": ["up to 12 skills most relevant to the target role"]
}

Rules:
- CRITICAL: Use the EXACT month+year dates from LinkedIn work history — never change them, never approximate with year-only
- If existing resume was provided, use REAL content — rewrite bullets to emphasise relevance to "${targetRole}", do not invent new jobs
- If only LinkedIn positions provided, generate plausible achievement bullets based on title and seniority
- If JD is provided, tailor bullets to directly address stated requirements
- 2-3 bullets per role maximum
- Bullets start with strong action verbs, quantified where plausible
- skills array should be the most relevant 10-12 from the user's background
- Return ONLY the JSON object, no markdown, no explanation
- Never include URLs, hyperlinks, or web addresses in any field — the only exception is a linkedin.com/in/ profile URL if present in the source resume`;

  try {
    const raw = await callAI(prompt, 1200);
    // Extract JSON robustly
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response');
    const data = JSON.parse(jsonMatch[0]);
    data._positions   = positions; // keep for rendering dates
    data._name        = profile.name || '';
    data._headline    = profile.headline || '';
    data._location    = profile.location || '';
    data._email       = profile.email || '';
    data._phone       = profile.phone || '';
    data._linkedinUrl = profile.linkedinUrl || '';
    data._target      = displayRole;
    // Log resume generation on contact
    if (state.contacts[idx]) {
      state.contacts[idx]._lastResumeDate = new Date().toISOString();
      logActivity('resume_generated', { contactIdx: idx, role: displayRole });
      state.contacts[idx]._lastResumeRole = displayRole;
      saveContacts();
    }
    openResumeModal(data, profile.name || 'Resume');
    setDrawerStatus(idx, 'Resume ready ✓', 'success');
  } catch(e) {
    // Fall back to static resume
    const resumeData = buildStaticResume(profile, positions, skills, targetRole, company);
    openResumeModal(resumeData, profile.name);
    const isCorsR = e.message?.includes('Failed to fetch') || e.message?.includes('CORS') || e.message?.includes('NetworkError');
    setDrawerStatus(idx, isCorsR
      ? '⚠️ AI not reachable — start launch.command / launch.bat, then retry. Showing template resume.'
      : '⚠️ AI error: ' + e.message.slice(0,60) + '. Showing template resume.', 'warn');
  }
}

function buildStaticResume(profile, positions, skills, targetRole, company) {
  return {
    _name:        profile.name || '',
    _headline:    profile.headline || '',
    _location:    profile.location || '',
    _email:       profile.email || '',
    _phone:       profile.phone || '',
    _linkedinUrl: profile.linkedinUrl || '',
    _target:      targetRole,
    summary: profile.bg || `${profile.currentLevel || 'Senior professional'} with extensive experience. Exploring ${targetRole} opportunities${company ? ' at ' + company : ''}.`,
    experience: positions.map(p => ({
      title:   p.title,
      company: p.co_display,
      from:    p.from ? new Date(p.from).toLocaleDateString('en-GB',{month:'short',year:'numeric'}) : '',
      to:      (!p.to || p.to >= new Date().toISOString()) ? 'Present' : new Date(p.to).toLocaleDateString('en-GB',{month:'short',year:'numeric'}),
      bullets: []
    })),
    skills: skills ? skills.split(',').map(s => s.trim()).filter(Boolean) : []
  };
}

function openResumeModal(data, name) {
  const modal = document.getElementById('resume-modal');

  const experienceHtml = (data.experience || []).map(job => `
    <div class="r-job">
      <div class="r-job-header">
        <div class="r-job-title">${h(job.title || '')}</div>
        <div class="r-job-dates">${h(job.from || '')}${job.to ? ' – ' + h(job.to) : ''}</div>
      </div>
      <div class="r-job-company">${h(job.company || '')}</div>
      ${job.bullets && job.bullets.length
        ? `<ul class="r-bullets">${job.bullets.map(b => `<li>${h(b)}</li>`).join('')}</ul>`
        : ''}
    </div>`).join('');

  const skillsHtml = (data.skills || []).length
    ? `<div class="r-section-title">Skills</div><div class="r-skills">${h((data.skills).join(' · '))}</div>`
    : '';

  modal.innerHTML = `
    <div class="resume-modal-card">
      <div class="resume-toolbar">
        <h2>📄 Tailored resume — ${h(data._target || 'role')}</h2>
        <button class="btn btn-primary btn-sm" onclick="printResume()">Download / Print PDF</button>
        <button class="btn btn-ghost btn-sm" onclick="closeResumeModal()">Close</button>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Review and edit below before printing. Use Cmd+P (Mac) or Ctrl+P (Windows) → Save as PDF.</div>

      <div class="resume-doc" id="resume-doc-content" contenteditable="true" spellcheck="false"
           style="border:1px solid var(--border);border-radius:8px;padding:32px 36px;min-height:600px;outline:none">
        <div class="r-name">${h(data._name || '')}</div>
        <div class="r-headline">${h(data._headline || '')}</div>
        <div class="r-contact">${[data._location, data._email, data._phone, data._linkedinUrl].filter(Boolean).map(v => h(v)).join(' · ') || 'Add contact details in Setup → Profile'}</div>
        <hr class="r-divider">
        <div class="r-section-title">Summary</div>
        <div class="r-summary">${h(data.summary || '')}</div>
        <div class="r-section-title">Experience</div>
        ${experienceHtml}
        ${skillsHtml}
      </div>
    </div>`;

  modal.style.display = 'flex';
}

function closeResumeModal() {
  const modal = document.getElementById('resume-modal');
  if (modal) modal.style.display = 'none';
}

function printResume() {
  const content = document.getElementById('resume-doc-content');
  if (!content) return;
  const name    = content.querySelector('.r-name')?.textContent || 'Resume';
  const win     = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<!DOCTYPE html><html><head>
    <title>${name} — Resume</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Georgia, serif; color: #1a1a1a; line-height: 1.6;
             max-width: 760px; margin: 0 auto; padding: 40px 48px; font-size: 13px; }
      .r-name { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
      .r-headline { font-size: 14px; color: #444; margin-bottom: 5px; }
      .r-contact { font-size: 12px; color: #666; margin-bottom: 16px; }
      hr { border: none; border-top: 2px solid #1a1a1a; margin: 0 0 14px; }
      .r-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
             text-transform: uppercase; color: #444; margin: 16px 0 7px; }
      .r-summary { font-size: 13px; margin-bottom: 4px; }
      .r-job { margin-bottom: 14px; }
      .r-job-header { display: flex; justify-content: space-between; align-items: baseline; }
      .r-job-title { font-size: 13px; font-weight: 700; }
      .r-job-dates { font-size: 11px; color: #666; }
      .r-job-company { font-size: 12px; color: #444; margin-bottom: 4px; }
      ul { margin: 0; padding-left: 16px; }
      li { font-size: 12px; margin-bottom: 2px; }
      .r-skills { font-size: 12px; }
      @media print {
        body { padding: 24px 32px; }
        @page { margin: 0.5in; }
      }
    </style>
  </head><body>${content.innerHTML}</body></html>`);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 400);
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
function init() {
  // Migrate deprecated model names from localStorage
  const storedModel = localStorage.getItem(LS.ai_model);
  if (storedModel && storedModel.startsWith('claude-3')) {
    localStorage.removeItem(LS.ai_model);
  }

  // Migrate bad profile name caused by columnar Profile.csv parsing bug
  try {
    const stored = JSON.parse(localStorage.getItem(LS.profile) || '{}');
    const badNames = ['last name', 'first name', 'lastname', 'firstname'];
    if (stored.name && badNames.includes(stored.name.toLowerCase().trim())) {
      stored.name = '';
      localStorage.setItem(LS.profile, JSON.stringify(stored));
    }
  } catch(e) {}

  loadState();
  updateNavCounts();

  // Warn if opened directly as a file (localStorage won't persist across launchers)
  if (window.location.protocol === 'file:') {
    showBanner('You opened WarmPath directly. Use launch.command (Mac) or launch.bat (Windows) so your data persists consistently. ↗', 'warn');
  }

  // If no real data yet, inject sample data so new users can explore all tabs immediately
  if (state.contacts.length === 0) {
    state.contacts     = SAMPLE_CONTACTS.map(c => ({ ...c }));
    state.TARGET_COS   = ['microsoft', 'razorpay', 'stripe', 'freshworks', 'atlassian'];
    state.COMPANY_INTEL = JSON.parse(JSON.stringify(SAMPLE_COMPANY_INTEL));
    state.JOBS         = SAMPLE_JOBS.map(j => ({ ...j }));
    state.applications = SAMPLE_APPLICATIONS.map(a => ({ ...a }));
  }

  const onboarded = localStorage.getItem(LS.onboarded);
  if (!onboarded && !isSampleMode()) {
    renderContactsTab();
    showOnboarding(1);
  } else {
    renderContactsTab();
  }

  // Backup reminder — show if real data and no backup in 7 days (or never)
  if (!isSampleMode() && state.contacts.length > 0) {
    const lastBackup = localStorage.getItem(LS.last_backup);
    const daysSinceBackup = lastBackup
      ? Math.floor((Date.now() - new Date(lastBackup)) / 86400000)
      : Infinity;
    if (daysSinceBackup > 7) {
      const msg = lastBackup
        ? `💾 Last backup was ${daysSinceBackup} days ago — your data only lives in this browser.`
        : `💾 You haven't backed up WarmPath yet — your data only lives in this browser.`;
      importBanner = { msg, type: 'warn', backupOffer: true };
    }
  }
}

init();

// Close side drawer on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && sideDrawerIdx !== null) closeSideDrawer();
});
