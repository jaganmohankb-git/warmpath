<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarmPath</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg: #f2f0eb;
  --surface: #ffffff;
  --surface2: #f8f7f3;
  --border: #e3e0d8;
  --border2: #ccc9c0;
  --text: #1a1917;
  --muted: #6b6860;
  --faint: #999590;
  --purple: #4a42a8;
  --purple-bg: #eeedf8;
  --teal: #0d6b52;
  --teal-bg: #e0f5ee;
  --amber: #b87115;
  --amber-bg: #faecd8;
  --coral: #963a1a;
  --coral-bg: #faece7;
  --blue: #1759a0;
  --blue-bg: #e5f0fb;
  --green: #2e6e1a;
  --green-bg: #e8f3e0;
  --red: #9e2b2b;
  --red-bg: #fbeaea;
  --radius: 10px;
  --radius-lg: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Nav ── */
.topnav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 20px;
  height: 52px;
}
.nav-brand {
  font-weight: 700;
  font-size: 16px;
  color: var(--purple);
  letter-spacing: -0.3px;
  margin-right: 12px;
  flex-shrink: 0;
}
.nav-tabs { display: flex; gap: 2px; flex: 1; }
.nav-tab {
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  padding: 0 14px;
  height: 52px;
  font-size: 14px;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: 600; }
.nav-action {
  background: var(--purple-bg);
  color: var(--purple);
  border: 1px solid #d0cef0;
  border-radius: var(--radius);
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}
.nav-action:hover { background: #e4e2f4; }

/* ── Layout ── */
.tab-panel { display: none; max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
.tab-panel.active { display: block; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent; transition: opacity 0.15s;
  text-decoration: none;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--purple); color: #fff; border-color: var(--purple); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border2); }
.btn-amber { background: var(--amber-bg); color: var(--amber); border-color: #e8c88a; }
.btn-teal { background: var(--teal-bg); color: var(--teal); border-color: #9dd4c0; }
.btn-red { background: var(--red-bg); color: var(--red); border-color: #e8b4b4; }
.btn-ghost { background: none; color: var(--muted); border-color: transparent; }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 6px; border-radius: 8px; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
  white-space: nowrap;
}
.badge-a { background: var(--teal-bg); color: var(--teal); }
.badge-b { background: var(--amber-bg); color: var(--amber); }
.badge-c { background: var(--surface2); color: var(--faint); border: 1px solid var(--border); }
.badge-not-contacted { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.badge-message-sent  { background: var(--blue-bg); color: var(--blue); }
.badge-replied       { background: var(--teal-bg); color: var(--teal); }
.badge-call-done     { background: var(--green-bg); color: var(--green); }
.badge-referral      { background: var(--purple-bg); color: var(--purple); }
.badge-intro         { background: var(--purple-bg); color: var(--purple); }
.badge-no-response   { background: var(--amber-bg); color: var(--amber); }
.badge-applied       { background: var(--blue-bg); color: var(--blue); }
.badge-screening     { background: var(--amber-bg); color: var(--amber); }
.badge-interview     { background: var(--purple-bg); color: var(--purple); }
.badge-offer         { background: var(--green-bg); color: var(--green); }
.badge-rejected      { background: var(--red-bg); color: var(--red); }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  overflow: hidden;
}
.card-body { padding: 16px; }

/* ── Stats row ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  text-align: center;
}
.stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── Search / filter bar ── */
.filter-bar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
.grade-pill-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.grade-pill-label { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--faint); margin-right: 2px; }
.grade-pill {
  padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border2); background: var(--surface); color: var(--muted);
  cursor: pointer; transition: all 0.12s; white-space: nowrap; line-height: 1.6;
}
.grade-pill:hover { border-color: var(--purple); color: var(--purple); background: var(--surface2); }
.grade-pill.active { border-color: var(--purple); background: var(--purple); color: #fff; }
.grade-pill.pill-a.active  { background: var(--teal);   border-color: var(--teal); }
.grade-pill.pill-b.active  { background: var(--amber);  border-color: var(--amber); color: #7a4f00; }
.grade-pill.pill-c.active  { background: var(--border2);border-color: var(--border2); color: var(--muted); }
.grade-pill.pill-all.active   { background: var(--surface2); border-color: var(--purple); color: var(--purple); }
.grade-pill.pill-target.active{ background: var(--teal); border-color: var(--teal); color: #fff; }
.company-pill-row { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; align-items:center;
  padding:8px 12px; background:var(--teal-bg); border-radius:var(--radius); border:1px solid #b0e4d4; }

.search-input {
  flex: 1; min-width: 200px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 14px;
  background: var(--surface);
  color: var(--text);
  outline: none;
}
.search-input:focus { border-color: var(--purple); }
.filter-select {
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 7px 10px;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  outline: none;
}
.filter-select:focus { border-color: var(--purple); }
.filter-count { font-size: 13px; color: var(--muted); white-space: nowrap; }

/* ── Contact card ── */
.contact-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.contact-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.contact-card.drawer-active {
  border-color: var(--purple);
  box-shadow: 0 0 0 2px var(--purple-bg);
}
.contact-card-header {
  padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start;
  cursor: pointer; user-select: none;
}
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
  flex-shrink: 0; margin-top: 2px;
}
.avatar-a { background: var(--teal); }
.avatar-b { background: var(--amber); }
.avatar-c { background: var(--faint); }
.contact-info { flex: 1; min-width: 0; }
.contact-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
.contact-name { font-weight: 600; font-size: 15px; }
.contact-role { color: var(--muted); font-size: 13px; margin-bottom: 5px; }
.contact-signals { font-size: 12px; color: var(--faint); margin-bottom: 8px; }
.contact-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.contact-link {
  font-size: 12px; color: var(--blue); text-decoration: none;
  padding: 3px 8px; border: 1px solid var(--blue-bg); border-radius: 6px;
  background: var(--blue-bg);
}
.contact-link:hover { opacity: 0.8; }
.grade-select-inline {
  border: 1px solid var(--border2); border-radius: 6px;
  padding: 3px 6px; font-size: 12px; background: var(--surface);
  color: var(--text); cursor: pointer;
}
.outreach-btn {
  margin-left: auto;
  background: var(--purple-bg); color: var(--purple);
  border: 1px solid #d0cef0; border-radius: 6px;
  padding: 4px 12px; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
}
.outreach-btn:hover { background: #e4e2f4; }

/* ── Side drawer ── */
#side-drawer-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.10);
  z-index: 199; cursor: pointer;
}
#side-drawer-overlay.open { display: block; }
/* On desktop push-layout, overlay blocks card clicks — hide it, drawer sits beside the list */
@media (min-width: 960px) {
  #side-drawer-overlay { display: none !important; }
}
#side-drawer {
  position: fixed;
  top: 52px; right: 0; bottom: 0;
  width: 560px; max-width: 92vw;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 200;
  overflow-y: auto;
  box-shadow: -6px 0 28px rgba(0,0,0,0.09);
  transform: translateX(100%);
  transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
}
#side-drawer.open {
  transform: translateX(0);
  pointer-events: all;
}
#side-drawer-header {
  position: sticky; top: 0; z-index: 1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 13px 16px;
  display: flex; align-items: center; gap: 10px;
}
#side-drawer-body { padding: 16px; }
.drawer-close-btn {
  background: none; border: none;
  font-size: 17px; color: var(--muted);
  cursor: pointer; padding: 4px 6px; border-radius: 4px;
  line-height: 1; flex-shrink: 0;
}
.drawer-close-btn:hover { background: var(--surface2); color: var(--text); }
/* legacy inline drawer — kept hidden */
.outreach-drawer { display: none !important; }
.drawer-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--faint); text-transform: uppercase; margin-bottom: 8px;
}
.job-links { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.role-row { display: flex; gap: 8px; margin-bottom: 14px; }
.role-input {
  flex: 1; border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 8px 12px; font-size: 13px; background: var(--surface);
  color: var(--text); outline: none;
}
.role-input:focus { border-color: var(--purple); }
.intel-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.intel-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--muted);
}
.msg-textarea {
  width: 100%; min-height: 140px; border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 12px;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 13px; line-height: 1.6; resize: vertical;
  background: var(--surface); color: var(--text); outline: none;
}
.msg-textarea:focus { border-color: var(--purple); }
.drawer-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
.drawer-status { font-size: 12px; color: var(--muted); }

/* ── Collapsible add form ── */
.add-form-wrap { margin-bottom: 16px; }
.add-form-toggle {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px dashed var(--border2);
  border-radius: var(--radius); padding: 10px 14px;
  cursor: pointer; color: var(--muted); font-size: 13px;
  width: 100%; text-align: left;
}
.add-form-toggle:hover { border-color: var(--purple); color: var(--purple); }
.add-form-body {
  display: none; background: var(--surface);
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  padding: 16px;
}
.add-form-body.open { display: block; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 500; color: var(--muted); }
.form-input, .form-select, .form-textarea {
  border: 1px solid var(--border2); border-radius: 8px;
  padding: 8px 10px; font-size: 13px;
  background: var(--surface); color: var(--text); outline: none;
  font-family: inherit;
}
.form-textarea { resize: vertical; min-height: 70px; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--purple); }
.form-actions { display: flex; gap: 8px; margin-top: 14px; }

/* ── Banner ── */
.banner {
  border-radius: var(--radius); padding: 10px 14px;
  margin-bottom: 14px; font-size: 13px; display: flex;
  align-items: center; justify-content: space-between; gap: 12px;
}
.banner-success { background: var(--teal-bg); color: var(--teal); border: 1px solid #9dd4c0; }
.banner-info    { background: var(--blue-bg); color: var(--blue); border: 1px solid #b0cef0; }
.banner-warn    { background: var(--amber-bg); color: var(--amber); border: 1px solid #e8c88a; }
.banner-error   { background: var(--red-bg); color: var(--red); border: 1px solid #e8b4b4; }
.banner-close { background: none; border: none; cursor: pointer; font-size: 16px; color: inherit; opacity: 0.6; }

/* ── Pipeline board ── */
.pipeline { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
.pipeline-col {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  text-align: center; cursor: pointer; transition: border-color 0.15s;
}
.pipeline-col:hover, .pipeline-col.active { border-color: var(--purple); }
.pipeline-col.active { background: var(--purple-bg); }
.pipeline-num { font-size: 22px; font-weight: 700; line-height: 1; color: var(--text); }
.pipeline-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── App card ── */
.app-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden;
}
.app-card-header { padding: 14px 16px; }
.app-title-row { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.app-company { font-weight: 700; font-size: 15px; }
.app-role { font-size: 13px; color: var(--muted); }
.app-meta { font-size: 12px; color: var(--faint); display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
.app-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.feedback-log { border-top: 1px solid var(--border); padding: 12px 16px; background: var(--surface2); }
.feedback-entry { margin-bottom: 10px; }
.feedback-round { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 2px; }
.feedback-notes { font-size: 13px; color: var(--text); }

/* ── Resume modal ── */
.resume-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 250; display: flex; align-items: flex-start; justify-content: center;
  padding: 24px 16px; overflow-y: auto;
}
.resume-modal-card {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 100%; max-width: 780px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  padding: 28px 32px;
}
.resume-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.resume-toolbar h2 { font-size: 16px; font-weight: 700; margin: 0; flex: 1; }
/* Resume document styles */
.resume-doc { font-family: 'Georgia', serif; color: #1a1a1a; line-height: 1.6; }
.resume-doc .r-name { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
.resume-doc .r-headline { font-size: 14px; color: #444; margin-bottom: 6px; }
.resume-doc .r-contact { font-size: 12px; color: #666; margin-bottom: 18px; }
.resume-doc hr.r-divider { border: none; border-top: 2px solid #1a1a1a; margin: 0 0 14px; }
.resume-doc .r-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #444; margin: 18px 0 8px; }
.resume-doc .r-summary { font-size: 14px; margin-bottom: 4px; }
.resume-doc .r-job { margin-bottom: 14px; }
.resume-doc .r-job-header { display: flex; justify-content: space-between; align-items: baseline; }
.resume-doc .r-job-title { font-size: 14px; font-weight: 700; }
.resume-doc .r-job-dates { font-size: 12px; color: #666; white-space: nowrap; }
.resume-doc .r-job-company { font-size: 13px; color: #444; margin-bottom: 5px; }
.resume-doc .r-bullets { margin: 0; padding-left: 18px; }
.resume-doc .r-bullets li { font-size: 13px; margin-bottom: 3px; }
.resume-doc .r-skills { font-size: 13px; }
@media print {
  .resume-modal-overlay, .resume-toolbar { display: none !important; }
  .resume-print-target { display: block !important; }
}

/* ── HR Templates ── */
.hr-templates { margin-top: 32px; }
.collapsible-header {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; padding: 12px 0; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 14px;
}
.collapsible-header:hover { color: var(--purple); }
.collapsible-body { display: none; padding-top: 14px; }
.collapsible-body.open { display: block; }
.template-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.template-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
.template-text { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.6; margin-bottom: 8px; }

/* ── Setup tab ── */
.setup-section { margin-bottom: 32px; }
.setup-section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.file-upload-list { display: flex; flex-direction: column; gap: 8px; }
.file-upload-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
}
.file-status { font-size: 12px; width: 80px; flex-shrink: 0; }
.file-status.loaded { color: var(--teal); font-weight: 600; }
.file-status.failed { color: var(--red); font-weight: 600; }
.file-status.pending { color: var(--faint); }
.file-name { font-weight: 500; font-size: 13px; flex: 1; }
.file-desc { font-size: 12px; color: var(--muted); }
.file-input-btn { font-size: 12px; }
.dropzone {
  border: 2px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 32px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 16px;
}
.dropzone:hover, .dropzone.dragover { border-color: var(--purple); background: var(--purple-bg); }
.dropzone-label { font-size: 14px; color: var(--muted); }
.dropzone-sub { font-size: 12px; color: var(--faint); margin-top: 4px; }
.data-mgmt-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.scoring-preview { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.scoring-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.scoring-row:last-child { border-bottom: none; }

/* ── Onboarding overlay ── */
.onboarding-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.onboarding-card {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 100%; max-width: 560px; max-height: 90vh;
  overflow-y: auto; padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.onboarding-steps {
  display: flex; gap: 6px; margin-bottom: 28px;
}
.onboarding-step-dot {
  height: 4px; flex: 1; border-radius: 2px;
  background: var(--border);
}
.onboarding-step-dot.done { background: var(--purple); }
.onboarding-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.onboarding-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.onboarding-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
.onboarding-actions .btn-ghost { margin-right: auto; }
.step-instructions { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.8; }

/* ── Grade reviewer modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 150; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-card {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 100%; max-width: 700px; max-height: 88vh;
  overflow-y: auto; padding: 24px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.18);
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.reviewer-table { width: 100%; border-collapse: collapse; }
.reviewer-table th {
  text-align: left; font-size: 11px; font-weight: 600;
  color: var(--faint); text-transform: uppercase; letter-spacing: 0.5px;
  padding: 6px 8px; border-bottom: 2px solid var(--border);
}
.reviewer-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ── App form modal ── */
.app-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.app-form-grid .full { grid-column: 1 / -1; }

/* ── Misc ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-state-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.empty-state-sub { font-size: 13px; color: var(--muted); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
a { color: inherit; }
select option { background: var(--surface); }

@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .pipeline { grid-template-columns: repeat(3, 1fr); }
  .form-grid, .app-form-grid { grid-template-columns: 1fr; }
  .topnav { padding: 0 12px; }
  .tab-panel { padding: 16px 12px 48px; }
}
#tab-contacts {
  transition: padding-right 0.22s cubic-bezier(0.4,0,0.2,1);
}
@media (min-width: 960px) {
  body.side-drawer-open #tab-contacts {
    max-width: none;
    padding-right: 584px;  /* 560px drawer + 24px gap */
    transition: padding-right 0.22s cubic-bezier(0.4,0,0.2,1);
  }
}
/* Sub-tab nav for Setup */
.sub-tab-nav { display:flex; gap:2px; margin-bottom:20px; border-bottom:2px solid var(--border); }
.sub-tab-btn { background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px;
  padding:8px 16px; font-size:14px; color:var(--muted); cursor:pointer; font-weight:500; }
.sub-tab-btn:hover { color:var(--text); }
.sub-tab-btn.active { color:var(--purple); border-bottom-color:var(--purple); font-weight:600; }
</style>
</head>
<body>

<!-- Onboarding overlay -->
<div id="onboarding-overlay" class="onboarding-overlay" style="display:none"></div>

<!-- Grade reviewer modal -->
<div id="grade-review-modal" class="modal-overlay" style="display:none"></div>

<!-- Contact side drawer -->
<div id="side-drawer-overlay" onclick="closeSideDrawer()"></div>
<div id="side-drawer">
  <div id="side-drawer-header"></div>
  <div id="side-drawer-body"></div>
</div>

<!-- App form modal -->
<div id="app-modal" class="modal-overlay" style="display:none"></div>

<!-- Feedback modal -->
<div id="feedback-modal" class="modal-overlay" style="display:none"></div>

<!-- Resume modal -->
<div id="resume-modal" class="resume-modal-overlay" style="display:none" onclick="if(event.target===this)closeResumeModal()"></div>

<!-- Top nav -->
<nav class="topnav">
  <div class="nav-brand">WarmPath</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="contacts" onclick="switchTab('contacts')">
      Network (<span id="nav-a-count">0</span> A)
    </button>
    <button class="nav-tab" data-tab="applications" onclick="switchTab('applications')">
      Applications (<span id="nav-app-count">0</span>)
    </button>
    <button class="nav-tab" data-tab="setup" onclick="switchTab('setup')">
      Setup
    </button>
  </div>
  <button class="nav-action" onclick="openOnboarding()">Setup / Re-import</button>
</nav>

<!-- Tab panels -->
<main>
  <div id="tab-contacts" class="tab-panel active">
    <div class="empty-state">
      <div class="empty-state-icon">🌱</div>
      <div class="empty-state-title">Loading…</div>
    </div>
  </div>
  <div id="tab-applications" class="tab-panel">
    <div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title">Loading…</div>
    </div>
  </div>
  <div id="tab-setup" class="tab-panel">
    <div class="empty-state">
      <div class="empty-state-icon">⚙️</div>
      <div class="empty-state-title">Loading…</div>
    </div>
  </div>
</main>

<script>
'use strict';

// ─────────────────────────────────────────────
// SECTION 1 · Constants & config
// ─────────────────────────────────────────────
const DEFAULT_TARGET_COS = [

  'sprinklr','clevertap','yellow.ai','exotel','juspay','sarvam','keka',

  'atlassian','salesforce','mulesoft','workato','zapier','twilio','stripe',

  'linear','retool','supabase'
];

const LINKEDIN_COMPANY_IDS = {
  freshworks:'1626966', atlassian:'4809', chargebee:'2543029',
  razorpay:'10268668', postman:'10528', setu:'29414442',
  hasura:'18031165', darwinbox:'11388522', sprinklr:'2611821',
  clevertap:'5269444', exotel:'2590029', juspay:'5257875',
  keka:'10524497', zoho:'1062776', salesforce:'1271',
  docusign:'2818', microsoft:'1035', google:'1441',
  twilio:'166119', stripe:'2614441', hubspot:'1166390',
  leadsquared:'3448515'
};

const LS = {
  contacts:'wp_contacts', applications:'wp_applications',
  profile:'wp_profile', msg:'wp_msg', rec:'wp_rec',
  pos:'wp_pos', cofo:'wp_cofo', end:'wp_end',
  skills:'wp_skills', onboarded:'wp_onboarded',
  apikey:'wp_apikey', targets:'wp_targets',
  ai_provider:'wp_ai_provider', ai_model:'wp_ai_model', ai_baseurl:'wp_ai_baseurl',
  job_location:'wp_job_location', last_import:'wp_last_import',

  company_intel:'wp_company_intel'
};

// AI provider defaults
const AI_DEFAULTS = {
  anthropic: { model:'claude-sonnet-4-5', baseurl:'https://api.anthropic.com' },
  openai:    { model:'gpt-4o',            baseurl:'https://api.openai.com' },
  ollama:    { model:'llama3.2',          baseurl:'http://localhost:11434' },
  custom:    { model:'',                  baseurl:'' }
};

const CONTACT_STATUSES = [
  'Not contacted','Message sent','Replied','Call done',
  'Referral given','Intro made','No response'
];

const APP_STATUSES = [
  'Applied','Screening','Round 1','Round 2','Round 3',
  'Final round','Offer received','Offer accepted','Rejected','Withdrawn','On hold'
];

const ACTIVE_APP_STATUSES = new Set([
  'Applied','Screening','Round 1','Round 2','Round 3','Final round','Offer received'
]);

// ─────────────────────────────────────────────
// Sample contacts — shown when localStorage is empty so new users
// can explore the tool before their LinkedIn archive arrives
// ─────────────────────────────────────────────
const SAMPLE_CONTACTS = [
  { name:'Priya Sharma',   company:'Razorpay',    role:'Senior Product Manager',
    grade:'A', score:92, warmthTier:'close-colleague', status:'Not contacted',
    gradeReasons:['at target company','PM title','career overlap','messaged 8 times'], msgCount:8,
    connectedOn:'2022-03-15', _sample:true },
  { name:'Karan Mehta',    company:'Stripe',      role:'Engineering Manager',
    grade:'A', score:74, warmthTier:'colleague',       status:'Not contacted',
    gradeReasons:['at target company','career overlap','connection recency'],          msgCount:3,
    connectedOn:'2023-01-20', _sample:true },
  { name:'Ananya Iyer',    company:'Freshworks',  role:'Senior Talent Partner',
    grade:'A', score:68, warmthTier:'active-contact',  status:'Message sent',
    gradeReasons:['recruiter at target company','messaged 5 times'],                  msgCount:5,
    connectedOn:'2022-11-08', _sample:true },
  { name:'Rohan Gupta',    company:'Atlassian',   role:'Product Lead',
    grade:'B', score:48, warmthTier:'known',            status:'Not contacted',
    gradeReasons:['at target company','PM title'],                                    msgCount:1,
    connectedOn:'2021-06-12', _sample:true },
  { name:'Sneha Patel',    company:'Chargebee',   role:'Head of Product',
    grade:'B', score:42, warmthTier:'known',            status:'Replied',
    gradeReasons:['at target company','senior role'],                                 msgCount:2,
    connectedOn:'2023-05-30', _sample:true },
  { name:'Aditya Nair',    company:'Google',      role:'Staff Software Engineer',
    grade:'B', score:32, warmthTier:'warm-unknown',     status:'Not contacted',
    gradeReasons:['following their company','connection recency'],                    msgCount:0,
    connectedOn:'2022-08-19', _sample:true },
  { name:'Deepika Rao',    company:'Infosys',     role:'HR Manager',
    grade:'C', score:12, warmthTier:'cold',             status:'Not contacted',
    gradeReasons:[],                                                                  msgCount:0,
    connectedOn:'2020-04-05', _sample:true }
];

function isSampleMode() {
  return state.contacts.length > 0 && state.contacts.every(c => c._sample);
}

function clearSampleData() {
  if (isSampleMode()) state.contacts = [];
}

// ─────────────────────────────────────────────
// SECTION 2 · Archive data & state
// ─────────────────────────────────────────────
let state = {
  contacts: [],
  applications: [],
  profile: { name:'', headline:'', bg:'', target:'', currentLevel:'', topSkills:[], location:'' },
  MSG_LOOKUP: {},
  RECOMMENDERS: [],
  POSITIONS_DATA: [],
  COMPANY_FOLLOWS: {},
  ENDORSERS: [],
  SKILLS: [],
  TARGET_COS: [...DEFAULT_TARGET_COS],
  COMPANY_INTEL: {}  // shared cache: normalised-company-name → intel object
};

let activeTab = 'contacts';
let setupSubTab = 'import';
let contactFilters = { grade:'AB', status:'', relationship:'', search:'', targetOnly:false, company:'' };
let contactPage = 1;
const CONTACTS_PER_PAGE = 50;
let expandedCards = new Set();
let importBanner = null;
let onboardStep = 1;

// ─────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'tab-' + tab);
  });
  if (tab === 'contacts') renderContactsTab();
  if (tab === 'applications') renderApplicationsTab();
  if (tab === 'setup') renderSetupTab();
}

function updateNavCounts() {
  const aCount = state.contacts.filter(c => c.grade === 'A').length;
  const appCount = state.applications.filter(a => ACTIVE_APP_STATUSES.has(a.status)).length;
  document.getElementById('nav-a-count').textContent = aCount;
  document.getElementById('nav-app-count').textContent = appCount;
}

// ─────────────────────────────────────────────
// SECTION 10 · Applications tab
// ─────────────────────────────────────────────

let appPipelineFilter = '';
let appReferrerFilter = '';

const PIPELINE_STAGES = [
  { label: 'Applied',     statuses: ['Applied'] },
  { label: 'Screening',   statuses: ['Screening'] },
  { label: 'Interviewing',statuses: ['Round 1','Round 2','Round 3'] },
  { label: 'Final',       statuses: ['Final round'] },
  { label: 'Offer',       statuses: ['Offer received','Offer accepted'] }
];

function renderApplicationsTab() {
  const el = document.getElementById('tab-applications');
  const apps = state.applications;

  // Pipeline counts
  const pipelineHtml = PIPELINE_STAGES.map(stage => {
    const count = apps.filter(a => stage.statuses.includes(a.status)).length;
    const isActive = stage.statuses.some(s => appPipelineFilter === s);
    return `<div class="pipeline-col ${isActive ? 'active' : ''}"
      onclick="appPipelineFilter='${isActive ? '' : stage.statuses[0]}'; renderApplicationsTab()">
      <div class="pipeline-num">${count}</div>
      <div class="pipeline-label">${stage.label}</div>
    </div>`;
  }).join('');

  // Filter apps
  let filtered = apps;
  if (appPipelineFilter) {
    const stage = PIPELINE_STAGES.find(s => s.statuses.includes(appPipelineFilter));
    if (stage) filtered = apps.filter(a => stage.statuses.includes(a.status));
  }
  if (appReferrerFilter) {
    filtered = filtered.filter(a =>
      (a.referredBy || '').toLowerCase().trim() === appReferrerFilter.toLowerCase().trim()
    );
  }
  // Sort: active first, then by dateApplied desc
  filtered = [...filtered].sort((a, b) => {
    const aActive = ACTIVE_APP_STATUSES.has(a.status) ? 1 : 0;
    const bActive = ACTIVE_APP_STATUSES.has(b.status) ? 1 : 0;
    if (aActive !== bActive) return bActive - aActive;
    return (b.dateApplied || '').localeCompare(a.dateApplied || '');
  });

  let html = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
      <div>
        ${appReferrerFilter ? `<span class="banner banner-info" style="display:inline-flex;padding:6px 12px">
          Referred by: <strong style="margin:0 6px">${h(appReferrerFilter)}</strong>
          <button class="banner-close" onclick="appReferrerFilter=''; renderApplicationsTab()">✕</button>
        </span>` : ''}
      </div>
      <button class="btn btn-primary" onclick="openAppModal()">+ Add application</button>
    </div>
    <div class="pipeline">${pipelineHtml}</div>`;

  if (filtered.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title">${apps.length === 0 ? 'No applications yet' : 'No applications in this stage'}</div>
      <div class="empty-state-sub">${apps.length === 0 ? 'Click "+ Add application" to start tracking.' : ''}</div>
    </div>`;
  } else {
    filtered.forEach(app => {
      const idx = state.applications.indexOf(app);
      html += renderAppCard(app, idx);
    });
  }

  // HR email templates
  html += renderHRTemplates();

  el.innerHTML = html;
}

function renderAppCard(app, idx) {
  const nextInfo = app.nextDate
    ? `${fmtDate(app.nextDate)}${app.interviewer ? ' · ' + app.interviewer : ''}`
    : '';
  const feedbackHtml = (app.feedback || []).map(fb => `
    <div class="feedback-entry">
      <div class="feedback-round">${h(fb.round)} · ${h(fmtDate(fb.date))} · <span style="color:${fb.outcome==='Passed'?'var(--green)':'var(--red)'}">${h(fb.outcome)}</span></div>
      <div class="feedback-notes">${h(fb.notes || '')}</div>
    </div>`).join('');

  return `<div class="app-card">
    <div class="app-card-header">
      <div class="app-title-row">
        <span class="app-company">${h(app.company)}</span>
        ${appStatusBadge(app.status)}
        ${app.via === 'Referral' ? `<span class="badge badge-referral">via Referral</span>` : ''}
      </div>
      <div class="app-role">${h(app.role)}</div>
      <div class="app-meta">
        ${app.referredBy ? `<span>Referred by: ${h(app.referredBy)}</span>` : ''}
        ${nextInfo ? `<span>Next: ${h(nextInfo)}</span>` : ''}
        ${app.dateApplied ? `<span>Applied: ${h(fmtDate(app.dateApplied))}</span>` : ''}
        ${app.notes ? `<span style="max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(app.notes)}</span>` : ''}
      </div>
      <div class="app-actions">
        <button class="btn btn-secondary btn-sm" onclick="openFeedbackModal(${idx})">+ Feedback</button>
        <button class="btn btn-secondary btn-sm" onclick="openAppModal(${idx})">Edit</button>
        <button class="btn btn-red btn-sm" onclick="removeApp(${idx})">Remove</button>
        ${app.company ? `<button class="btn btn-ghost btn-sm" onclick="loadAppCompanyIntel(${idx})" id="app-intel-btn-${idx}">Load intel</button>` : ''}
      </div>
      ${(() => { const ci = app.company ? state.COMPANY_INTEL[coKey(app.company)] : null; return ci ? `<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        ${ci.glassdoorRating ? `<span class="intel-chip">Glassdoor ${ci.glassdoorRating} ★</span>` : ''}
        ${ci.salaryRange     ? `<span class="intel-chip">${h(ci.salaryRange)}</span>` : ''}
        ${ci.reviewSentiment ? `<span class="intel-chip" title="${h(ci.reviewSentiment)}">Reviews ℹ</span>` : ''}
      </div>` : ''; })()}
    </div>
    ${feedbackHtml ? `<div class="feedback-log">${feedbackHtml}</div>` : ''}
  </div>`;
}

function openAppModal(idx) {
  const modal = document.getElementById('app-modal');
  const app = idx !== undefined ? state.applications[idx] : null;
  const title = app ? 'Edit application' : 'Add application';

  modal.innerHTML = `<div class="modal-card">
    <div class="modal-title">${title}</div>
    <div style="height:16px"></div>
    <div class="app-form-grid">
      <div class="form-field"><label class="form-label">Company *</label>
        <input class="form-input" id="af-company" value="${h(app?.company||'')}" placeholder="Company name"></div>
      <div class="form-field"><label class="form-label">Role *</label>
        <input class="form-input" id="af-role" value="${h(app?.role||'')}" placeholder="Role title"></div>
      <div class="form-field"><label class="form-label">Applied via</label>
        <select class="form-select" id="af-via">
          ${['Referral','Direct apply','Recruiter inbound','LinkedIn Easy Apply','Agency'].map(v =>
            `<option ${(app?.via||'')==v?'selected':''}>${v}</option>`).join('')}
        </select></div>
      <div class="form-field"><label class="form-label">Referred by</label>
        <input class="form-input" id="af-ref" value="${h(app?.referredBy||'')}"
          placeholder="Type to search contacts…"
          list="af-ref-list" autocomplete="off">
        <datalist id="af-ref-list">
          ${state.contacts.filter(c=>c.grade==='A'||c.grade==='B').sort((a,b)=>(b.score||0)-(a.score||0)).map(c=>`<option value="${h(c.name)}">${h(c.name)} — ${h(c.company||'')}</option>`).join('')}
        </datalist></div>
      <div class="form-field"><label class="form-label">Date applied</label>
        <input class="form-input" type="date" id="af-date" value="${app?.dateApplied||''}"></div>
      <div class="form-field"><label class="form-label">Status</label>
        <select class="form-select" id="af-status">
          ${APP_STATUSES.map(s => `<option ${(app?.status||'')==s?'selected':''}>${s}</option>`).join('')}
        </select></div>
      <div class="form-field"><label class="form-label">Next interview date/time</label>
        <input class="form-input" type="datetime-local" id="af-next" value="${app?.nextDate||''}"></div>
      <div class="form-field"><label class="form-label">Next round / interviewer</label>
        <input class="form-input" id="af-interviewer" value="${h(app?.interviewer||'')}" placeholder="e.g. Round 2 — VP Product"></div>
      <div class="form-field full"><label class="form-label">Notes</label>
        <textarea class="form-textarea" id="af-notes">${h(app?.notes||'')}</textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAppModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAppModal(${idx !== undefined ? idx : 'null'})">Save</button>
    </div>
  </div>`;
  modal.style.display = 'flex';
}

function closeAppModal() { document.getElementById('app-modal').style.display = 'none'; }

function saveAppModal(idx) {
  const company    = document.getElementById('af-company')?.value?.trim() || '';
  const role       = document.getElementById('af-role')?.value?.trim()    || '';
  if (!company || !role) { alert('Company and role are required.'); return; }

  const referredBy = document.getElementById('af-ref')?.value?.trim() || '';
  const via        = document.getElementById('af-via')?.value || 'Direct apply';

  const appData = {
    company, role, via, referredBy,
    dateApplied: document.getElementById('af-date')?.value || new Date().toISOString().slice(0,10),
    status:      document.getElementById('af-status')?.value || 'Applied',
    nextDate:    document.getElementById('af-next')?.value || '',
    interviewer: document.getElementById('af-interviewer')?.value?.trim() || '',
    notes:       document.getElementById('af-notes')?.value?.trim() || '',
    feedback:    idx !== null && state.applications[idx] ? state.applications[idx].feedback || [] : []
  };

  if (idx !== null && state.applications[idx]) {
    state.applications[idx] = { ...state.applications[idx], ...appData };
  } else {
    state.applications.unshift(appData);
  }
  saveApplications();
  updateNavCounts();

  // If referredBy is set and via Referral, update that contact's status
  if (referredBy && via === 'Referral') {
    const refContact = state.contacts.find(c =>
      c.name.toLowerCase().trim() === referredBy.toLowerCase().trim()
    );
    if (refContact) {
      refContact.status = 'Referral given';
      saveContacts();
    } else {
      // Referrer not in contacts — offer to add them
      if (confirm(`"${referredBy}" is not in your contacts. Add them now?`)) {
        const newC = {
          name: referredBy, company, position: '', role: `Referrer at ${company}`,
          relationship: 'Referral contact', grade: 'A', score: 60,
          gradeReasons: ['referred you'], warmthTier: 'known', msgCount: 0,
          status: 'Referral given', notes: `Referred for ${role} at ${company}`,
          url: '', connectedOn: '', source: 'manual',
          lastContacted: new Date().toISOString().slice(0,10), savedRole: role
        };
        state.contacts.unshift(newC);
        saveContacts();
        updateNavCounts();
      }
    }
  }

  const outcome = document.getElementById('fb-outcome')?.value || 'Passed';

  if (!state.applications[idx]) return;
  if (!state.applications[idx].feedback) state.applications[idx].feedback = [];

  saveApplications();

async function loadAppCompanyIntel(idx) {
  const app = state.applications[idx];
  if (!app || !app.company) return;
  const cfg = getAIConfig();
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    alert('Add an AI provider in Setup first.');
    return;
  }

  const key = coKey(app.company);

  // If cached and less than 7 days old, just re-render (no fetch needed)
  const cached = state.COMPANY_INTEL[key];
  if (cached?.fetchedAt) {
    const ageDays = (Date.now() - new Date(cached.fetchedAt)) / 86400000;
    if (ageDays < 7) { renderApplicationsTab(); return; }
  }

  const btn = document.getElementById(`app-intel-btn-${idx}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }

  const prompt = `What do you know about "${app.company}" as a place to work?
Return ONLY a JSON object:
{"glassdoorRating":number_or_null,"salaryRange":"e.g. ₹35-55L for Staff PM or null","reviewSentiment":"one sentence or null"}
No other text. Use null for unknown fields.`;

  try {
    let text = '';
    try {
      text = await callAI(prompt, 300, cfg.provider === 'anthropic');
    } catch(e2) {
      text = await callAI(prompt, 300, false);
    }
    const match = text.match(/\{[\s\S]*\}/);
    const intel = match ? JSON.parse(match[0]) : {};
    intel.fetchedAt = new Date().toISOString();

    // Write to shared cache
    state.COMPANY_INTEL[key] = intel;
    saveCompanyIntel();

    // Refresh contacts at this company + all app cards
    state.contacts.forEach((ct, i) => {
      if (coKey(ct.company) === key) renderDrawerContent(i);
    });
    renderApplicationsTab();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Load intel'; }
    alert(`Failed: ${e.message}`);
  }
}

async function suggestTargetCompanies() {
  const cfg = getAIConfig();
  const statusEl = document.getElementById('suggest-co-status');
  const resultsEl = document.getElementById('suggest-co-results');
  const btn = document.getElementById('suggest-co-btn');
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    if (statusEl) statusEl.textContent = 'Add an AI key in AI Settings to use this feature.';
    return;
  }
  const p = state.profile;
  if (!p.target && !p.bg && !p.currentLevel) {
    if (statusEl) statusEl.textContent = 'Fill in your profile (target role, background) first.';
    return;
  }
  if (btn) btn.disabled = true;
  if (statusEl) { statusEl.style.color = 'var(--muted)'; statusEl.textContent = 'Thinking…'; }
  if (resultsEl) resultsEl.style.display = 'none';

  const prompt = `You are helping a senior professional identify the best target companies for their job search.

THEIR PROFILE:
Role/level: ${p.currentLevel || ''}
Target: ${p.target || ''}
Background: ${p.bg || ''}
Company type preference: ${p.companyType || 'any'}
Location: ${p.location || 'India'}
Why looking: ${p.whyLooking || ''}
Current company (exclude this): ${p.currentCompany || ''}

TASK: Suggest 15 specific companies that are an excellent fit for this person's job search.
Focus on companies that:
1. Hire for roles like "${p.target || p.currentLevel || 'senior product manager'}"
2. Match the company type preference: ${p.companyType || 'any size'}
3. Are realistic targets (not too large/small for their level)
4. Are in ${p.location || 'India'} or hire remotely

Return ONLY a JSON array of company names (no descriptions, no markdown):
["Company A", "Company B", "Company C", ...]`;

  try {
    const raw = await callAI(prompt, 600);
    const match = raw.match(/\[[\s\S]*?\]/);
    if (!match) throw new Error('No array found in response');
    const suggestions = JSON.parse(match[0]).filter(Boolean);
    const existing = [...state.TARGET_COS];
    if (btn) btn.disabled = false;
    if (statusEl) { statusEl.style.color = 'var(--teal)'; statusEl.textContent = `${suggestions.length} suggestions ready`; }
    if (resultsEl) {
      resultsEl.style.display = 'block';
      resultsEl.innerHTML = `
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">Select companies to add to your target list:</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
          ${suggestions.map((co, i) => {
            const already = existing.some(t => co.toLowerCase().includes(t) || t.includes(co.toLowerCase()));
            return `<label style="display:inline-flex;align-items:center;gap:5px;font-size:13px;padding:4px 10px;
              border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--surface2)">
              <input type="checkbox" class="co-suggestion-cb" value="${h(co)}" ${already?'':'checked'}>
              ${h(co)}${already?' <span style="color:var(--teal);font-size:11px">✓ in list</span>':''}
            </label>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="addSuggestedCompanies()">Add selected to my list</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('suggest-co-results').style.display='none'">Dismiss</button>
        </div>`;
    }
  } catch(e) {
    if (btn) btn.disabled = false;
    if (statusEl) { statusEl.style.color = 'var(--red)'; statusEl.textContent = 'Error: ' + e.message.slice(0, 60); }
  }
}

function addSuggestedCompanies() {
  const cbs = document.querySelectorAll('.co-suggestion-cb:checked');
  const newCos = Array.from(cbs).map(cb => cb.value.toLowerCase().trim()).filter(Boolean);
  if (!newCos.length) return;
  const existing = getCustomTargets();
  const merged = [...new Set([...existing, ...newCos])];
  saveCustomTargets(merged);
  // Update textarea
  const ta = document.getElementById('sp-custom-targets');
  if (ta) ta.value = merged.join('\n');
  reScoreAll();
  updateNavCounts();
  const statusEl = document.getElementById('suggest-co-status');

  if (activeTab === 'contacts') renderContactsList();
}

async function handleZipFile(file) {
  const statusEl = document.getElementById('zip-status');
  if (statusEl) statusEl.innerHTML = `<div class="banner banner-info">Processing ${h(file.name)}…</div>`;
  try {
    const results = await processZipFile(file);
    let added=0, merged=0, loaded=[];
    results.forEach(r => {
      if (r.error) { fileStatuses[r.type] = 'failed'; }
      else {
        fileStatuses[r.type] = 'loaded';
        loaded.push(r.type);
        if (r.result?.added)  added  += r.result.added;
        if (r.result?.merged) merged += r.result.merged;
      }
    });
    updateNavCounts();
    const aCount = state.contacts.filter(c => c.grade==='A').length;
    const bCount = state.contacts.filter(c => c.grade==='B').length;
    const msg = `${state.contacts.length} contacts loaded — ${aCount} Grade A · ${bCount} Grade B${merged ? ` · ${merged} merged` : ''}`;
    localStorage.setItem(LS.onboarded, '1');
    localStorage.setItem(LS.last_import, new Date().toISOString().slice(0,10));
    importBanner = { msg, type: 'success' };
    // Offer memory cleanup if message data was loaded (it can be 3-5MB)
    const msgCount = Object.keys(state.MSG_LOOKUP).length;
    if (msgCount > 0) {
      importBanner.memOffer = true;
    }
    renderSetupTab();
    if (activeTab === 'contacts') { renderContactsTab(); } else { renderContactsList(); }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<div class="banner banner-error">${h(e.message)}</div>`;
  }
}

async function handleSingleFile(type, input) {
  const file = input.files[0];
  if (!file) return;
  clearSampleData();
  try {
    const text = await file.text();
    const result = processFile(file.name, text);
    fileStatuses[type] = 'loaded';
    updateNavCounts();
    const el = document.getElementById(`fstat-${type}`);
    if (el) { el.className = 'file-status loaded'; el.textContent = '✓ Loaded'; }
    let msg = `${file.name} loaded`;
    if (result?.added)  msg += ` — ${result.added} added`;
    if (result?.merged) msg += `, ${result.merged} merged`;
    if (result?.total)  msg += ` (${result.total} total)`;
    importBanner = { msg, type: 'success' };
    localStorage.setItem(LS.onboarded, '1');
    renderSetupTab();
    if (activeTab === 'contacts') { renderContactsTab(); } else { renderContactsList(); }
  } catch(e) {
    fileStatuses[type] = 'failed';
    const el = document.getElementById(`fstat-${type}`);
    if (el) { el.className = 'file-status failed'; el.textContent = '✗ Failed'; }
    alert(`Error processing ${file.name}: ${e.message}`);
  }
}

  if (grade === 'AB') list = list.filter(c => c.grade === 'A' || c.grade === 'B');
  else if (grade)     list = list.filter(c => c.grade === grade);
  // Target company filter — restrict to contacts whose company is in TARGET_COS
  if (targetOnly || company) {
    list = list.filter(c => {
      const co = (c.company || '').toLowerCase().trim();
      return co && state.TARGET_COS.some(t => co.includes(t));
    });
  }
  // Company sub-filter — drill down to a specific company
  if (company) {
    list = list.filter(c => (c.company || '').toLowerCase().includes(company));
  }
  if (status)       list = list.filter(c => c.status === status);
  if (relationship) list = list.filter(c => (c.relationship || '').toLowerCase().includes(relationship.toLowerCase()));
  if (search) {
    const q = search.toLowerCase();
    list = list.filter(c =>
      (c.name    || '').toLowerCase().includes(q) ||
      (c.company || '').toLowerCase().includes(q) ||
      (c.role    || '').toLowerCase().includes(q)
    );
  }
  const gradeOrder = { A: 0, B: 1, C: 2 };
  list.sort((a, b) => {
    const ga = gradeOrder[a.grade] ?? 2;
    const gb = gradeOrder[b.grade] ?? 2;
    if (ga !== gb) return ga - gb;
    return (b.score || 0) - (a.score || 0);
  });
  return list;
}

function renderContactsList() {
  const listEl = document.getElementById('contacts-list');
  if (!listEl) { renderContactsTab(); return; }

  const contacts = state.contacts;
  const filtered = getFilteredContacts();

  // Update filter count
  const countEl = document.getElementById('filter-count');
  if (countEl) countEl.textContent = `${filtered.length} shown`;

  // Company pill row — populate when targetOnly is active
  const cpRow = document.getElementById('company-pill-row');
  if (cpRow) {
    if (contactFilters.targetOnly) {
      // Build list of target companies that actually have contacts (any grade)
      const coMap = {};
      state.contacts.forEach(c => {
        const co = (c.company || '').trim();
        const coL = co.toLowerCase();
        if (co && state.TARGET_COS.some(t => coL.includes(t))) {
          coMap[coL] = coMap[coL] || { display: co, count: 0 };
          coMap[coL].count++;
        }
      });
      const coList = Object.entries(coMap).sort((a, b) => b[1].count - a[1].count);
      cpRow.innerHTML =
        `<span class="grade-pill-label" style="color:var(--teal)">Company:</span>` +
        `<button class="grade-pill ${!contactFilters.company?'active':''}" onclick="setCompanyFilter('')">All (${coList.reduce((s,[,v])=>s+v.count,0)})</button>` +
        coList.map(([coL, {display, count}]) =>
          `<button class="grade-pill ${contactFilters.company===coL?'active':''}" onclick="setCompanyFilter('${coL.replace(/'/g,"\\'")}')">${h(display)} <span style="opacity:0.65">${count}</span></button>`
        ).join('');
      cpRow.style.display = 'flex';
    } else {
      cpRow.style.display = 'none';
      cpRow.innerHTML = '';
    }
  }

  // Clear button: show when non-default filters active (default = grade:'AB', no other filters)
  const filtersActive = contactFilters.grade !== 'AB' || contactFilters.status || contactFilters.relationship || contactFilters.search || contactFilters.targetOnly || contactFilters.company;
  const bar = document.getElementById('contacts-filter-bar');
  if (bar) {
    let clearBtn = bar.querySelector('.clear-filters-btn');
    if (filtersActive && !clearBtn) {
      const countSpan = bar.querySelector('.filter-count');
      const btn = document.createElement('button');
      btn.className = 'btn btn-ghost btn-sm clear-filters-btn';
      btn.textContent = '✕ Reset';
      btn.onclick = clearContactFilters;
      bar.insertBefore(btn, countSpan);
    } else if (!filtersActive && clearBtn) {
      clearBtn.remove();
    }
  }

  // Sample data banner — shown until real data is uploaded
  let html = '';
  if (isSampleMode()) {
    html += `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;
        padding:12px 16px;margin-bottom:16px;border-radius:var(--radius);
        background:#fefce8;border:1.5px solid #fde047;color:#713f12;font-size:13px">
      <span style="font-size:18px">👋</span>
      <span style="flex:1"><strong>This is sample data</strong> — explore how WarmPath works while you wait for your LinkedIn archive.</span>
      <button class="btn btn-sm" style="background:#713f12;color:#fff;border:none;white-space:nowrap"
        onclick="switchTab('setup')">Upload my LinkedIn data →</button>
    </div>`;
  }

  // Import banner
  if (importBanner) {
    html += `<div class="banner banner-${importBanner.type||'success'}" style="flex-wrap:wrap;gap:8px">
      <span style="flex:1">${h(importBanner.msg)}</span>
      ${importBanner.memOffer ? `<button class="btn btn-secondary btn-sm" style="white-space:nowrap"
        onclick="freeMessageMemory()">🗜 Free up memory</button>` : ''}
      <button class="banner-close" onclick="importBanner=null; renderContactsList()">✕</button>
    </div>`;
  }

  if (contacts.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-icon">👥</div>
      <div class="empty-state-title">No contacts yet</div>
      <div class="empty-state-sub">Import your LinkedIn archive in <a href="#" onclick="switchTab('setup'); return false" style="color:var(--purple)">Setup</a> to get started.</div>
    </div>`;
  } else if (filtered.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-title">No contacts match your filters</div>
      <div class="empty-state-sub"><a href="#" onclick="clearContactFilters(); return false" style="color:var(--purple)">Clear filters</a></div>
    </div>`;
  } else {
    const pageSlice = filtered.slice(0, contactPage * CONTACTS_PER_PAGE);
    const showHeaders = contactFilters.grade === 'AB' || contactFilters.grade === '';
    let lastGrade = null;
    const gradeLabels = { A: '🔥 Warm — Grade A', B: '★ Lukewarm — Grade B', C: '❄ Cold — Grade C' };
    pageSlice.forEach(contact => {
      const idx = state.contacts.indexOf(contact);
      if (showHeaders && contact.grade !== lastGrade) {
        lastGrade = contact.grade;
        html += `<div style="font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
          color:var(--muted);padding:14px 0 6px;border-top:1px solid var(--border);margin-top:${lastGrade==='A'?'0':'4px'}">
          ${gradeLabels[contact.grade] || contact.grade}
        </div>`;
      }
      html += renderContactCard(contact, idx);
    });
    if (filtered.length > pageSlice.length) {
      const remaining = filtered.length - pageSlice.length;
      html += `<div style="text-align:center;padding:20px 0 28px">
        <button class="btn btn-secondary" onclick="contactPage++; renderContactsList()">
          Load more (${remaining} remaining)
        </button>
      </div>`;
    }
  }

  listEl.innerHTML = html;

  // Restore active card highlight after list re-render
  if (sideDrawerIdx !== null) {
    const card = document.querySelector(`.contact-card[data-idx="${sideDrawerIdx}"]`);
    if (card) card.classList.add('drawer-active');
  }
}

function setGradeFilter(grade) {
  contactFilters.grade = grade;
  contactPage = 1;
  // Update pill active states — but leave the target pill alone
  const pillMap = { '':'pill-all', 'A':'pill-a', 'B':'pill-b', 'C':'pill-c', 'AB':'pill-ab' };
  document.querySelectorAll('.grade-pill:not(.pill-target)').forEach(p => p.classList.remove('active'));
  const cls = pillMap[grade];
  if (cls) { const el = document.querySelector(`.grade-pill.${cls}`); if (el) el.classList.add('active'); }
  renderContactsList();
}

function setTargetFilter() {
  contactFilters.targetOnly = !contactFilters.targetOnly;
  if (!contactFilters.targetOnly) contactFilters.company = ''; // clear sub-filter when toggling off
  contactPage = 1;
  const btn = document.querySelector('.grade-pill.pill-target');
  if (btn) btn.classList.toggle('active', contactFilters.targetOnly);
  renderContactsList();
}

function setCompanyFilter(co) {
  contactFilters.company = co;
  contactPage = 1;
  renderContactsList();
}

function clearContactFilters() {
  contactFilters = { grade:'AB', status:'', relationship:'', search:'', targetOnly:false, company:'' };
  contactPage = 1;
  const s = document.getElementById('contact-search'); if (s) s.value = '';
  const st= document.getElementById('filter-status'); if (st) st.value = '';
  const r = document.getElementById('filter-rel');    if (r) r.value = '';
  // Reset pills
  document.querySelectorAll('.grade-pill').forEach(p => p.classList.remove('active'));
  const ab = document.querySelector('.grade-pill.pill-ab'); if (ab) ab.classList.add('active');
  renderContactsList();
}

function renderContactCard(c, idx) {
  const initials  = avatarInitials(c.name);
  const avatarCls = c.grade === 'A' ? 'avatar-a' : c.grade === 'B' ? 'avatar-b' : 'avatar-c';
  const slug      = ((c.url || '').split('/in/')[1] || '').replace(/\/$/, '').split('/')[0];
  const liUrl     = c.url || `https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(c.name)}`;
  // LinkedIn message: link to profile (compose URL doesn't reliably pre-select by slug)
  const msgUrl    = slug ? `https://www.linkedin.com/in/${slug}` : liUrl;
  // Gmail: pre-fill subject + draft body if available
  const subject   = c.company ? `Exploring opportunities at ${h(c.company)}` : 'Following up';
  const body      = c._draftMsg || getStaticTemplate((c.warmthTier||'cold'), c, state.profile);
  const gmailUrl  = `https://mail.google.com/mail/?view=cm&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  const signals   = [...(c.gradeReasons || []), c.score ? `score ${c.score}` : ''].filter(Boolean).join(' · ');
  const referredApps = state.applications.filter(a =>
    (a.referredBy || '').toLowerCase().trim() === (c.name || '').toLowerCase().trim()
  );
  const referralBadge = referredApps.length > 0
    ? `<span class="badge badge-referral" style="cursor:pointer" title="Click to view applications referred by ${h(c.name)}"
        onclick="appReferrerFilter='${h(c.name)}'; switchTab('applications')">
        🔗 Referred ${referredApps.length} app${referredApps.length > 1 ? 's' : ''}
      </span>`
    : '';

  return `<div class="contact-card" id="card-${idx}" data-idx="${idx}">
    <div class="contact-card-header" onclick="handleCardClick(event,${idx})">
      <div class="avatar ${avatarCls}">${h(initials.toUpperCase())}</div>
      <div class="contact-info">
        <div class="contact-name-row">
          <span class="contact-name">${h(c.name)}</span>
          ${gradeBadge(c.grade)}
          ${statusBadge(c.status)}
          ${referralBadge}
        </div>
        <div class="contact-role">${h(c.role || [c.position, c.company].filter(Boolean).join(', ') || '—')}</div>
        ${signals ? `<div class="contact-signals">${h(signals)}</div>` : ''}
        <div class="contact-actions">
          ${c.company ? `<a class="contact-link" style="font-weight:600;color:var(--purple)" href="${h(getJobLinks(c.company, state.profile.target)[0].url)}" target="_blank" rel="noopener" title="Search open roles at ${h(c.company)}" onclick="event.stopPropagation()">Jobs ↗</a>` : ''}
          <a class="contact-link" href="${h(liUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="View LinkedIn profile">Profile ↗</a>
          <a class="contact-link" href="${h(msgUrl)}" target="_blank" rel="noopener" title="Opens their LinkedIn profile — click Message from there" onclick="event.stopPropagation()">Message ↗</a>
          <select class="grade-select-inline" onchange="updateContactStatus(${idx}, this.value)" style="width:130px" onclick="event.stopPropagation()">
            ${CONTACT_STATUSES.map(s => `<option value="${h(s)}" ${c.status===s?'selected':''}>${h(s)}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
  </div>`;
}

let sideDrawerIdx = null;

// Card click — open drawer or silently switch to another contact (never close on card click)

  if (e.target.closest('a, button, select, input, textarea')) return;
  openSideDrawer(idx);
}

function toggleDrawer(idx) { openSideDrawer(idx); } // kept for any legacy calls

function openSideDrawer(idx) {
  const c = state.contacts[idx];
  if (!c) return;

  const alreadyOpen = sideDrawerIdx !== null;
  sideDrawerIdx = idx;

  // Highlight active card, remove from all others
  document.querySelectorAll('.contact-card.drawer-active').forEach(el => el.classList.remove('drawer-active'));
  const activeCard = document.querySelector(`.contact-card[data-idx="${idx}"]`);
  if (activeCard) activeCard.classList.add('drawer-active');

  // Update header (always — content may have changed)
  document.getElementById('side-drawer-header').innerHTML = `
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(c.name)}</div>
      <div style="font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
        ${h(c.company || '')}${c.role ? ' · ' + h(c.role) : ''}
      </div>
    </div>
    ${gradeBadge(c.grade)}
    <button class="drawer-close-btn" onclick="closeSideDrawer()" title="Close (Esc)">✕</button>`;

  if (!alreadyOpen) {
    document.getElementById('side-drawer').classList.add('open');
    document.getElementById('side-drawer-overlay').classList.add('open');

function closeSideDrawer() {
  sideDrawerIdx = null;
  document.getElementById('side-drawer').classList.remove('open');
  document.getElementById('side-drawer-overlay').classList.remove('open');
  document.body.classList.remove('side-drawer-open');

}

function getJobLinks(company, targetRoles) {
  const co = (company || '').toLowerCase();
  // Use only the first/primary target role for the keyword
  const primaryRole = (targetRoles || 'product manager').split(/[,;\/]/)[0].trim() || 'product manager';
  const kw = encodeURIComponent(primaryRole);
  const jobLocation = localStorage.getItem(LS.job_location) || 'India';
  const locKw = encodeURIComponent(jobLocation);

  // Tight company ID match — exact key match only, no partial
  const liId = Object.entries(LINKEDIN_COMPANY_IDS).find(([k]) => co === k || co.startsWith(k + ' ') || co.endsWith(' ' + k))?.[1]
    || Object.entries(LINKEDIN_COMPANY_IDS).find(([k]) => co.includes(k) && k.length >= 5)?.[1];

  const links = [];
  if (liId) {
    links.push({ label: `LinkedIn Jobs`, url: `https://www.linkedin.com/jobs/search/?f_C=${liId}&keywords=${kw}&location=${locKw}&f_TPR=r2592000` });
  } else {
    links.push({ label: `LinkedIn Jobs`, url: `https://www.linkedin.com/jobs/search/?keywords=${kw}+${encodeURIComponent(company)}&location=${locKw}&f_TPR=r2592000` });
  }
  links.push({ label: `Careers`, url: `https://www.google.com/search?q=${encodeURIComponent(company)}+careers+${kw}` });
  links.push({ label: `Indeed`, url: `https://in.indeed.com/jobs?q=${kw}&l=${locKw}` });
  links.push({ label: `Naukri`, url: `https://www.naukri.com/jobs-in-india?keyword=${kw}` });
  return links;
}

  const msgUrl = slug ? `https://www.linkedin.com/in/${slug}` : liUrl;
  const jobLinks = getJobLinks(c.company, state.profile.target);

  } else {
    intelHtml = `<button class="btn btn-secondary btn-sm" onclick="loadCompanyIntel(${idx})" id="intel-btn-${idx}">→ Load intel</button>
      <span id="intel-result-${idx}" style="font-size:12px;color:var(--muted)"></span>`;
  }

  drawer.innerHTML = `
    <div style="padding:4px 0 12px">
      <div class="drawer-section-label">Grade</div>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button class="btn btn-sm${c.grade==='A'?' btn-teal':' btn-ghost'}" onclick="updateContactGrade(${idx},'A');renderDrawerContent(${idx})">A</button>
        <button class="btn btn-sm${c.grade==='B'?' btn-amber':' btn-ghost'}" onclick="updateContactGrade(${idx},'B');renderDrawerContent(${idx})">B</button>

      </div>

          placeholder="What did they say about your fit, the team, open roles…">${h(c._note || '')}</textarea>
