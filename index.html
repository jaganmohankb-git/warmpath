function renderContactsList() {
  const listEl = document.getElementById('contacts-list');
  if (!listEl) { renderContactsTab(); return; }

  const contacts = state.contacts;
  const filtered = getFilteredContacts();

  // Update filter count
  const countEl = document.getElementById('filter-count');
  if (countEl) countEl.textContent = `${filtered.length} shown`;

  // Company pill row — populate when targetOnly is active
  const cpRow = document.getElementById('company-pill-row');
  if (cpRow) {
    if (contactFilters.targetOnly) {
      // Build list of target companies that actually have contacts (any grade)
      const coMap = {};
      state.contacts.forEach(c => {
        const co = (c.company || '').trim();
        const coL = co.toLowerCase();
        if (co && state.TARGET_COS.some(t => coL.includes(t))) {
          coMap[coL] = coMap[coL] || { display: co, count: 0 };
          coMap[coL].count++;
        }
      });
      const coList = Object.entries(coMap).sort((a, b) => b[1].count - a[1].count);
      cpRow.innerHTML =
        `<span class="grade-pill-label" style="color:var(--teal)">Company:</span>` +
        `<button class="grade-pill ${!contactFilters.company?'active':''}" onclick="setCompanyFilter('')">All (${coList.reduce((s,[,v])=>s+v.count,0)})</button>` +
        coList.map(([coL, {display, count}]) =>
          `<button class="grade-pill ${contactFilters.company===coL?'active':''}" onclick="setCompanyFilter('${coL.replace(/'/g,"\\'")}')">${h(display)} <span style="opacity:0.65">${count}</span></button>`
        ).join('');
      cpRow.style.display = 'flex';
    } else {
      cpRow.style.display = 'none';
      cpRow.innerHTML = '';
    }
  }

  // Clear button: show when non-default filters active (default = grade:'AB', no other filters)
  const filtersActive = contactFilters.grade !== 'AB' || contactFilters.status || contactFilters.relationship || contactFilters.search || contactFilters.targetOnly || contactFilters.company;
  const bar = document.getElementById('contacts-filter-bar');
  if (bar) {
    let clearBtn = bar.querySelector('.clear-filters-btn');
    if (filtersActive && !clearBtn) {
      const countSpan = bar.querySelector('.filter-count');
      const btn = document.createElement('button');
      btn.className = 'btn btn-ghost btn-sm clear-filters-btn';
      btn.textContent = '✕ Reset';
      btn.onclick = clearContactFilters;
      bar.insertBefore(btn, countSpan);
    } else if (!filtersActive && clearBtn) {
      clearBtn.remove();
    }
  }

  let html = '';

  // Import banner
  if (importBanner) {
    html += `<div class="banner banner-${importBanner.type||'success'}" style="flex-wrap:wrap;gap:8px">
      <span style="flex:1">${h(importBanner.msg)}</span>
      ${importBanner.memOffer ? `<button class="btn btn-secondary btn-sm" style="white-space:nowrap"
        onclick="freeMessageMemory()">🗜 Free up memory</button>` : ''}
      ${importBanner.backupOffer ? `<button class="btn btn-primary btn-sm" style="white-space:nowrap"
        onclick="downloadBackup();importBanner=null;renderContactsList()">Back up now</button>` : ''}
      <button class="banner-close" onclick="importBanner=null; renderContactsList()">✕</button>
    </div>`;
  }

  if (contacts.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-icon">👥</div>
      <div class="empty-state-title">No contacts yet</div>
      <div class="empty-state-sub">Import your LinkedIn archive in <a href="#" onclick="switchTab('setup'); return false" style="color:var(--purple)">Setup</a> to get started.</div>
    </div>`;
  } else if (filtered.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-title">No contacts match your filters</div>
      <div class="empty-state-sub"><a href="#" onclick="clearContactFilters(); return false" style="color:var(--purple)">Clear filters</a></div>
    </div>`;
  } else if (contactViewMode === 'companies') {
    html += renderContactsByCompany(filtered);
  } else {
    const pageSlice = filtered.slice(0, contactPage * CONTACTS_PER_PAGE);
    const showHeaders = contactFilters.grade === 'AB' || contactFilters.grade === '';
    let lastGrade = null;
    const gradeLabels = { A: '🔥 Warm — Grade A', B: '★ Lukewarm — Grade B', C: '❄ Cold — Grade C' };
    pageSlice.forEach(contact => {
      const idx = state.contacts.indexOf(contact);
      if (showHeaders && contact.grade !== lastGrade) {
        lastGrade = contact.grade;
        html += `<div style="font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
          color:var(--muted);padding:14px 0 6px;border-top:1px solid var(--border);margin-top:${lastGrade==='A'?'0':'4px'}">
          ${gradeLabels[contact.grade] || contact.grade}
        </div>`;
      }
      html += renderContactCard(contact, idx);
    });
    if (filtered.length > pageSlice.length) {
      const remaining = filtered.length - pageSlice.length;
      html += `<div style="text-align:center;padding:20px 0 28px">
        <button class="btn btn-secondary" onclick="contactPage++; renderContactsList()">
          Load more (${remaining} remaining)
        </button>
      </div>`;
    }
  }

  listEl.innerHTML = html;

  // Restore active card highlight after list re-render
  if (sideDrawerIdx !== null) {
    const card = document.querySelector(`.contact-card[data-idx="${sideDrawerIdx}"]`);
    if (card) card.classList.add('drawer-active');
  }

  // Sync export button visibility and count
  updateExportBtn();
}

function setViewMode(mode) {
  contactViewMode = mode;
  localStorage.setItem(LS.view_mode, mode);
  if (mode === 'companies') {
    // Collapse all groups when switching to company view
    companyViewInitialized = false;
    collapsedCompanies.clear();
  }
  // Re-render the toggle buttons
  document.querySelectorAll('.view-toggle-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && mode === 'contacts') || (i === 1 && mode === 'companies'));
  });
  renderContactsList();
}

// ─── Company view ──────────────────────────────
function getCompanyGroups(filtered) {
  // Use normalised key for grouping, track display names separately
  const map = {};      // groupKey → [contacts]
  const display = {};  // groupKey → display name (from highest-scored contact)

  filtered.forEach(c => {
    const raw = (c.company || '').trim();
    if (!raw) {
      const key = '(No company)';
      if (!map[key]) { map[key] = []; display[key] = key; }
      map[key].push(c);
      return;
    }
    const key = coGroupKey(raw) || raw.toLowerCase();
    if (!map[key]) { map[key] = []; display[key] = raw; }
    map[key].push(c);
    // Keep display name from highest-scored contact (already have best first after sort)
    if ((c.score || 0) > (map[key][0]?.score || 0)) display[key] = raw;
  });

  // Sort contacts within each group warmest first
  Object.values(map).forEach(arr => arr.sort((a, b) => (b.score || 0) - (a.score || 0)));

  // After sorting, update display name to whichever contact scored highest
  Object.entries(map).forEach(([key, arr]) => {
    if (arr[0]?.company) display[key] = arr[0].company;
  });

  // Sort companies: target cos first → A-count desc → total score desc → name asc
  const isTarget = name => name !== '(No company)' && state.TARGET_COS.some(t => name.toLowerCase().includes(t));
  return Object.entries(map)
    .map(([key, arr]) => [display[key] || key, arr])
    .sort(([nameA, arrA], [nameB, arrB]) => {
      const tA = isTarget(nameA) ? 1 : 0;
      const tB = isTarget(nameB) ? 1 : 0;
      if (tA !== tB) return tB - tA;
      const aA = arrA.filter(c => c.grade === 'A').length;
      const bA = arrB.filter(c => c.grade === 'A').length;
      if (aA !== bA) return bA - aA;
      const aScore = arrA.reduce((s, c) => s + (c.score || 0), 0);
      const bScore = arrB.reduce((s, c) => s + (c.score || 0), 0);
      if (aScore !== bScore) return bScore - aScore;
      return nameA.localeCompare(nameB);
    });
}

function renderContactsByCompany(filtered) {
  const groups = getCompanyGroups(filtered);

  // First render in company view: collapse all groups
  if (!companyViewInitialized && groups.length > 0) {
    companyViewInitialized = true;
    groups.forEach(([company]) => collapsedCompanies.add(company));
  }

  let html = '';

  groups.forEach(([company, contacts]) => {
    const isTarget  = company !== '(No company)' && state.TARGET_COS.some(t => company.toLowerCase().includes(t));
    const aCount    = contacts.filter(c => c.grade === 'A').length;
    const bCount    = contacts.filter(c => c.grade === 'B').length;
    const cCount    = contacts.filter(c => c.grade === 'C').length;
    const initial   = company[0]?.toUpperCase() || '?';
    const isOpen    = !collapsedCompanies.has(company);
    const coKeyName = coKey(company);
    const intel     = state.COMPANY_INTEL[coKeyName];
    const jobUrl    = company !== '(No company)' ? getJobLinks(company, state.profile.target)[0].url : null;
    const companyJobMatch = intel?._jobMatch || null;
    // Outreach: any contact at this company has been messaged
    const hasOutreach = contacts.some(c => (c._interactions||[]).length > 0 ||
      (c.status && c.status !== 'Not contacted'));
    const coStatus = intel?._coStatus || '';

    // Grade pill summary
    const gradeSummary = [
      aCount ? `<span style="color:var(--teal);font-weight:700">${aCount}A</span>` : '',
      bCount ? `<span style="color:var(--amber);font-weight:700">${bCount}B</span>` : '',
      cCount ? `<span style="color:var(--faint)">${cCount}C</span>` : ''
    ].filter(Boolean).join(' · ');

    // Intel chip
    let intelChip = '';
    if (intel?.glassdoorRating) {
      intelChip = `<span class="company-group-intel">· Glassdoor ${intel.glassdoorRating}★</span>`;
    }

    // Outreach badge
    const outreachBadge = hasOutreach
      ? `<span style="font-size:11px;color:var(--teal);font-weight:600">· ✉️ contacted</span>`
      : '';

    // Company status label (manual)
    const coStatusLabels = { watching:'🔍 Watching', 'no-opening':'🚫 No opening', 'on-hold':'⏸ On hold' };

    // Target badge
    const targetBadge = isTarget
      ? `<span style="font-size:10px;background:var(--teal-bg);color:var(--teal);border:1px solid #b0e4d4;border-radius:10px;padding:1px 7px;font-weight:600">🎯 target</span>`
      : '';

    const safeCompany = company.replace(/'/g, "\\'");

    // Job match card — only shown if already fetched/cached; no AI-fetch button
    const jobMatchSection = companyJobMatch ? `
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2)" onclick="event.stopPropagation()">
        ${renderCompanyJobMatchCard(company, companyJobMatch, coKeyName)}
      </div>` : '';

    html += `
    <div class="company-group">
      <div class="company-group-header ${aCount > 0 ? 'has-a' : ''} ${isTarget ? 'is-target' : ''}"
           onclick="toggleCompanyGroup('${safeCompany}')">
        <div class="company-group-avatar">${h(initial)}</div>
        <div style="flex:1;min-width:0">
          <div class="company-group-name">${h(company)} ${targetBadge}</div>
          <div class="company-group-meta">
            ${gradeSummary}
            <span style="color:var(--faint)">·</span>
            <span>${contacts.length} contact${contacts.length > 1 ? 's' : ''}</span>
            ${intelChip}
            ${outreachBadge}
            ${coStatus ? `<span style="font-size:11px;color:var(--purple);font-weight:600">${coStatusLabels[coStatus] || coStatus}</span>` : ''}
          </div>
        </div>
        <div class="company-group-right">
          ${company !== '(No company)' ? (() => {
            const links = getJobLinks(company, state.profile.target);
            const liLink = links[0]; // LinkedIn Jobs
            const careersLink = links[1]; // Direct careers or Google fallback
            return `<a class="btn btn-secondary btn-sm" style="font-size:11px" href="${h(liLink.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Search on LinkedIn Jobs">LI Jobs ↗</a>
                    <a class="btn btn-secondary btn-sm" style="font-size:11px" href="${h(careersLink.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="${careersLink.label === 'Careers ↗' ? 'Direct careers page' : 'Search careers page on Google'}">${h(careersLink.label)}</a>`;
          })() : ''}
          ${company !== '(No company)' ? `<select class="co-status-select${coStatus ? ' has-status' : ''}" onclick="event.stopPropagation()"
            onchange="event.stopPropagation(); setCompanyStatus('${safeCompany}', this.value)">
            <option value="">+ Status</option>
            <option value="watching" ${coStatus==='watching'?'selected':''}>🔍 Watching</option>
            <option value="no-opening" ${coStatus==='no-opening'?'selected':''}>🚫 No opening</option>
            <option value="on-hold" ${coStatus==='on-hold'?'selected':''}>⏸ On hold</option>
          </select>` : ''}
          ${company !== '(No company)' && !intel ? `<button class="btn btn-ghost btn-sm" style="font-size:11px" onclick="event.stopPropagation(); loadCompanyIntelForGroup('${safeCompany}', this)">Load intel</button>` : ''}
          <span class="company-group-chevron ${isOpen ? 'open' : ''}">▶</span>
        </div>
      </div>
      ${isOpen ? `
      ${jobMatchSection}
      <div class="company-group-contacts">
        ${contacts.map(c => renderContactCard(c, state.contacts.indexOf(c))).join('')}
      </div>
      <div style="padding:8px 14px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2)" onclick="event.stopPropagation()">
        <span style="font-size:11px;color:var(--faint);white-space:nowrap;font-weight:600">Careers URL</span>
        <input type="url" placeholder="https://company.com/careers (optional — overrides default)"
          value="${h(intel?.careersUrl || '')}"
          style="flex:1;font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text)"
          onchange="saveCareersUrl('${safeCompany}', this.value.trim())"
          onkeydown="if(event.key==='Enter'){saveCareersUrl('${safeCompany}',this.value.trim());this.blur()}">
        ${intel?.careersUrl ? `<button class="btn btn-ghost btn-sm" style="font-size:11px;color:var(--faint)" onclick="saveCareersUrl('${safeCompany}','');this.closest('div').querySelector('input').value=''" title="Clear custom URL">✕</button>` : ''}
      </div>` : ''}
    </div>`;
  });

  return html;
}

function toggleCompanyGroup(company) {
  if (collapsedCompanies.has(company)) collapsedCompanies.delete(company);
  else collapsedCompanies.add(company);
  renderContactsList();
}

async function loadCompanyIntelForGroup(company, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  // Find any contact at this company to reuse loadCompanyIntel
  const c = state.contacts.find(c => (c.company||'').toLowerCase() === company.toLowerCase());
  if (!c) return;
  const idx = state.contacts.indexOf(c);
  await loadCompanyIntel(idx);
  renderContactsList(); // re-render to show intel in header
}

function setGradeFilter(grade) {
  contactFilters.grade = grade;
  contactPage = 1;
  // Update pill active states — but leave the target pill alone
  const pillMap = { '':'pill-all', 'A':'pill-a', 'B':'pill-b', 'C':'pill-c', 'AB':'pill-ab' };
  document.querySelectorAll('.grade-pill:not(.pill-target)').forEach(p => p.classList.remove('active'));
  const cls = pillMap[grade];
  if (cls) { const el = document.querySelector(`.grade-pill.${cls}`); if (el) el.classList.add('active'); }
  renderContactsList();
}

function setTargetFilter() {
  contactFilters.targetOnly = !contactFilters.targetOnly;
  if (!contactFilters.targetOnly) contactFilters.company = ''; // clear sub-filter when toggling off
  contactPage = 1;
  const btn = document.querySelector('.grade-pill.pill-target');
  if (btn) btn.classList.toggle('active', contactFilters.targetOnly);
  renderContactsList();
}

function setCompanyFilter(co) {
  contactFilters.company = co;
  contactPage = 1;
  renderContactsList();
}

function clearContactFilters() {
  contactFilters = { grade:'AB', status:'', relationship:'', search:'', targetOnly:false, company:'' };
  contactPage = 1;
  const s = document.getElementById('contact-search'); if (s) s.value = '';
  const st= document.getElementById('filter-status'); if (st) st.value = '';
  const r = document.getElementById('filter-rel');    if (r) r.value = '';
  // Reset grade pills
  document.querySelectorAll('.grade-pill').forEach(p => p.classList.remove('active'));
  const ab = document.querySelector('.grade-pill.pill-ab'); if (ab) ab.classList.add('active');
  renderContactsList();
}

// ─── Export helpers ───────────────────────────────────────────
function toggleExportSelect(idx, checked) {
  if (checked) selectedForExport.add(idx);
  else selectedForExport.delete(idx);
  updateExportBtn();
}

function updateExportBtn() {
  const btn = document.getElementById('export-btn');
  if (!btn) return;
  const count = selectedForExport.size;
  if (count === 0) {
    btn.style.display = 'none';
  } else {
    btn.style.display = '';
    const exportCount = Math.min(count, 5);
    const label = count > 5
      ? `Export top ${exportCount} of ${count} selected`
      : `Export ${count} selected`;
    btn.textContent = `📤 ${label}`;
  }

  // Sync the select-all checkbox state
  const selAll = document.getElementById('select-all-export');
  if (!selAll) return;
  const visibleIdxs = getVisibleContactIdxs();
  if (visibleIdxs.length === 0) { selAll.checked = false; selAll.indeterminate = false; return; }
  const selectedVisible = visibleIdxs.filter(i => selectedForExport.has(i)).length;
  if (selectedVisible === 0) { selAll.checked = false; selAll.indeterminate = false; }
  else if (selectedVisible === visibleIdxs.length) { selAll.checked = true; selAll.indeterminate = false; }
  else { selAll.checked = false; selAll.indeterminate = true; }
}

function getVisibleContactIdxs() {
  return getFilteredContacts()
    .slice(0, contactPage * CONTACTS_PER_PAGE)
    .map(c => state.contacts.indexOf(c))
    .filter(i => i !== -1);
}

function toggleSelectAll(checked) {
  const idxs = getVisibleContactIdxs();
  if (checked) idxs.forEach(i => selectedForExport.add(i));
  else         idxs.forEach(i => selectedForExport.delete(i));
  // Reflect on individual checkboxes
  idxs.forEach(i => {
    const cb = document.querySelector(`.contact-card[data-idx="${i}"] .export-checkbox`);
    if (cb) cb.checked = checked;
  });
  updateExportBtn();
}

function exportSelectedContacts() {
  if (selectedForExport.size === 0) return;

  const today = new Date().toISOString().split('T')[0];
  const candidates = [...selectedForExport]
    .map(idx => state.contacts[idx])
    .filter(Boolean)
    .sort((a, b) => (b.score || 0) - (a.score || 0));

  const headers = [
    'Full Name','Current Company','Current Role/Title','LinkedIn Profile URL',
    'Warmth Score','Grade','Email','Relationship','Status','Last Contacted'
  ];

  const rows = candidates.map(c => {
    const lastInteraction = (c._interactions || []).slice(-1)[0];
    const lastDate = lastInteraction ? lastInteraction.date.split('T')[0] : '';
    return [
      c.name || '',
      c.company || '',
      c.role || c.position || '',
      c.url || '',
      c.score || 0,
      c.grade || '',
      c.email || '',
      c.relationship || '',
      c.status || '',
      lastDate
    ];
  });

  const esc = v => { const s = String(v); return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s; };
  const csv = [headers, ...rows].map(r => r.map(esc).join(',')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `warmpath-contacts-${today}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);

  selectedForExport.clear();
  renderContactsList();
  showBanner(`✓ Exported ${candidates.length} contact${candidates.length > 1 ? 's' : ''} to CSV`, 'success');
}

// B1: resolve the user's effective target role keyword, falling back to headline keywords
function getTargetRoleKeyword() {
  const target = (state.profile.target || '').trim();
  if (target) return target.split(/[,;\/]/)[0].trim();
  // Fallback: extract meaningful words from headline (skip stopwords and short tokens)
  const headline = (state.profile.headline || '').toLowerCase();
  const stop = new Set(['at','a','an','the','in','of','for','and','or','to','·','|','-','senior','staff','lead','head','vp','director','manager','engineer','principal','product']);
  const words = headline.split(/[\s·|,;\-\/]+/).map(w => w.trim()).filter(w => w.length > 2 && !stop.has(w));
  if (words.length) return words.slice(0, 2).join(' ');
  return ''; // truly blank — caller will show nudge
}

function getJobLinks(company, targetRoles) {
  const co = (company || '').toLowerCase();
  // Resolve keyword: prefer explicit arg, then profile target, then headline fallback
  const resolvedRole = targetRoles
    ? targetRoles.split(/[,;\/]/)[0].trim()
    : getTargetRoleKeyword();
  const primaryRole = resolvedRole || 'open roles';
  const kw = encodeURIComponent(primaryRole);
  const jobLocation = localStorage.getItem(LS.job_location) || 'India';
  const locKw = encodeURIComponent(jobLocation);

  // Tight company ID match — exact key match only, no partial
  const liId = Object.entries(LINKEDIN_COMPANY_IDS).find(([k]) => co === k || co.startsWith(k + ' ') || co.endsWith(' ' + k))?.[1]
    || Object.entries(LINKEDIN_COMPANY_IDS).find(([k]) => co.includes(k) && k.length >= 5)?.[1];

  // A1: look up direct careers URL; fall back to Google search
  const careersKey = Object.keys(CAREERS_URLS).find(k => co === k || co.includes(k) && k.length >= 4);
  const careersUrl = careersKey
    ? CAREERS_URLS[careersKey]
    : `https://www.google.com/search?q=${encodeURIComponent(company)}+careers+${kw}`;
  const careersLabel = careersKey ? 'Careers ↗' : 'Careers';

  // Also check COMPANY_INTEL for a user-saved custom careers URL
  const intel = state.COMPANY_INTEL ? state.COMPANY_INTEL[coKey(company)] : null;
  const customCareers = intel?.careersUrl;

  const links = [];
  if (liId) {
    links.push({ label: 'LinkedIn Jobs', url: `https://www.linkedin.com/jobs/search/?f_C=${liId}&keywords=${kw}&location=${locKw}&f_TPR=r2592000` });
  } else {
    links.push({ label: 'LinkedIn Jobs', url: `https://www.linkedin.com/jobs/search/?keywords=${kw}+${encodeURIComponent(company)}&location=${locKw}&f_TPR=r2592000` });
  }
  if (customCareers) {
    links.push({ label: 'Careers ↗', url: customCareers, custom: true });
  } else {
    links.push({ label: careersLabel, url: careersUrl });
  }
  links.push({ label: 'Indeed', url: `https://in.indeed.com/jobs?q=${kw}&l=${locKw}` });
  links.push({ label: 'Naukri', url: `https://www.naukri.com/jobs-in-india?keyword=${kw}` });
  return links;
}

                  ${o.statusHistory?.length > 1 ? `<span style="color:var(--muted);font-size:11px">${o.statusHistory.length} updates</span>` : ''}
                </div>
              </div>`;
            }).join('')}
          </div>
        </details>`;
      })()}

    </div>`;

}

// ── AI abstraction layer ──────────────────────
function getAIConfig() {
  const provider = localStorage.getItem(LS.ai_provider) || 'anthropic';
  const defaults = AI_DEFAULTS[provider] || AI_DEFAULTS.anthropic;
  return {
    provider,
    apiKey:  localStorage.getItem(LS.apikey)    || '',
    model:   localStorage.getItem(LS.ai_model)  || defaults.model,
    baseurl: localStorage.getItem(LS.ai_baseurl)|| defaults.baseurl
  };
}

async function callAI(prompt, maxTokens = 400, useWebSearch = false) {
  const cfg = getAIConfig();
  if (!cfg.apiKey && cfg.provider !== 'ollama') throw new Error('No API key configured. Add one in Setup → AI Settings.');

  if (cfg.provider === 'anthropic') {
    const body = { model: cfg.model, max_tokens: maxTokens, messages: [{ role:'user', content: prompt }] };
    if (useWebSearch) body.tools = [{ type:'web_search_20250305', name:'web_search' }];
    const res = await fetch(`${cfg.baseurl}/v1/messages`, {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-api-key': cfg.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return data.content?.map(b => b.text || '').join('') || '';

  } else if (cfg.provider === 'openai' || cfg.provider === 'custom') {
    const res = await fetch(`${cfg.baseurl}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${cfg.apiKey}` },
      body: JSON.stringify({ model: cfg.model, max_tokens: maxTokens, messages: [{ role:'user', content: prompt }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return data.choices?.[0]?.message?.content || '';

  } else if (cfg.provider === 'ollama') {
    const res = await fetch(`${cfg.baseurl}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ model: cfg.model, prompt, stream: false })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.response || '';
  }
  throw new Error(`Unknown provider: ${cfg.provider}`);
}

// ── Static warmth-tier templates ─────────────
// Returns 'first' | 'followup' | 'post-reply' based on WarmPath interaction history
function getInteractionState(c) {
  const interactions = c._interactions || [];
  if (interactions.length === 0) return 'first';
  const hasReply = interactions.some(i => i.response === 'replied' || i.response === 'positive');
  if (hasReply) return 'post-reply';
  return 'followup'; // sent but no response recorded
}

function getStaticTemplate(warmthTier, contact, profile, interactionState = 'first') {
  const firstName = (contact.name || '').split(' ')[0];
  const company   = contact.company || 'your company';
  const target    = (profile?.target || 'a product role').split(',')[0].trim();
  const myName    = profile?.name || '';
  const myLevel   = profile?.currentLevel || 'product professional';

  // ── Follow-up templates override warmth-tier first-contact ones ──

  if (interactionState === 'followup') {
    const daysSince = contact._lastSentDate
      ? Math.floor((Date.now() - new Date(contact._lastSentDate)) / 86400000)
      : 14;
    const timeRef = daysSince <= 7 ? 'last week'
                  : daysSince <= 21 ? 'a couple of weeks back'
                  : 'a while back';
    return `Hi ${firstName},\n\nI reached out ${timeRef} about ${target} opportunities at ${company} — just following up in case it got buried.\n\nNo pressure if the timing isn't right. But if there's a role worth knowing about or someone I should speak with, I'd be grateful for the nudge.\n\nHappy to keep it brief.`;
  }

  if (interactionState === 'post-reply') {
    return `Hi ${firstName},\n\nThanks again for getting back to me — really appreciated.\n\nI'm actively pursuing ${target} roles and ${company} remains high on my list. Would you be comfortable pointing me to the right person on the hiring side, or letting me know if there's something relevant open?\n\nHappy to take it from here once I have a name.`;
  }

  // ── First contact — warmth-tier templates ──
  const T = {
    recommender: `Hi ${firstName},\n\nThank you again for the recommendation — it genuinely meant a lot.\n\nI'm actively exploring ${target} opportunities and ${company} is high on my list. Given your experience there, I'd love your honest perspective on the team and what it takes to succeed.\n\nWould you be open to a quick call? Happy to work around your schedule.`,
    'close-colleague': `Hi ${firstName},\n\nHope things are going well at ${company}!\n\nI'm actively looking at ${target} roles and your team came up as a natural fit. Given our time together, I'd value your honest take — any open roles or people I should speak with?\n\nWorth a quick catch-up?`,
    colleague: `Hi ${firstName},\n\nGreat to have stayed connected since our time together.\n\nI'm exploring ${target} opportunities and ${company} stood out. Would you be open to sharing your perspective on the team and culture?\n\nEven 15 minutes would be really helpful.`,
    'active-contact': `Hi ${firstName},\n\nPicking up from our last exchange — I'm actively looking at ${target} roles and ${company} is high on my list.\n\nAny open positions on your radar, or someone I should speak with?\n\nAppreciate any steer.`,
    known: `Hi ${firstName},\n\nWe connected a while back — I'm ${myName}, a ${myLevel}.\n\nI'm exploring ${target} opportunities and ${company} stood out as a strong fit. Would you be open to a short chat?\n\nNo pressure either way — appreciate your time.`,
    'warm-unknown': `Hi ${firstName},\n\nI've been following ${company}'s work and came across your profile.\n\nI'm a ${myLevel} exploring ${target} roles — your team looks like a strong fit for what I'm looking for. Would you be open to a 15-minute conversation?\n\nHappy to share more context if helpful.`,
    cold: `Hi ${firstName},\n\nI'm ${myName}, a ${myLevel} exploring ${target} opportunities.\n\nYour work at ${company} caught my attention and I'd be grateful for 15 minutes to learn more about the team.\n\nWould that be possible?`
  };
  return T[warmthTier] || T.cold;
}

// ── Referral ask template (second message after contact replies) ──
function getReferralAskTemplate(contact, profile, roleHint) {
  const firstName = (contact.name || '').split(' ')[0];
  const company   = contact.company || 'your company';
  const target    = (profile?.target || 'a product role').split(',')[0].trim();
  const myName    = profile?.name || '';
  const roleRef   = roleHint && !isUrl(roleHint) ? roleHint
    : roleHint && isUrl(roleHint) ? `the role I shared`
    : `a ${target} role`;
  const linkLine  = roleHint && isUrl(roleHint) ? `\n\nHere's the link if helpful: ${roleHint}` : '';

  return `Hi ${firstName},\n\nThanks for getting back to me — really appreciate it.\n\nI'm formally applying for ${roleRef} at ${company}. If you'd be open to referring me through your internal system, it would make a real difference — referrals typically move much faster through the process.\n\nNo obligation at all if it's not something you're comfortable with, but I'd be grateful if you are.${linkLine}\n\nThanks again,\n${myName}`;
}

async function generateMessage(idx) {
  const c = state.contacts[idx];
  if (!c) return;
  const cfg = getAIConfig();

  const jdContext = getJdContext(idx);
  const roleHint  = (document.getElementById(`role-input-${idx}`)?.value || c.savedRole || '').trim();
  const spinner   = document.getElementById(`gen-spinner-${idx}`);
  const ta        = document.getElementById(`msg-ta-${idx}`);

  // Detect prior interaction state
  const interactionState   = getInteractionState(c);
  const interactions       = c._interactions || [];
  const lastInteraction    = interactions[interactions.length - 1];
  const daysSinceLast      = c._lastSentDate
    ? Math.floor((Date.now() - new Date(c._lastSentDate)) / 86400000)
    : null;

  const selectedTemplateId = document.getElementById(`msg-template-${idx}`)?.value || '';
  const selectedJobId      = document.getElementById(`msg-job-${idx}`)?.value || '';
  const selectedTmpl       = selectedTemplateId ? getTemplate(selectedTemplateId) : null;
  const linkedJob          = selectedJobId ? state.JOBS.find(j => j.id === selectedJobId) || null : null;

  // No AI configured — use selected template or built-in static template
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    const scored = smartScore(c, state);
    let tmplText;
    if (selectedTmpl?.staticTemplate) {
      tmplText = fillTemplatePlaceholders(selectedTmpl.staticTemplate, c, state.profile, linkedJob);
    } else {
      tmplText = getStaticTemplate(scored.warmthTier, c, state.profile, interactionState);
      if (isUrl(roleHint)) tmplText += `\n\nRole I had in mind: ${roleHint}`;
    }
    if (ta) ta.value = tmplText;
    state.contacts[idx]._draftMsg = tmplText;
    setDrawerStatus(idx, selectedTmpl ? `📝 Using template: ${selectedTmpl.name}` : '📝 Using a built-in template (no AI key set — add one in Setup → Settings for personalised messages)', 'info');
    return;
  }

  if (spinner) spinner.classList.remove('hidden');
  setDrawerStatus(idx, 'Generating…', 'info');

  const scored  = smartScore(c, state);

  // Build interaction context — overrides warmth-tier tone when there's prior contact
  let interactionContext = '';
  let interactionRules   = '';
  if (interactionState === 'followup') {
    const timeRef = daysSinceLast !== null
      ? `${daysSinceLast} day${daysSinceLast === 1 ? '' : 's'} ago`
      : 'previously';
    interactionContext = `\nPRIOR CONTACT: You already messaged ${c.name.split(' ')[0]} ${timeRef}. No reply yet.
This is a follow-up — NOT a fresh introduction. They know who you are.`;
    interactionRules = `- This is a follow-up message — do NOT re-introduce yourself
- Acknowledge the previous message briefly and naturally (don't be passive-aggressive about the silence)
- Keep it shorter than a first message — 2–3 paragraphs max
- End with an easy exit ("no worries if the timing isn't right")`;
  } else if (interactionState === 'post-reply') {
    interactionContext = `\nPRIOR CONTACT: ${c.name.split(' ')[0]} has already replied to your outreach. You have an active thread.
This is a warm follow-through — NOT a cold intro. They engaged, so skip all preamble.`;
    interactionRules = `- Skip the intro entirely — they know you and replied
- Be more direct with the ask (referral, intro, role info)
- Warmer and more conversational than a first message
- Reference that they got back to you ("Thanks for the reply / getting back to me")
- Under 100 words`;
  } else {
    interactionRules = `- This is a first contact — establish context early`;
  }

  const toneMap = {
    'recommender':    { tone: 'Warm, personal, first-name, casual. Reference the recommendation.', opening: 'Reference something specific from their recommendation text or shared project.' },
    'close-colleague':{ tone: 'Casual, warm, first-name. Many messages exchanged.', opening: 'Specific shared memory, project, or inside reference. Not "hope you\'re well".' },
    'colleague':      { tone: 'Warm, collegial, peer-to-peer.', opening: 'Reference the specific company or project worked on together.' },
    'active-contact': { tone: 'Friendly, direct. Skip formalities entirely.', opening: 'Acknowledge prior contact, get to the point fast.' },
    'known':          { tone: 'Professional but human. Establish the connection anchor.', opening: 'One sentence on how you know each other, then the point.' },
    'warm-unknown':   { tone: 'Professional, peer-to-peer. Specific hook.', opening: 'Lead with something specific about their company, role, or recent work.' },
    'cold':           { tone: 'Formal but not stiff. Short, respectful of their time.', opening: 'Reference something very specific about their company or problem space.' }
  };
  let tone = { ...(toneMap[scored.warmthTier] || toneMap['cold']) };

  // Interaction state overrides warmth-tier tone
  if (interactionState === 'followup') {
    tone.tone    = 'Light, brief, no pressure. Softer than the first message.';
    tone.opening = 'A single sentence acknowledging you reached out before.';
  } else if (interactionState === 'post-reply') {
    tone.tone    = 'Warm, direct, conversational. Build on the existing thread.';
    tone.opening = 'Acknowledge their reply in one short line, then the ask.';
  }

  const toneOverride = (document.getElementById(`msg-tone-${idx}`)?.value || 'auto');
  if (toneOverride !== 'auto') {
    const overrideDescriptions = {
      'casual':       'Very casual and friendly. Use first name. Conversational, like messaging a friend. Skip all formalities.',
      'professional': 'Professional and warm. Peer-to-peer. Respectful but not stiff.',
      'formal':       'Formal and polished. Full names are acceptable. Structured paragraphs.'
    };
    tone.tone = overrideDescriptions[toneOverride] || tone.tone;
  }
  const profile = state.profile;

  const bgSnippet  = (profile.bg || 'Senior product professional').slice(0, 500);
  const jdSnippet  = jdContext && jdContext !== roleHint ? jdContext.slice(0, 1000) : '';

  const templateSystemNote = selectedTmpl?.systemPrompt
    ? `\nTEMPLATE STYLE: ${selectedTmpl.systemPrompt}`
    : '';

  const prompt = `You are writing a LinkedIn direct message on behalf of ${profile.name || 'the user'}.${templateSystemNote}

USER'S BACKGROUND:
${bgSnippet}
Headline: ${(profile.headline || '').slice(0, 120)}
Target roles: ${(profile.target || '').slice(0, 100)}
Top skills: ${(profile.topSkills || []).slice(0,5).join(', ')}

CONTACT:
Name: ${c.name}
Role: ${c.role || ''}
Company: ${c.company || ''}
Relationship: ${c.relationship || ''}
Messages exchanged (LinkedIn history): ${scored.msgCount}
Warmth: ${scored.warmthTier} · Grade ${scored.grade}
${interactionContext}
TARGET ROLE: ${roleHint || 'a suitable role at ' + (c.company || 'their company')}
${isUrl(roleHint) ? `JOB LINK: ${roleHint}` : ''}
${jdSnippet ? `JOB DESCRIPTION:\n${jdSnippet}` : ''}

TONE: ${tone.tone}
OPENING: ${tone.opening}

RULES:
- Under 130 words total
- 3–4 short paragraphs
- Do NOT use: "hope this message finds you well", "I am passionate about", "synergy", "leverage", "circle back", "reach out", "I came across your profile"
- Do NOT start with "Hi [name], I hope..."
- If a job link is provided, include it naturally in the message
- If JD provided, reference 1–2 specific requirements
- End with a no-pressure close
${interactionRules}
- Output ONLY the message text — no subject line, no preamble`;

  try {
    const msg = await callAI(prompt, 400);
    if (ta) ta.value = msg;
    state.contacts[idx]._draftMsg = msg;
    saveContacts(); // persist so it survives tab switches and page reloads
    setDrawerStatus(idx, 'Message generated ✓ — saved', 'success');
  } catch(e) {
    // Fallback to static template on any AI error
    let tmpl = getStaticTemplate(scored.warmthTier, c, state.profile, interactionState);
    if (isUrl(roleHint)) tmpl += `\n\nRole I had in mind: ${roleHint}`;
    if (ta) ta.value = tmpl;
    state.contacts[idx]._draftMsg = tmpl;
    const msg = e.message || '';
    const isCors      = msg.includes('Failed to fetch') || msg.includes('CORS') || msg.includes('NetworkError');
    const isRateLimit = msg.includes('rate limit') || msg.includes('rate_limit') || msg.includes('429');
    const isQuota     = msg.includes('quota') || msg.includes('credit') || msg.includes('billing');
    const errMsg = isCors
      ? '⚠️ AI not reachable — double-click launch.command first, then retry.'
      : isRateLimit
      ? '⚠️ Rate limit hit — wait 60 seconds then try again. (Anthropic free tier: 30k tokens/min)'
      : isQuota
      ? '⚠️ API quota exceeded — check your Anthropic billing at console.anthropic.com'
      : `⚠️ AI error: ${msg.slice(0,100)}`;
    setDrawerStatus(idx, errMsg, 'warn');
  } finally {
    if (spinner) spinner.classList.add('hidden');
  }
}

function onRoleInputChange(idx, value) {
  const url = value.trim();
  if (!url.startsWith('http')) return;
  const parsed = parseJobUrl(url);
  if (!parsed) return;

  // Try to auto-select a matching job already in the dropdown
  const jobSel = document.getElementById(`msg-job-${idx}`);
  if (jobSel && parsed.company) {
    const coLower = parsed.company.toLowerCase();
    const match = state.JOBS.find(j =>
      ['Pursuing','Applied','Interviewing'].includes(j.status) &&
      j.company.toLowerCase() === coLower &&
      (!parsed.title || j.title.toLowerCase().includes(parsed.title.toLowerCase().split(' ')[0]))
    );
    if (match && jobSel.value !== match.id) {
      jobSel.value = match.id;
      setDrawerStatus(idx, `✓ Linked to "${match.title}" from your Jobs tracker`, 'success');
      return;
    }
  }

  // No match — offer to create one (only if company detected)
  if (!parsed.company) return;
  const existing = document.getElementById(`role-url-job-hint-${idx}`);
  if (existing) existing.remove();
  const hint = document.createElement('div');
  hint.id = `role-url-job-hint-${idx}`;
  hint.style.cssText = 'font-size:11px;margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap';
  const title = parsed.title || 'this role';
  hint.innerHTML = `<span style="color:var(--teal)">✓ Detected: <strong>${parsed.company}</strong>${parsed.title ? ' · ' + parsed.title : ''}</span>
    <button class="btn btn-sm btn-ghost" style="font-size:11px;padding:1px 8px"
      onclick="quickAddJobFromUrl(${idx},'${(parsed.title||'').replace(/'/g,"\\'")}','${parsed.company.replace(/'/g,"\\'")}','${url.replace(/'/g,"\\'")}');this.parentElement.remove()">
      + Add to Jobs
    </button>`;
  const roleInput = document.getElementById(`role-input-${idx}`);
  roleInput?.parentElement?.insertAdjacentElement('afterend', hint);
}

function quickAddJobFromUrl(idx, title, company, url) {
  clearSampleData();
  const finalTitle = title || prompt(`Job title for this role at ${company}?`, '');
  if (!finalTitle) return;
  const job = addJob(finalTitle, company, url, 'Company site', '');
  // Auto-select in the dropdown
  const jobSel = document.getElementById(`msg-job-${idx}`);
  if (jobSel) {
    const opt = document.createElement('option');
    opt.value = job.id;
    opt.textContent = `${finalTitle} @ ${company}`;
    opt.selected = true;
    jobSel.appendChild(opt);

    saveContacts();

async function fetchJdContent(idx) {

  const input  = document.getElementById(`role-input-${idx}`);
  const statusEl = document.getElementById(`jd-fetch-status-${idx}`);

  }

  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--red)">Add an AI key in Setup → Settings to read URLs. Or <button class="btn btn-sm btn-ghost" style="padding:0 4px;font-size:11px" onclick="setJdMode(${idx},'paste')">paste JD →</button></span>`;
    return;
  }

  if (statusEl) statusEl.innerHTML = '<span style="color:var(--muted)">Reading URL…</span>';

  const prompt = `You have web search access. Visit this URL and extract the job description: ${url}

Return ONLY this JSON (no other text):

// ── Find the right job match ──────────────────
// Strategy: try to fetch company careers page via local proxy → send to Claude
// → Claude returns best matching job title + URL.
// Fallback: if page is empty/JS-rendered, open a smart LinkedIn Jobs search URL.
async function findBestJobMatch(idx) {
  const c         = state.contacts[idx];
  if (!c || !c.company) return;

  const btn       = document.getElementById(`find-job-btn-${idx}`);
  const spinner   = document.getElementById(`find-job-spinner-${idx}`);
  const statusEl  = document.getElementById(`find-job-status-${idx}`);
  const resultEl  = document.getElementById(`find-job-result-${idx}`);
  const cfg       = getAIConfig();

  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">Add an AI key in Setup → Settings first.</span>';
    return;
  }

  // UI: loading state
  if (btn)     btn.disabled = true;
  if (spinner) spinner.classList.remove('hidden');
  if (statusEl) statusEl.textContent = 'Searching…';
  if (resultEl) resultEl.style.display = 'none';

  const targetRole  = (state.profile.target || 'product manager').split(/[,;\/]/)[0].trim();
  const company     = c.company;
  const locPrefs    = (() => { try { return JSON.parse(localStorage.getItem(LS.job_loc_prefs) || '[]'); } catch(e){ return []; } })();
  const locPrefStr  = locPrefs.length ? locPrefs.map((l,i) => `${i+1}. ${l}`).join(', ') : (localStorage.getItem(LS.job_location) || 'any');
  const seniority   = state.profile.currentLevel || '';

  // Step 1: try to fetch the careers page via the local proxy
  let careersText = '';
  let careersUrl  = '';
  const candidateUrls = [
    `https://www.linkedin.com/company/${encodeURIComponent(company.toLowerCase().replace(/\s+/g,'-'))}/jobs/`,
    `https://${company.toLowerCase().replace(/\s+/g,'')}.com/careers`,
    `https://${company.toLowerCase().replace(/\s+/g,'')}.com/jobs`
  ];

  for (const tryUrl of candidateUrls) {
    try {
      const res  = await fetch(`http://localhost:8080/proxy?url=${encodeURIComponent(tryUrl)}`, { signal: AbortSignal.timeout(5000) });
      if (res.ok) {
        const text = await res.text();
        if (text && text.length > 400 && text.includes(targetRole.split(' ')[0].toLowerCase())) {
          careersText = text.slice(0, 6000);
          careersUrl  = tryUrl;
          break;
        }
      }
    } catch(e) { /* proxy not available or timeout — fall through */ }
  }

  try {
    let prompt, raw, result;

    const today = new Date().toISOString().split('T')[0];
    const sharedContext = `Candidate profile:
- Target role: "${targetRole}"${seniority ? `\n- Seniority: ${seniority}` : ''}
- Background: ${state.profile.bg ? state.profile.bg.slice(0,200) : 'Senior professional'}
- Location preferences (in order): ${locPrefStr}
- Today's date: ${today}`;

    if (careersText) {
      // We have real content — ask Claude to find the best match
      prompt = `You are helping a job seeker find the best matching open role at ${company}.

${sharedContext}

Careers page content (partial HTML/text):
${careersText}

RULES:
1. Only consider jobs posted within the last 30 days. If a posting date is not visible or is older than 30 days, exclude it.
2. Match seniority — skip roles clearly below or above the candidate's level.
3. If multiple roles qualify, rank by location preference order above.
4. Return the single best match only.

Return ONLY this JSON (no other text):
{"found":true,"title":"exact job title","url":"full job URL if visible else null","location":"job location as listed","postedDate":"YYYY-MM-DD or null if not visible","summary":"1 sentence on why this matches","snippet":"1-2 line excerpt from the JD"}

If no role matches (wrong level, too old, wrong location, or none found), return:
{"found":false,"reason":"specific reason e.g. no roles posted in last 30 days / no senior roles / location mismatch"}`;
    } else {
      // No content fetched — ask Claude to reason about the best search approach
      prompt = `You are helping a job seeker find the right open role at ${company}.

${sharedContext}

The company careers page wasn't directly accessible. Based on your knowledge of ${company}'s typical hiring:
- Only suggest a role if you are confident they are actively hiring for it and it would have been posted recently (within ~30 days).
- If you are not confident about a current opening, set found to false.
- Match the candidate's seniority and location preferences.

Return ONLY this JSON:
{"found":true,"title":"most likely current job title","url":"${company.toLowerCase().replace(/\s+/g,'')}.com/careers or similar","location":"likely location","postedDate":null,"summary":"1 sentence on why this matches","snippet":""}

Or if not confident: {"found":false,"reason":"brief reason"}`;
    }

    raw    = await callAI(prompt, 500, cfg.provider === 'anthropic');
    const match = raw.match(/\{[\s\S]*?\}/);
    if (!match) throw new Error('no json');
    result = JSON.parse(match[0]);

    if (result.found) {
      // Persist the match on the contact so it survives tab switches / reloads
      const jobUrl = result.url || getJobLinks(company, targetRole)[0].url;
      c._jobMatch = {
        title:      result.title,
        url:        jobUrl,
        location:   result.location || '',
        postedDate: result.postedDate || null,
        summary:    result.summary || '',
        snippet:    result.snippet || '',
        foundAt:    new Date().toISOString(),
        fromCareer: !!careersText
      };
      c.savedRole = result.title;
      saveContacts();

      // Auto-fill the role input
      const roleInput = document.getElementById(`role-input-${idx}`);
      if (roleInput) roleInput.value = result.title;

      showJobMatchResult(idx, c._jobMatch, '');
      if (statusEl) statusEl.textContent = '';

    } else {
      // Not stale fallback — surface the reason clearly
      throw new Error(result.reason || 'no match found');
    }

  } catch(e) {
    const reason   = e.message || '';
    const isStale  = reason.toLowerCase().includes('30 days') || reason.toLowerCase().includes('old') || reason.toLowerCase().includes('recent');
    const isLevel  = reason.toLowerCase().includes('senior') || reason.toLowerCase().includes('level') || reason.toLowerCase().includes('junior');
    const isLoc    = reason.toLowerCase().includes('location') || reason.toLowerCase().includes('remote');
    const icon     = isStale ? '📅' : isLevel ? '📊' : isLoc ? '📍' : '🔍';
    const friendly = isStale
      ? 'No jobs posted at this company in the last 30 days that match your role.'
      : isLevel ? 'No roles at your seniority level found currently.'
      : isLoc   ? 'No roles in your preferred locations found.'
      : 'No matching open role found right now.';
    const liUrl = getJobLinks(company, targetRole)[0].url;
    if (resultEl) {
      resultEl.style.display = '';
      resultEl.innerHTML = `
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:12px">
          <div style="color:var(--text);font-weight:600;margin-bottom:4px">${icon} ${friendly}</div>
          ${reason && !['no match found','no json'].includes(reason) ? `<div style="color:var(--faint);font-size:11px;margin-bottom:8px">${h(reason)}</div>` : ''}
          <div style="color:var(--muted);font-size:11px;margin-bottom:8px">You can still reach out — or check manually:</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <a class="btn btn-secondary btn-sm" href="${h(liUrl)}" target="_blank" rel="noopener">Search ${h(company)} on LinkedIn ↗</a>
            <button class="btn btn-ghost btn-sm" onclick="setJdMode(${idx},'paste')">Paste JD manually →</button>
          </div>
        </div>`;
    }
    if (statusEl) statusEl.textContent = '';
  } finally {
    if (btn)     btn.disabled = false;
    if (spinner) spinner.classList.add('hidden');
  }
}

// Render the cached/fresh job match card into the result div
function showJobMatchResult(idx, match, label) {
  const resultEl = document.getElementById(`find-job-result-${idx}`);

  if (match.postedDate) {

    postedBadge = `<span style="font-size:11px;color:${freshColor};font-weight:600">📅 Posted ${daysOld === 0 ? 'today' : daysOld + 'd ago'}</span>`;

    : `<span style="font-size:10px;color:var(--faint)">AI estimated</span>`;

  if (statusEl && label) statusEl.textContent = label;

async function tailorResumeForCompany(company) {

  if (!match) return;

  // Find the best-scored contact at this company to use as a proxy for generateResume
  const contact = state.contacts
    .filter(c => coKey(c.company || '') === coKeyName)
    .sort((a, b) => (b.score || 0) - (a.score || 0))[0];
  if (!contact) return;

  const idx = state.contacts.indexOf(contact);

  contact.savedRole = match.title;
  contact._jdMode   = 'paste';
  contact._jdText   = [match.title + ' at ' + company, match.summary, match.snippet].filter(Boolean).join('\n\n');
  saveContacts();

  // Delegate to existing resume generation (opens modal)
  await generateResume(idx);

function getJdContext(idx) {
  const c = state.contacts[idx];
  if (!c) return '';
  if (c._jdMode === 'paste') {
    const ta = document.getElementById(`jd-paste-${idx}`);
    return (ta ? ta.value : c._jdText) || '';
  }
  // URL mode — prefer fetched full text, fall back to role-input value
  if (c._jdFetched) return c._jdFetched;
  const input = document.getElementById(`role-input-${idx}`);
  return input ? input.value.trim() : (c.savedRole || '');
}

// ── Resume fact-checker ───────────────────────
function parseResumeForFacts(text) {
  if (!text) return { dates: [], email: '', phone: '', linkedin: '' };
  const lines = text.split('\n');
  const dates  = [];
  const dateRe = /([A-Za-z]{3,9}\.?\s+\d{4}|\d{4})\s*(?:[–—\-]+|to)\s*([A-Za-z]{3,9}\.?\s+\d{4}|\d{4}|[Pp]resent|[Cc]urrent)/g;
  lines.forEach((line, i) => {
    let m;
    dateRe.lastIndex = 0;
    while ((m = dateRe.exec(line)) !== null) {
      // Get a bit of surrounding context for company name guessing
      const ctx = lines.slice(Math.max(0, i-2), i+2).join(' ').replace(/\s+/g, ' ').slice(0,120);
      dates.push({ from: m[1], to: m[2], context: ctx });
    }
  });
  const emailMatch   = text.match(/[\w.+-]+@[\w-]+\.[\w.]{2,}/);
  const phoneMatch   = text.match(/\+?[\d][\d\s\-\(\)\.]{8,17}(?=\D|$)/);
  const linkedinMatch= text.match(/(?:linkedin\.com\/in\/|linkedin\.com\/pub\/)([\w\-]+)/i);
  return {
    dates,
    email:    emailMatch   ? emailMatch[0]        : '',
    phone:    phoneMatch   ? phoneMatch[0].trim() : '',
    linkedin: linkedinMatch? linkedinMatch[0]     : ''
  };
}

function openResumeChecker(idx) {
  const profile  = state.profile;
  const positions = [...state.POSITIONS_DATA]
    .sort((a, b) => (b.from||'').localeCompare(a.from||''))
    .slice(0, 10);
  const rawResume = localStorage.getItem(LS.resume) || '';
  const parsed    = parseResumeForFacts(rawResume);

  const modal = document.getElementById('checker-modal');
  if (!modal) return;

  // ── Date comparison table ──
  const fmtDate = iso => {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleDateString('en-GB',{month:'short',year:'numeric'}); } catch(e){ return iso.slice(0,7); }
  };
  const isPresent = d => !d || d >= new Date().toISOString().slice(0,7);

  // Match LinkedIn positions to resume date entries by proximity
  const posRows = positions.map(p => {
    const liFrom = fmtDate(p.from);
    const liTo   = isPresent(p.to) ? 'Present' : fmtDate(p.to);
    const liFromYear = (p.from||'').slice(0,4);
    const liToYear   = isPresent(p.to) ? 'present' : (p.to||'').slice(0,4);
    // Find best matching resume date entry (same year in context or in date string)
    const match = parsed.dates.find(d =>
      d.from.includes(liFromYear) || d.context.toLowerCase().includes((p.co_display||'').toLowerCase().split(' ')[0].toLowerCase())
    );
    const resFrom = match ? match.from : '—';
    const resTo   = match ? match.to   : '—';
    const exact   = match && (resFrom.includes(liFromYear)) && (resTo.toLowerCase().includes(liToYear) || (isPresent(p.to) && /present|current/i.test(resTo)));
    const hasMatch= match !== undefined;
    return { p, liFrom, liTo, resFrom, resTo, exact, hasMatch };
  });

  // ── Contact info check ──
  const profEmail   = profile.email    || '';
  const profPhone   = profile.phone    || '';
  const profLinkedin= profile.linkedinUrl || '';

  const infoRows = [
    { field:'Email',    profile: profEmail,    resume: parsed.email,    match: profEmail    && parsed.email    && profEmail.toLowerCase()===parsed.email.toLowerCase() },
    { field:'Phone',    profile: profPhone,    resume: parsed.phone,    match: profPhone    && parsed.phone    && profPhone.replace(/\D/g,'').slice(-8)===parsed.phone.replace(/\D/g,'').slice(-8) },
    { field:'LinkedIn', profile: profLinkedin, resume: parsed.linkedin, match: profLinkedin && parsed.linkedin && profLinkedin.toLowerCase().includes(parsed.linkedin.toLowerCase().split('/').pop()) }
  ];

  const hasDateMismatch = posRows.some(r => r.hasMatch && !r.exact);
  const hasInfoMismatch = infoRows.some(r => (r.profile || r.resume) && !r.match);

  modal.innerHTML = `
  <div style="background:var(--surface);border-radius:var(--radius);max-width:680px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,0.25)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:16px;font-weight:700">🔍 Resume fact-check</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Comparing LinkedIn data · pasted resume · WarmPath profile</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('checker-modal').style.display='none'">✕ Close</button>
    </div>

    ${!rawResume && positions.length === 0 ? `
      <div style="padding:16px;background:var(--surface2);border-radius:var(--radius);color:var(--muted);font-size:13px">
        No resume text or LinkedIn positions found yet.<br>
        Add your resume text in <strong>Setup → Profile</strong> and import your LinkedIn archive for the best comparison.
      </div>` : `

    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Employment dates
      <span style="font-weight:400;font-size:12px;color:var(--muted)">(LinkedIn is the source of truth — flag any differences before sending your resume)</span>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:18px">
      <thead>
        <tr style="border-bottom:2px solid var(--border)">
          <th style="text-align:left;padding:5px 8px;font-size:11px;text-transform:uppercase;color:var(--faint);letter-spacing:.5px">Company</th>
          <th style="text-align:left;padding:5px 8px;font-size:11px;text-transform:uppercase;color:var(--faint);letter-spacing:.5px">LinkedIn</th>
          <th style="text-align:left;padding:5px 8px;font-size:11px;text-transform:uppercase;color:var(--faint);letter-spacing:.5px">Pasted resume</th>
          <th style="padding:5px 8px;font-size:11px;text-transform:uppercase;color:var(--faint);letter-spacing:.5px">Match</th>
        </tr>
      </thead>
      <tbody>
        ${posRows.map(row => `
          <tr style="border-bottom:1px solid var(--border2)">
            <td style="padding:6px 8px;font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${h(row.p.title||'')} at ${h(row.p.co_display||'')}">${h(row.p.co_display||'—')}<div style="font-size:11px;color:var(--muted);font-weight:400">${h(row.p.title||'')}</div></td>
            <td style="padding:6px 8px;color:var(--teal);font-family:monospace;font-size:11px">${h(row.liFrom)} – ${h(row.liTo)}</td>
            <td style="padding:6px 8px;font-family:monospace;font-size:11px;color:${row.hasMatch?'inherit':'var(--faint)'}">${row.hasMatch ? h(row.resFrom)+' – '+h(row.resTo) : '<span style="font-style:italic">not found</span>'}</td>
            <td style="padding:6px 8px;text-align:center;font-size:15px">${!row.hasMatch ? '<span title="Date not found in resume text">—</span>' : row.exact ? '✅' : '<span style="color:var(--amber)" title="Dates differ between sources">⚠️</span>'}</td>
          </tr>`).join('')}
      </tbody>
    </table>

    ${hasDateMismatch ? `<div style="padding:8px 12px;background:#fefce8;border:1px solid #fde047;border-radius:6px;font-size:12px;color:#713f12;margin-bottom:14px">
      ⚠️ <strong>Some dates differ.</strong> Your pasted resume may have less precise dates (e.g. year only vs month+year). LinkedIn dates are used as the authoritative source when generating your resume — no action needed unless LinkedIn is wrong.</div>` : ''}

    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Contact info</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:18px">
      <thead>
        <tr style="border-bottom:2px solid var(--border)">
          <th style="text-align:left;padding:5px 8px;font-size:11px;text-transform:uppercase;color:var(--faint);letter-spacing:.5px">Field</th>
          <th style="text-align:left;padding:5px 8px;font-size:11px;text-transform:uppercase;color:var(--faint);letter-spacing:.5px">WarmPath profile</th>

          <th style="padding:5px 8px;font-size:11px;text-transform:uppercase;color:var(--faint);letter-spacing:.5px">Match</th>
        </tr>
      </thead>
      <tbody>
        ${infoRows.map(row => `
          <tr style="border-bottom:1px solid var(--border2)">
            <td style="padding:6px 8px;font-weight:600">${h(row.field)}</td>
            <td style="padding:6px 8px;font-family:monospace;font-size:11px;color:${row.profile?'inherit':'var(--faint)'}">${row.profile ? h(row.profile) : '<span style="font-style:italic">not set — add in Profile</span>'}</td>
            <td style="padding:6px 8px;font-family:monospace;font-size:11px;color:${row.resume?'inherit':'var(--faint)'}">${row.resume ? h(row.resume) : '<span style="font-style:italic">not found in text</span>'}</td>
            <td style="padding:6px 8px;text-align:center;font-size:15px">${(!row.profile && !row.resume) ? '—' : (!row.profile || !row.resume) ? '<span title="Only found in one source">—</span>' : row.match ? '✅' : '<span style="color:var(--red)" title="Values differ">❌</span>'}</td>
          </tr>`).join('')}
      </tbody>
    </table>

    ${hasInfoMismatch ? `<div style="padding:8px 12px;background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;font-size:12px;color:#991b1b;margin-bottom:14px">
      ❌ <strong>Contact info mismatch.</strong> The email/phone/LinkedIn found in your pasted resume differs from what's saved in your WarmPath profile. Update <strong>Setup → Profile</strong> with the correct value — it will be used on all future resumes.</div>` : ''}

    <div style="padding:10px 12px;background:var(--surface2);border-radius:6px;font-size:12px;color:var(--muted);line-height:1.5">
      ℹ️ WarmPath uses your <strong>LinkedIn positions as the authoritative employment dates</strong> when generating a resume. The pasted resume text is used for bullet points and achievements. This check helps you spot anything that might cause a date mismatch on your final resume.
    </div>
    <div style="margin-top:14px;display:flex;gap:8px">

  modal.style.display = 'flex';
}

function logAsSent(idx) {
  const c = state.contacts[idx];
  if (!c) return;
  const ta        = document.getElementById(`msg-ta-${idx}`);
  const roleInput = document.getElementById(`role-input-${idx}`);
  const msg       = ta?.value || '';
  const role      = (c._jdMode === 'paste' ? '' : roleInput?.value?.trim()) || c.savedRole || '';

  // ── Structured interaction entry ──
  if (!c._interactions) c._interactions = [];
  const entry = {
    id:       Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    date:     new Date().toISOString(),
    type:     'linkedin',
    message:  msg,
    role:     role,
    response: null,
    note:     ''
  };
  c._interactions.unshift(entry); // newest first
  logActivity('message_sent', { contactIdx: idx, role });

  c.status        = 'Messaged';
  c.lastContacted = new Date().toISOString().slice(0,10);
  syncOutreachForContact(idx, 'messaged');
  if (role) c.savedRole = role;
  if (msg) {
    c._lastSentMsg  = msg;
    c._lastSentDate = new Date().toISOString();
  }
  saveContacts();
  updateNavCounts();
  setDrawerStatus(idx, 'Logged ✓', 'success');

  // Refresh card badge
  const nameRow = document.querySelector(`#card-${idx} .contact-name-row`);
  if (nameRow) {
    nameRow.querySelectorAll('.badge').forEach(b => b.remove());
    nameRow.insertAdjacentHTML('beforeend', gradeBadge(c.grade) + statusBadge(c.status));
  }
  // Show inline response prompt immediately after logging
  showResponsePrompt(idx, entry.id);

  // Offer to add a Jobs entry if role is set and not already linked
  if (role && c.company) {
    const linkedJobId = document.getElementById(`msg-job-${idx}`)?.value;
    const alreadyExists = state.JOBS.some(j =>
      j.title.toLowerCase() === role.toLowerCase() && j.company.toLowerCase() === c.company.toLowerCase()
    );
    if (!linkedJobId && !alreadyExists) {
      const banner = document.getElementById(`job-prompt-${idx}`);
      if (banner) return;
      const drawerBody = document.getElementById('side-drawer-body');
      if (drawerBody) {
        const prompt = document.createElement('div');
        prompt.id = `job-prompt-${idx}`;
        prompt.style.cssText = 'margin-top:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;font-size:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid var(--border)';
        prompt.innerHTML = `<span style="flex:1">💼 Add <strong>${h(role)}</strong> @ <strong>${h(c.company)}</strong> to your Jobs tracker?</span>
          <button class="btn btn-primary btn-sm" onclick="quickAddJob('${idx}','${h(role).replace(/'/g,"\\'")}','${h(c.company).replace(/'/g,"\\'")}')">Add to Jobs</button>
          <button class="btn btn-ghost btn-sm" onclick="this.parentElement.remove()">Skip</button>`;
        drawerBody.appendChild(prompt);
      }
    }
  }
}

function showResponsePrompt(idx, entryId) {
  // Remove any existing prompt
  document.getElementById(`response-prompt-${idx}`)?.remove();

  // Insert after the drawer-actions row
  const actionsEl = document.querySelector(`#side-drawer-body .drawer-actions`);
  if (!actionsEl) return;

  const div = document.createElement('div');
  div.id = `response-prompt-${idx}`;
  div.style.cssText = 'margin-top:10px;padding:10px 12px;background:var(--teal-bg);border:1px solid #b0e4d4;border-radius:var(--radius);width:100%;box-sizing:border-box';
  div.innerHTML = `
    <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Did they respond? <span style="font-weight:400;color:var(--muted)">(you can also log later)</span></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <button class="btn btn-sm btn-teal"      onclick="saveInteractionResponse(${idx},'${entryId}','replied')">Replied ✓</button>
      <button class="btn btn-sm btn-ghost"     onclick="saveInteractionResponse(${idx},'${entryId}','positive')">Positive 🙂</button>
      <button class="btn btn-sm btn-ghost"     onclick="saveInteractionResponse(${idx},'${entryId}','no_response')">No response</button>
      <button class="btn btn-sm btn-ghost"     onclick="saveInteractionResponse(${idx},'${entryId}','not_interested')">Not interested</button>
    </div>
    <input id="response-note-inp-${idx}" class="form-input" style="font-size:12px;padding:5px 8px;margin-bottom:7px;width:100%;box-sizing:border-box"
      placeholder="What did they say? (optional quick note)">
    <div style="display:flex;gap:6px">
      <button class="btn btn-primary btn-sm" onclick="saveInteractionNote(${idx},'${entryId}')">Save note</button>
      <button class="btn btn-ghost btn-sm"   onclick="document.getElementById('response-prompt-${idx}')?.remove()">Skip</button>
    </div>`;
  actionsEl.insertAdjacentElement('afterend', div);
  div.querySelector('input')?.focus();
}

function saveInteractionResponse(idx, entryId, response) {
  const c = state.contacts[idx];
  if (!c?._interactions) return;
  const entry = c._interactions.find(e => e.id === entryId);
  if (!entry) return;

  const noteInput = document.getElementById(`response-note-inp-${idx}`);
  entry.response = response;
  if (noteInput?.value?.trim()) entry.note = noteInput.value.trim();
  if (response === 'replied' || response === 'positive') {
    c.status = 'Replied';
    logActivity('response_received', { contactIdx: idx, response });
    syncOutreachForContact(idx, 'replied');
  } else if (response === 'no_response') {
    syncOutreachForContact(idx, 'no_response');
  }

  saveContacts();
  updateNavCounts();
  document.getElementById(`response-prompt-${idx}`)?.remove();
  setDrawerStatus(idx, `Response saved: ${response.replace('_',' ')} ✓`, 'success');
  renderDrawerContent(idx);
}

function saveInteractionNote(idx, entryId) {
  const c = state.contacts[idx];
  if (!c?._interactions) return;
  const entry = c._interactions.find(e => e.id === entryId);
  if (!entry) return;

  const noteInput = document.getElementById(`response-note-inp-${idx}`);
  entry.note = noteInput?.value?.trim() || '';
  saveContacts();
  document.getElementById(`response-prompt-${idx}`)?.remove();
  setDrawerStatus(idx, 'Note saved ✓', 'success');
  renderDrawerContent(idx);
}

function renderInteractionTimeline(c, idx) {
  const interactions = c._interactions || [];
  if (interactions.length === 0) {
    return `<div style="font-size:12px;color:var(--faint);font-style:italic;padding:8px 0">No interactions logged yet — click "✓ Log as sent" after sending a message.</div>`;
  }
  const responseStyle = {
    'replied':        { color:'var(--teal)',  label:'Replied ✓' },
    'positive':       { color:'var(--teal)',  label:'Positive 🙂' },
    'no_response':    { color:'var(--muted)', label:'No response' },
    'not_interested': { color:'var(--coral)', label:'Not interested' }

  return interactions.map((entry, i) => {
    const d   = new Date(entry.date);
    const ds  = d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
    const res = entry.response ? responseStyle[entry.response] : null;
    return `
    <div style="display:flex;gap:10px;padding:10px 0;${i < interactions.length-1 ? 'border-bottom:1px solid var(--border2)' : ''}">
      <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
        <div style="width:9px;height:9px;border-radius:50%;background:${res ? res.color : 'var(--border2)'};margin-top:3px"></div>
        ${i < interactions.length-1 ? '<div style="width:1px;flex:1;background:var(--border2);margin-top:4px"></div>' : ''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-size:11px;font-weight:700;color:var(--muted)">${ds}</span>
          <span style="font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1px 6px;color:var(--faint)">${entry.type||'linkedin'}</span>
          ${entry.role ? `<span style="font-size:11px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px" title="${h(entry.role)}">${h(entry.role.slice(0,28))}${entry.role.length>28?'…':''}</span>` : ''}
        </div>
        ${entry.message ? `<div style="font-size:12px;color:var(--muted);background:var(--surface2);padding:5px 8px;border-radius:5px;margin-bottom:5px;font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">"${h(entry.message.slice(0,120))}${entry.message.length>120?'…':''}"</div>` : ''}
        <div style="font-size:12px">
          ${res ? `<span style="color:${res.color};font-weight:600">${res.label}</span>` : `<span style="color:var(--faint);font-style:italic">response not logged</span> <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:1px 6px;min-height:0" onclick="showResponsePrompt(${idx},'${entry.id}')">Log →</button>`}
        </div>
        ${entry.note ? `<div style="font-size:12px;color:var(--muted);margin-top:3px">💬 ${h(entry.note)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function loadCompanyIntel(idx) {
  const c = state.contacts[idx];
  if (!c || !c.company) return;
  const cfg = getAIConfig();
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    const row = document.getElementById(`intel-row-${idx}`);
    if (row) row.innerHTML = `<span style="color:var(--red);font-size:12px">Add an AI provider in Setup to load intel.</span>`;
    return;
  }

  // Show loading state on all open drawers for the same company
  const key = coKey(c.company);
  state.contacts.forEach((ct, i) => {
    if (coKey(ct.company) === key) {
      const btn = document.getElementById(`intel-btn-${i}`);
      if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    }
  });

  const prompt = `What is the Glassdoor overall company rating for "${c.company}"?
Return ONLY a JSON object: {"glassdoorRating":number_or_null}
Use null if unknown. No other text.`;

  try {
    // Try with web search first (Anthropic only), fall back to plain
    let text = '';
    try {
      text = await callAI(prompt, 300, cfg.provider === 'anthropic');
    } catch(e2) {
      text = await callAI(prompt, 300, false);
    }
    // Extract JSON from response (model may wrap it in prose)
    const match = text.match(/\{[\s\S]*\}/);
    const intel = match ? JSON.parse(match[0]) : {};
    intel.fetchedAt = new Date().toISOString();

    // Write to shared cache (not per-contact)
    state.COMPANY_INTEL[key] = intel;
    saveCompanyIntel();

    // Refresh all open drawers for contacts at this company
    state.contacts.forEach((ct, i) => {
      if (coKey(ct.company) === key) renderDrawerContent(i);
    });
    // Refresh any open application card too
    renderApplicationsTab();
  } catch(e) {
    state.contacts.forEach((ct, i) => {
      if (coKey(ct.company) === key) {
        const row = document.getElementById(`intel-row-${i}`);
        if (row) row.innerHTML = `
          <span style="color:var(--red);font-size:12px">Failed: ${h(e.message)}</span>
          <button class="btn btn-secondary btn-sm" onclick="loadCompanyIntel(${i})">Retry</button>`;
      }
    });
  }
}

function openGradeReviewer() {
  const modal = document.getElementById('grade-review-modal');
  const candidates = [...state.contacts]
    .map((c, i) => ({ c, i }))
    .filter(({ c }) => (c.score || 0) > 0)
    .sort((a, b) => (b.c.score || 0) - (a.c.score || 0))
    .slice(0, 80);

  let rows = candidates.map(({ c, i }) => `
    <tr>
      <td>${h(c.name)}</td>
      <td style="color:var(--muted)">${h(c.company || '—')}</td>
      <td>${gradeBadge(c.grade)}</td>
      <td>${gradeBadge(smartScore(c, state).grade)}</td>
      <td>
        <select class="grade-select-inline" data-idx="${i}">
          <option value="" selected>— keep —</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
      </td>
    </tr>`).join('');

  modal.innerHTML = `<div class="modal-card">
    <div class="modal-title">Smart grade review</div>
    <div class="modal-sub">Top ${candidates.length} contacts by score. Override grades or accept suggestions.</div>
    <table class="reviewer-table">
      <thead><tr>
        <th>Name</th><th>Company</th><th>Current</th><th>Suggested</th><th>Override</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeGradeReviewer()">Cancel</button>
      <button class="btn btn-secondary" onclick="acceptAllGrades()">Accept all suggested</button>
      <button class="btn btn-primary" onclick="saveGradeOverrides()">Save changes</button>
    </div>
  </div>`;
  modal.style.display = 'flex';
}

function closeGradeReviewer() {
  document.getElementById('grade-review-modal').style.display = 'none';
}

function acceptAllGrades() {
  state.contacts.forEach((c, i) => {
    const suggested = smartScore(c, state).grade;
    state.contacts[i].grade = suggested;
  });
  saveContacts();
  updateNavCounts();
  closeGradeReviewer();
  renderContactsTab();
}

function saveGradeOverrides() {
  const selects = document.querySelectorAll('#grade-review-modal [data-idx]');
  selects.forEach(sel => {
    const idx = parseInt(sel.dataset.idx, 10);
    const val = sel.value;
    if (val && state.contacts[idx]) {
      state.contacts[idx].grade  = val;
      state.contacts[idx].source = 'manual';
    }
  });
  saveContacts();
  updateNavCounts();
  closeGradeReviewer();
  renderContactsTab();
}

function toggleAddForm() {
  const form  = document.getElementById('add-contact-form');
  const arrow = document.getElementById('add-form-arrow');
  if (!form) return;
  const open = form.classList.toggle('open');
  if (arrow) arrow.textContent = open ? '▼' : '▶';
}

function saveManualContact() {
  const name = (document.getElementById('cf-name')?.value || '').trim();
  if (!name) { alert('Name is required.'); return; }
  const company  = document.getElementById('cf-company')?.value?.trim() || '';
  const position = document.getElementById('cf-role')?.value?.trim()    || '';
  const rel      = document.getElementById('cf-rel')?.value?.trim()     || 'Manual entry';
  const grade    = document.getElementById('cf-grade')?.value           || 'B';
  const status   = document.getElementById('cf-status')?.value          || 'Not contacted';
  const url      = document.getElementById('cf-url')?.value?.trim()     || '';
  const notes    = document.getElementById('cf-notes')?.value?.trim()   || '';
  const role     = [position, company].filter(Boolean).join(', ');

  const scored = smartScore({ name, company, position, url, notes, connectedOn: null }, state);

  const contact = {
    name, company, position, role, relationship: rel,
    grade, score: scored.score, gradeReasons: scored.reasons,
    warmthTier: scored.warmthTier, msgCount: scored.msgCount,
    status, notes, url, connectedOn: '',
    source: 'manual', lastContacted: null, savedRole: ''
  };

  state.contacts.unshift(contact);
  saveContacts();
  updateNavCounts();
  importBanner = { msg: `${name} added.`, type: 'success' };
  renderContactsTab();
}

function updateContactGrade(idx, grade) {
  if (!state.contacts[idx]) return;
  state.contacts[idx].grade = grade;
  state.contacts[idx].source = 'manual';
  saveContacts();
  updateNavCounts();
  renderContactsList();
}

function toggleBoost(idx) {
  const c = state.contacts[idx];
  if (!c) return;
  c._boosted = !c._boosted;
  const delta = c._boosted ? 50 : -50;
  c.score = Math.max(0, (c.score || 0) + delta);
  c.grade  = c.score >= 55 ? 'A' : c.score >= 25 ? 'B' : 'C';
  c.source = 'manual';
  saveContacts();
  updateNavCounts();
  renderContactsList();
  if (sideDrawerIdx === idx) renderDrawerContent(idx);
}
