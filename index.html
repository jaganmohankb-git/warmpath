<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarmPath</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg: #f2f0eb;
  --surface: #ffffff;
  --surface2: #f8f7f3;
  --border: #e3e0d8;
  --border2: #ccc9c0;
  --text: #1a1917;
  --muted: #6b6860;
  --faint: #999590;
  --purple: #4a42a8;
  --purple-bg: #eeedf8;
  --teal: #0d6b52;
  --teal-bg: #e0f5ee;
  --amber: #b87115;
  --amber-bg: #faecd8;
  --coral: #963a1a;
  --coral-bg: #faece7;
  --blue: #1759a0;
  --blue-bg: #e5f0fb;
  --green: #2e6e1a;
  --green-bg: #e8f3e0;
  --red: #9e2b2b;
  --red-bg: #fbeaea;
  --radius: 10px;
  --radius-lg: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Nav ── */
.topnav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 20px;
  height: 52px;
}
.nav-brand {
  font-weight: 700;
  font-size: 16px;
  color: var(--purple);
  letter-spacing: -0.3px;
  margin-right: 12px;
  flex-shrink: 0;
}
.nav-tabs { display: flex; gap: 2px; flex: 1; }
.nav-tab {
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  padding: 0 14px;
  height: 52px;
  font-size: 14px;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: 600; }
.nav-tab-sub { font-size: 10px; font-weight: 400; color: var(--faint); line-height: 1; letter-spacing: 0; }
.nav-tab.active .nav-tab-sub { color: var(--purple); opacity: 0.7; }
.nav-action {
  background: var(--purple-bg);
  color: var(--purple);
  border: 1px solid #d0cef0;
  border-radius: var(--radius);
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}
.nav-action:hover { background: #e4e2f4; }

/* ── Layout ── */
.tab-panel { display: none; max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
.tab-panel.active { display: block; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent; transition: opacity 0.15s;
  text-decoration: none;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--purple); color: #fff; border-color: var(--purple); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border2); }
.btn-amber { background: var(--amber-bg); color: var(--amber); border-color: #e8c88a; }
.btn-teal { background: var(--teal-bg); color: var(--teal); border-color: #9dd4c0; }
.btn-red { background: var(--red-bg); color: var(--red); border-color: #e8b4b4; }
.btn-ghost { background: none; color: var(--muted); border-color: transparent; }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 6px; border-radius: 8px; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
  white-space: nowrap;
}
.badge-a { background: var(--teal-bg); color: var(--teal); }
.badge-b { background: var(--amber-bg); color: var(--amber); }
.badge-c { background: var(--surface2); color: var(--faint); border: 1px solid var(--border); }
.badge-not-contacted { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.badge-message-sent  { background: var(--blue-bg); color: var(--blue); }
.badge-replied       { background: var(--teal-bg); color: var(--teal); }
.badge-call-done     { background: var(--green-bg); color: var(--green); }
.badge-referral      { background: var(--purple-bg); color: var(--purple); }
.badge-intro         { background: var(--purple-bg); color: var(--purple); }
.badge-no-response   { background: var(--amber-bg); color: var(--amber); }
.badge-applied       { background: var(--blue-bg); color: var(--blue); }
.badge-screening     { background: var(--amber-bg); color: var(--amber); }
.badge-interview     { background: var(--purple-bg); color: var(--purple); }
.badge-offer         { background: var(--green-bg); color: var(--green); }
.badge-rejected      { background: var(--red-bg); color: var(--red); }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  overflow: hidden;
}
.card-body { padding: 16px; }

/* ── Stats row ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  text-align: center;
}
.stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── Search / filter bar ── */
.filter-bar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
.grade-pill-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.grade-pill-label { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--faint); margin-right: 2px; }
.grade-pill {
  padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border2); background: var(--surface); color: var(--muted);
  cursor: pointer; transition: all 0.12s; white-space: nowrap; line-height: 1.6;
}
.grade-pill:hover { border-color: var(--purple); color: var(--purple); background: var(--surface2); }
.grade-pill.active { border-color: var(--purple); background: var(--purple); color: #fff; }
.grade-pill.pill-a.active  { background: var(--teal);   border-color: var(--teal); }
.grade-pill.pill-b.active  { background: var(--amber);  border-color: var(--amber); color: #7a4f00; }
.grade-pill.pill-c.active  { background: var(--border2);border-color: var(--border2); color: var(--muted); }
.grade-pill.pill-all.active   { background: var(--surface2); border-color: var(--purple); color: var(--purple); }
.grade-pill.pill-target.active  { background: var(--teal); border-color: var(--teal); color: #fff; }
.company-pill-row { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; align-items:center;
  padding:8px 12px; background:var(--teal-bg); border-radius:var(--radius); border:1px solid #b0e4d4; }

.search-input {
  flex: 1; min-width: 200px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 14px;
  background: var(--surface);
  color: var(--text);
  outline: none;
}
.search-input:focus { border-color: var(--purple); }
.filter-select {
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 7px 10px;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  outline: none;
}
.filter-select:focus { border-color: var(--purple); }
.filter-count { font-size: 13px; color: var(--muted); white-space: nowrap; }

/* ── Contact card ── */
.contact-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.contact-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.contact-card.drawer-active {
  border-color: var(--purple);
  box-shadow: 0 0 0 2px var(--purple-bg);
}
.contact-card-header {
  padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start;
  cursor: pointer; user-select: none;
}
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
  flex-shrink: 0; margin-top: 2px;
}
.avatar-a { background: var(--teal); }
.avatar-b { background: var(--amber); }
.avatar-c { background: var(--faint); }
.contact-info { flex: 1; min-width: 0; }
.contact-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
.contact-name { font-weight: 600; font-size: 15px; }
.contact-role { color: var(--muted); font-size: 13px; margin-bottom: 5px; }
.contact-signals { font-size: 12px; color: var(--faint); margin-bottom: 8px; }
.contact-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.contact-link {
  font-size: 12px; color: var(--blue); text-decoration: none;
  padding: 3px 8px; border: 1px solid var(--blue-bg); border-radius: 6px;
  background: var(--blue-bg);
}
.contact-link:hover { opacity: 0.8; }
.grade-select-inline {
  border: 1px solid var(--border2); border-radius: 6px;
  padding: 3px 6px; font-size: 12px; background: var(--surface);
  color: var(--text); cursor: pointer;
}
.outreach-btn {
  margin-left: auto;
  background: var(--purple-bg); color: var(--purple);
  border: 1px solid #d0cef0; border-radius: 6px;
  padding: 4px 12px; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
}
.outreach-btn:hover { background: #e4e2f4; }

/* ── Export checkbox ── */
.export-checkbox-wrap {
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; padding: 2px 4px 0 0; cursor: pointer;
}
.export-checkbox {
  width: 16px; height: 16px; cursor: pointer; accent-color: var(--teal);
}
.select-all-wrap {
  display: flex; align-items: center; gap: 5px; cursor: pointer;
  flex-shrink: 0; padding: 0 4px;
}
.select-all-wrap input[type="checkbox"] {
  width: 15px; height: 15px; cursor: pointer; accent-color: var(--teal);
}
.btn-export {
  background: var(--teal); color: #fff; border: none;
  font-weight: 600; white-space: nowrap;
}
.btn-export:hover { background: #0d9488; }

/* ── View toggle ── */
.view-toggle { display:flex; gap:4px; margin-bottom:12px; }
.view-toggle-btn {
  flex:1; padding:7px 10px; font-size:12px; font-weight:600;
  border:1px solid var(--border2); border-radius:var(--radius);
  background:var(--surface); color:var(--muted); cursor:pointer;
  transition:all 0.15s;
}
.view-toggle-btn.active { background:var(--purple); border-color:var(--purple); color:#fff; }

/* ── Company group ── */
.company-group { margin-bottom:10px; }
.company-group-header {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius-lg);
  cursor:pointer; user-select:none; transition:border-color 0.15s;
}
.company-group-header:hover { border-color:var(--purple); }
.company-group-header.has-a { border-left:3px solid var(--teal); }
.company-group-header.is-target { background:var(--teal-bg); }
.company-group-avatar {
  width:36px; height:36px; border-radius:8px; flex-shrink:0;
  background:var(--purple-bg); color:var(--purple);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:14px;
}
.company-group-name { font-weight:700; font-size:14px; }
.company-group-meta { font-size:12px; color:var(--muted); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.company-group-intel { font-size:11px; color:var(--faint); }
.company-group-right { margin-left:auto; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.company-group-chevron { font-size:11px; color:var(--muted); transition:transform 0.2s; }
.company-group-chevron.open { transform:rotate(90deg); }
.company-group-contacts { padding:6px 0 4px 14px; display:flex; flex-direction:column; gap:6px; }
.company-group-contacts .contact-card { margin-bottom:0; }

/* ── Side drawer ── */
#side-drawer-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.10);
  z-index: 199; cursor: pointer;
}
#side-drawer-overlay.open { display: block; }
/* On desktop push-layout, overlay blocks card clicks — hide it, drawer sits beside the list */
@media (min-width: 960px) {
  #side-drawer-overlay { display: none !important; }
}
#side-drawer {
  position: fixed;
  top: 52px; right: 0; bottom: 0;
  width: 560px; max-width: 92vw;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 200;
  overflow-y: auto;
  box-shadow: -6px 0 28px rgba(0,0,0,0.09);
  transform: translateX(100%);
  transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
}
#side-drawer.open {
  transform: translateX(0);
  pointer-events: all;
}
#side-drawer-header {
  position: sticky; top: 0; z-index: 1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 13px 16px;
  display: flex; align-items: center; gap: 10px;
}
#side-drawer-body { padding: 16px; }
.drawer-close-btn {
  background: none; border: none;
  font-size: 17px; color: var(--muted);
  cursor: pointer; padding: 4px 6px; border-radius: 4px;
  line-height: 1; flex-shrink: 0;
}
.drawer-close-btn:hover { background: var(--surface2); color: var(--text); }
.drawer-back-btn {
  display: none;
  background: none; border: none;
  font-size: 14px; font-weight: 600; color: var(--purple);
  cursor: pointer; padding: 4px 8px; border-radius: 6px;
  line-height: 1; flex-shrink: 0; align-items: center; gap: 4px;
  white-space: nowrap;
}
.drawer-back-btn:hover { background: var(--purple-bg); }
/* legacy inline drawer — kept hidden */
.outreach-drawer { display: none !important; }
.drawer-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--faint); text-transform: uppercase; margin-bottom: 8px;
}
.job-links { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.role-row { display: flex; gap: 8px; margin-bottom: 14px; }
.role-input {
  flex: 1; border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 8px 12px; font-size: 13px; background: var(--surface);
  color: var(--text); outline: none;
}
.role-input:focus { border-color: var(--purple); }
.intel-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.intel-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--muted);
}
/* Company status select — compact, inline in company header */
.co-status-select {
  font-size: 11px; padding: 3px 6px; border: 1px solid var(--border2);
  border-radius: 6px; background: var(--surface); color: var(--muted);
  cursor: pointer; max-width: 120px;
}
.co-status-select.has-status { color: var(--text); border-color: var(--purple); background: var(--purple-bg); }
.msg-textarea {
  width: 100%; min-height: 140px; border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 12px;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 13px; line-height: 1.6; resize: vertical;
  background: var(--surface); color: var(--text); outline: none;
}
.msg-textarea:focus { border-color: var(--purple); }
.drawer-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
.drawer-status { font-size: 12px; color: var(--muted); }

/* ── Collapsible add form ── */
.add-form-wrap { margin-bottom: 16px; }
.add-form-toggle {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px dashed var(--border2);
  border-radius: var(--radius); padding: 10px 14px;
  cursor: pointer; color: var(--muted); font-size: 13px;
  width: 100%; text-align: left;
}
.add-form-toggle:hover { border-color: var(--purple); color: var(--purple); }
.add-form-body {
  display: none; background: var(--surface);
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  padding: 16px;
}
.add-form-body.open { display: block; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 500; color: var(--muted); }
.form-input, .form-select, .form-textarea {
  border: 1px solid var(--border2); border-radius: 8px;
  padding: 8px 10px; font-size: 13px;
  background: var(--surface); color: var(--text); outline: none;
  font-family: inherit;
}
.form-textarea { resize: vertical; min-height: 70px; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--purple); }
.form-actions { display: flex; gap: 8px; margin-top: 14px; }

/* ── Banner ── */
.banner {
  border-radius: var(--radius); padding: 10px 14px;
  margin-bottom: 14px; font-size: 13px; display: flex;
  align-items: center; justify-content: space-between; gap: 12px;
}
.banner-success { background: var(--teal-bg); color: var(--teal); border: 1px solid #9dd4c0; }
.banner-info    { background: var(--blue-bg); color: var(--blue); border: 1px solid #b0cef0; }
.banner-warn    { background: var(--amber-bg); color: var(--amber); border: 1px solid #e8c88a; }
.banner-error   { background: var(--red-bg); color: var(--red); border: 1px solid #e8b4b4; }
.banner-close { background: none; border: none; cursor: pointer; font-size: 16px; color: inherit; opacity: 0.6; }

/* ── Pipeline board ── */
.pipeline { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
.pipeline-col {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  text-align: center; cursor: pointer; transition: border-color 0.15s;
}
.pipeline-col:hover, .pipeline-col.active { border-color: var(--purple); }
.pipeline-col.active { background: var(--purple-bg); }
.pipeline-col.closed { opacity: 0.6; border-style: dashed; }
.pipeline-col.closed:hover, .pipeline-col.closed.active { border-color: var(--red); }
.pipeline-col.closed.active { background: var(--red-bg); opacity: 1; }
.pipeline-num { font-size: 22px; font-weight: 700; line-height: 1; color: var(--text); }
.pipeline-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── App card ── */
.app-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden;
}
.app-card-header { padding: 14px 16px; }
.app-title-row { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.app-company { font-weight: 700; font-size: 15px; }
.app-role { font-size: 13px; color: var(--muted); }
.app-meta { font-size: 12px; color: var(--faint); display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
.app-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.feedback-log { border-top: 1px solid var(--border); padding: 12px 16px; background: var(--surface2); }
.feedback-entry { margin-bottom: 10px; }
.feedback-round { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 2px; }
.feedback-notes { font-size: 13px; color: var(--text); }

/* ── Resume modal ── */
.resume-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 250; display: flex; align-items: flex-start; justify-content: center;
  padding: 24px 16px; overflow-y: auto;
}
.resume-modal-card {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 100%; max-width: 780px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  padding: 28px 32px;
}
.resume-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.resume-toolbar h2 { font-size: 16px; font-weight: 700; margin: 0; flex: 1; }
/* Resume document styles */
.resume-doc { font-family: 'Georgia', serif; color: #1a1a1a; line-height: 1.6; }
.resume-doc .r-name { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
.resume-doc .r-headline { font-size: 14px; color: #444; margin-bottom: 6px; }
.resume-doc .r-contact { font-size: 12px; color: #666; margin-bottom: 18px; }
.resume-doc hr.r-divider { border: none; border-top: 2px solid #1a1a1a; margin: 0 0 14px; }
.resume-doc .r-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #444; margin: 18px 0 8px; }
.resume-doc .r-summary { font-size: 14px; margin-bottom: 4px; }
.resume-doc .r-job { margin-bottom: 14px; }
.resume-doc .r-job-header { display: flex; justify-content: space-between; align-items: baseline; }
.resume-doc .r-job-title { font-size: 14px; font-weight: 700; }
.resume-doc .r-job-dates { font-size: 12px; color: #666; white-space: nowrap; }
.resume-doc .r-job-company { font-size: 13px; color: #444; margin-bottom: 5px; }
.resume-doc .r-bullets { margin: 0; padding-left: 18px; }
.resume-doc .r-bullets li { font-size: 13px; margin-bottom: 3px; }
.resume-doc .r-skills { font-size: 13px; }
@media print {
  .resume-modal-overlay, .resume-toolbar { display: none !important; }
  .resume-print-target { display: block !important; }
}

/* ── HR Templates ── */
.hr-templates { margin-top: 32px; }
.collapsible-header {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; padding: 12px 0; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 14px;
}
.collapsible-header:hover { color: var(--purple); }
.collapsible-body { display: none; padding-top: 14px; }
.collapsible-body.open { display: block; }
.template-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.template-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
.template-text { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.6; margin-bottom: 8px; }

/* ── Setup tab ── */
.setup-section { margin-bottom: 32px; }
.setup-section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.file-upload-list { display: flex; flex-direction: column; gap: 8px; }
.file-upload-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
}
.file-status { font-size: 12px; width: 80px; flex-shrink: 0; }
.file-status.loaded { color: var(--teal); font-weight: 600; }
.file-status.failed { color: var(--red); font-weight: 600; }
.file-status.pending { color: var(--faint); }
.file-name { font-weight: 500; font-size: 13px; flex: 1; }
.file-desc { font-size: 12px; color: var(--muted); }
.file-input-btn { font-size: 12px; }
.dropzone {
  border: 2px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 32px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 16px;
}
.dropzone:hover, .dropzone.dragover { border-color: var(--purple); background: var(--purple-bg); }
.dropzone-label { font-size: 14px; color: var(--muted); }
.dropzone-sub { font-size: 12px; color: var(--faint); margin-top: 4px; }
.data-mgmt-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.scoring-preview { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.scoring-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.scoring-row:last-child { border-bottom: none; }

/* ── Onboarding overlay ── */
.onboarding-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.onboarding-card {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 100%; max-width: 560px; max-height: 90vh;
  overflow-y: auto; padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.onboarding-steps {
  display: flex; gap: 6px; margin-bottom: 28px;
}
.onboarding-step-dot {
  height: 4px; flex: 1; border-radius: 2px;
  background: var(--border);
}
.onboarding-step-dot.done { background: var(--purple); }
.onboarding-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.onboarding-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.onboarding-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
.onboarding-actions .btn-ghost { margin-right: auto; }
.step-instructions { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.8; }
details > summary { outline: none; }
details > summary::-webkit-details-marker { display: none; }
details[open] > summary span[style*="font-size:11px"] { transform: rotate(90deg); display: inline-block; }

/* ── Grade reviewer modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 150; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-card {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 100%; max-width: 700px; max-height: 88vh;
  overflow-y: auto; padding: 24px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.18);
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.reviewer-table { width: 100%; border-collapse: collapse; }
.reviewer-table th {
  text-align: left; font-size: 11px; font-weight: 600;
  color: var(--faint); text-transform: uppercase; letter-spacing: 0.5px;
  padding: 6px 8px; border-bottom: 2px solid var(--border);
}
.reviewer-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ── App form modal ── */
.app-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.app-form-grid .full { grid-column: 1 / -1; }

/* ── Misc ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-state-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.empty-state-sub { font-size: 13px; color: var(--muted); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
a { color: inherit; }
select option { background: var(--surface); }

@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .pipeline { grid-template-columns: repeat(3, 1fr); }
  .form-grid, .app-form-grid { grid-template-columns: 1fr; }
  .topnav { padding: 0 12px; }
  .tab-panel { padding: 16px 12px 48px; }
}

/* ── Mobile optimisation (< 768px) ── */
@media (max-width: 767px) {
  /* Drawer: full width slide-in on mobile */
  #side-drawer {
    width: 100% !important;
    max-width: 100% !important;
    border-left: none;
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.13);
  }
  /* Grade pills: horizontal scroll, no wrap */
  .grade-pill-row {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 6px;
    scrollbar-width: none;
    margin-right: -12px;
    padding-right: 12px;
  }
  .grade-pill-row::-webkit-scrollbar { display: none; }
  /* Filter bar: search full width on its own row */
  .filter-bar { flex-wrap: wrap; gap: 6px; }
  .search-input { min-width: 100%; flex: none; }
  .filter-select { flex: 1; min-width: 0; font-size: 13px; }
  /* Bigger touch targets */
  .btn { min-height: 38px; }
  .btn-sm { min-height: 34px; padding: 6px 12px; }
  .grade-pill { padding: 6px 14px; }
  .nav-tab { padding: 0 10px; font-size: 13px; }
  /* Drawer header: back button replaces ✕ on mobile */
  .drawer-close-btn { display: none !important; }
  .drawer-back-btn { display: flex !important; }
  /* Drawer actions: wrap on small screens */
  .drawer-actions { flex-wrap: wrap; gap: 6px; }
  /* Contact card: full-width tap target */
  .contact-card-header { padding: 14px 14px 10px; }
  /* Stats row: 2-col already; make nums smaller */
  .stat-num { font-size: 22px; }
  /* Role input row */
  .role-row { flex-wrap: wrap; }
  .role-input { min-width: 100%; }
  /* Nav: tighter */
  .nav-brand { font-size: 15px; }
  .nav-action { font-size: 12px; padding: 6px 10px; }
  /* Onboarding card: full width */
  .onboarding-card { padding: 20px 16px; margin: 0 8px; }
}
#tab-contacts {
  transition: padding-right 0.22s cubic-bezier(0.4,0,0.2,1);
}
@media (min-width: 960px) {
  body.side-drawer-open #tab-contacts {
    max-width: none;
    padding-right: 584px;  /* 560px drawer + 24px gap */
    transition: padding-right 0.22s cubic-bezier(0.4,0,0.2,1);
  }
}
/* Sub-tab nav for Setup */
.sub-tab-nav { display:flex; gap:2px; margin-bottom:20px; border-bottom:2px solid var(--border); }
.sub-tab-btn { background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px;
  padding:8px 16px; font-size:14px; color:var(--muted); cursor:pointer; font-weight:500; }
.sub-tab-btn:hover { color:var(--text); }
.sub-tab-btn.active { color:var(--purple); border-bottom-color:var(--purple); font-weight:600; }
</style>
</head>

<script>
'use strict';

// ─────────────────────────────────────────────
// SECTION 1 · Constants & config
// ─────────────────────────────────────────────
const DEFAULT_TARGET_COS = []; // No built-in defaults — all companies set by user in Setup → Profile

const LINKEDIN_COMPANY_IDS = {
  freshworks:'1626966', atlassian:'4809', chargebee:'2543029',
  razorpay:'10268668', postman:'10528', setu:'29414442',
  hasura:'18031165', darwinbox:'11388522', sprinklr:'2611821',

  docusign:'2818', microsoft:'1035', google:'1441',
  twilio:'166119', stripe:'2614441', hubspot:'1166390',
  leadsquared:'3448515'
};

// Direct careers page URLs for well-known companies.
// Key must match the company name lowercased (same convention as LINKEDIN_COMPANY_IDS).
// Google fallback is used for any company not listed here.
const CAREERS_URLS = {
  google:       'https://careers.google.com/jobs/results/',
  microsoft:    'https://jobs.careers.microsoft.com/global/en/search',
  stripe:       'https://stripe.com/jobs/search',

  zoho:         'https://careers.zohocorp.com/jobs/Careers',
  razorpay:     'https://razorpay.com/jobs/',
  postman:      'https://www.postman.com/company/careers/',
  clevertap:    'https://clevertap.com/company/careers/',
  sprinklr:     'https://www.sprinklr.com/careers/',
  darwinbox:    'https://darwinbox.com/careers',
  chargebee:    'https://www.chargebee.com/careers/',
  hasura:       'https://hasura.io/careers/',
  juspay:       'https://careers.juspay.in/',
  exotel:       'https://exotel.com/careers/',
  setu:         'https://setu.co/careers',
  keka:         'https://www.keka.com/careers',
  leadsquared:  'https://www.leadsquared.com/careers/',
  amazon:       'https://www.amazon.jobs/content/en/job-categories/software-development',
  apple:        'https://jobs.apple.com/en-us/search',
  meta:         'https://www.metacareers.com/jobs',
  netflix:      'https://jobs.netflix.com/search',
  adobe:        'https://careers.adobe.com/us/en/search-results',

  intuit:       'https://careers.intuit.com/job-search-results',
  workday:      'https://www.workday.com/en-us/company/careers/open-positions.html',
};

const LS = {
  contacts:'wp_contacts', applications:'wp_applications',
  profile:'wp_profile', msg:'wp_msg', rec:'wp_rec',
  pos:'wp_pos', cofo:'wp_cofo', end:'wp_end',
  skills:'wp_skills', onboarded:'wp_onboarded',
  apikey:'wp_apikey', targets:'wp_targets',
  ai_provider:'wp_ai_provider', ai_model:'wp_ai_model', ai_baseurl:'wp_ai_baseurl',
  job_location:'wp_job_location', job_loc_prefs:'wp_job_loc_prefs', last_import:'wp_last_import',
  resume:'wp_resume', custom_targets:'wp_custom_targets',
  company_intel:'wp_company_intel',
  activity_log: 'wp_activity_log',
  view_mode: 'wp_view_mode',
  scoring_config: 'wp_scoring_config',
  jobs: 'wp_jobs',
  outreach: 'wp_outreach',
  templates: 'wp_templates',
  last_backup: 'wp_last_backup',
  job_sample_banner: 'wp_job_sample_banner_dismissed'
};

// ─── Scoring signal definitions ───────────────
const SCORING_SIGNALS = [
  { id:'recommendation', label:'Gave me a recommendation',           defaultWeight:10 },
  { id:'exColleague',    label:'Worked together (same company)',      defaultWeight:9  },
  { id:'messageVolume',  label:'High message volume (10+ messages)',  defaultWeight:8  },
  { id:'messageRecency', label:'Messaged within last 90 days',        defaultWeight:8  },
  { id:'targetCompany',  label:'At a target company',                defaultWeight:8  },
  { id:'recruiter',      label:'Recruiter at a target company',       defaultWeight:7  },
  { id:'pmTitle',        label:'Target role type',                    defaultWeight:7  },
  { id:'seniorTitle',    label:'Senior title matching your target',   defaultWeight:5  },
  { id:'connRecency',    label:'Connected recently (< 90 days)',      defaultWeight:5  },
  { id:'companyFollow',  label:'Following their company',             defaultWeight:4  },
  { id:'adjacentRole',   label:'Adjacent role (eng / design / HR)',   defaultWeight:3  },
  { id:'hasEmail',       label:'Has email address',                  defaultWeight:2  },
];

function getWeights() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS.scoring_config) || '{}');
    const out = {};
    SCORING_SIGNALS.forEach(s => { out[s.id] = (s.id in saved) ? saved[s.id] : s.defaultWeight; });
    return out;
  } catch(e) {
    const out = {};
    SCORING_SIGNALS.forEach(s => { out[s.id] = s.defaultWeight; });
    return out;
  }
}

function saveWeights(weights) {
  localStorage.setItem(LS.scoring_config, JSON.stringify(weights));
}

function applyWeightsAndRescore() {
  const w = {};
  SCORING_SIGNALS.forEach(sig => {
    const el = document.getElementById(`wt-${sig.id}`);
    w[sig.id] = el ? parseInt(el.value, 10) : sig.defaultWeight;
  });
  saveWeights(w);
  reScoreAll(w);
  updateNavCounts();
  const st = document.getElementById('weights-status');
  if (st) { st.textContent = `✓ Scores recalculated (${state.contacts.length} contacts)`; setTimeout(() => { st.textContent = ''; }, 3000); }
  if (activeTab === 'contacts') renderContactsList();
}

function resetWeightsToDefault() {
  const w = {};
  SCORING_SIGNALS.forEach(s => { w[s.id] = s.defaultWeight; });
  saveWeights(w);
  renderSetupTab();
}

function saveCustomTemplate() {
  const name   = document.getElementById('ct-name')?.value?.trim();
  const stat   = document.getElementById('ct-static')?.value?.trim();
  if (!name || !stat) { alert('Template name and static template text are required.'); return; }
  const tmpl = {
    id:             'custom_' + genId(),
    name,
    category:       document.getElementById('ct-category')?.value?.trim() || 'Custom',
    staticTemplate: stat,
    systemPrompt:   document.getElementById('ct-prompt')?.value?.trim() || '',
    subjectLine:    document.getElementById('ct-subject')?.value?.trim() || '',
    editable:       true
  };
  let custom = [];
  try { custom = JSON.parse(localStorage.getItem(LS.templates) || '[]'); } catch(e){}
  custom.push(tmpl);
  localStorage.setItem(LS.templates, JSON.stringify(custom));
  renderSetupTab();
}

function deleteCustomTemplate(id) {
  if (!confirm('Delete this custom template?')) return;
  let custom = [];
  try { custom = JSON.parse(localStorage.getItem(LS.templates) || '[]'); } catch(e){}
  custom = custom.filter(t => t.id !== id);
  localStorage.setItem(LS.templates, JSON.stringify(custom));
  renderSetupTab();
}

function fillTemplatePlaceholders(text, c, profile, job) {
  const firstName = (c.name || '').split(' ')[0];
  const sharedHistory = (c.gradeReasons || []).filter(r => r.includes('colleague') || r.includes('messaged')).join(', ') || 'our past connection';
  return text
    .replace(/\[Contact Name\]/g,       firstName || c.name || '')
    .replace(/\[Contact Title\]/g,      c.role || c.position || '')
    .replace(/\[Contact Company\]/g,    c.company || '')
    .replace(/\[My Name\]/g,            profile.name || '')
    .replace(/\[My Title\]/g,           profile.currentLevel || profile.headline || '')
    .replace(/\[Role Title\]/g,         job?.title || c.savedRole || profile.target || '')
    .replace(/\[Hiring Company\]/g,     job?.company || c.company || '')
    .replace(/\[Job URL\]/g,            job?.url || '')
    .replace(/\[Shared History Summary\]/g, sharedHistory);
}

// ─── Preset message templates ──────────────────
const PRESET_TEMPLATES = [
  {
    id: 'job_referral', name: 'Job Referral Request', category: 'Job Search', editable: false,
    subjectLine: 'Saw a role at [Hiring Company] — your thoughts?',
    staticTemplate: `Hi [Contact Name],\n\nIt's been a while since [Shared History Summary]. I've been following your work at [Contact Company] — looks like you're doing great things.\n\nI came across a [Role Title] role at [Hiring Company] and it's right in my wheelhouse. Given your perspective there, I'd love to hear your take on the team and culture. And if you're comfortable, a referral would mean a lot.\n\nHappy to share more context — here's the role: [Job URL]\n\nEither way, would be great to reconnect.\n\nBest,\n[My Name]`,
    systemPrompt: `You are a networking coach helping a senior professional reach out to LinkedIn connections for job referrals. Generate a warm, professional message that:\n1. References specific shared history (overlapping employer, past messages) — provided in context\n2. Mentions the specific role naturally without sounding desperate\n3. Asks for a referral or informational conversation, not a direct job ask\n4. Keeps the tone confident and peer-to-peer, not supplicant\n5. Is under 150 words\n6. Does not use "I hope this finds you well" or "I wanted to reach out"\nContext about the contact and the role will be provided.`
  },
  {

  if (tab !== 'contacts' && sideDrawerIdx !== null) closeSideDrawer();

  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);

    p.classList.toggle('active', p.id === 'tab-' + tab);

function renderJobCard(job) {
  const outreachForJob = state.OUTREACH.filter(o => o.jobId === job.id);
  const isExpanded = expandedJobs.has(job.id);
  const safeId = job.id;

  const statusColor = { 'Pursuing':'var(--teal)', 'Applied':'var(--blue)',
    'Interviewing':'var(--purple)', 'Offer':'var(--green)', 'Closed':'var(--faint)' };
  const col = statusColor[job.status] || 'var(--muted)';

  const outreachRows = outreachForJob.map(rec => {
    const contact = state.contacts[rec.contactIdx];
    const lastChange = rec.statusHistory[rec.statusHistory.length - 1];
    const daysAgo = lastChange ? Math.floor((Date.now() - new Date(lastChange.date)) / 86400000) : null;
    const statusLabel = OUTREACH_STATUSES.find(s => s.id === rec.status)?.label || rec.status;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);margin-bottom:6px;flex-wrap:wrap">
      <div style="flex:1;min-width:120px">
        <div style="font-weight:600;font-size:13px">${h(rec.contactName)}</div>
        <div style="font-size:11px;color:var(--muted)">${h(rec.contactCompany||'')}</div>
      </div>
      <select style="font-size:12px;padding:3px 6px;border:1px solid var(--border2);border-radius:6px;background:var(--surface)"
        onchange="updateOutreachStatus('${rec.id}',this.value);renderJobsTab()">
        ${OUTREACH_STATUSES.map(s=>`<option value="${s.id}" ${rec.status===s.id?'selected':''}>${s.label}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:var(--faint);white-space:nowrap">${daysAgo !== null ? daysAgo+'d ago' : ''}</span>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteOutreachRecord('${rec.id}')">✕</button>
    </div>`;
  }).join('');

  const coLower = (job.company || '').toLowerCase();
  const atCompany = state.contacts
    .map((c,i) => ({c,i}))
    .filter(({c}) => (c.company||'').toLowerCase() === coLower)
    .sort((a,b) => (b.c.score||0) - (a.c.score||0));
  const others = state.contacts
    .map((c,i) => ({c,i}))
    .filter(({c}) => (c.company||'').toLowerCase() !== coLower)
    .sort((a,b) => (b.c.score||0) - (a.c.score||0))
    .slice(0, 40);
  const mkOpt = ({c,i}, showCo) =>
    `<option value="${i}">${h(c.name)} · ${c.score||0} pts${c.grade?' ('+c.grade+')':''}${showCo&&c.company?' @ '+h(c.company):''}</option>`;

  const linkContactHtml = `
    <div style="margin-top:10px">
      <input id="link-search-${safeId}" type="text" placeholder="Search contacts…"
        style="width:100%;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);margin-bottom:6px;box-sizing:border-box"
        oninput="filterLinkContactSelect('${safeId}', this.value)">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="link-contact-${safeId}" class="form-select" style="font-size:12px;flex:1;min-width:180px;padding:5px 8px">
          <option value="">— Link a contact —</option>
          ${atCompany.length ? `<optgroup label="At ${h(job.company)}">${atCompany.map(x=>mkOpt(x,false)).join('')}</optgroup>` : ''}
          ${others.length ? `<optgroup label="Other contacts (top 40 by score)">${others.map(x=>mkOpt(x,true)).join('')}</optgroup>` : ''}
        </select>
        <button class="btn btn-secondary btn-sm" onclick="linkContactToJob('${safeId}')">Link</button>
      </div>
    </div>`;

  return `<div class="setup-section" style="padding:0;overflow:hidden;margin-bottom:10px">
    <div style="padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:12px"

async function fetchJobFormDetails() {
  const urlEl   = document.getElementById('jf-url');
  const hintEl  = document.getElementById('jf-url-hint');
  const url     = urlEl?.value?.trim();
  if (!url || !url.startsWith('http')) {
    if (hintEl) { hintEl.textContent = '⚠️ Enter a URL first'; hintEl.style.color = 'var(--red)'; }
    return;
  }

  const cfg = getAIConfig();
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    // Fall back to URL regex only — already done via prefillJobFromUrl, just nudge
    if (hintEl) { hintEl.innerHTML = '⚠️ No AI key — using URL parsing only. <a href="#" onclick="switchTab(\'setup\');switchSetupTab(\'settings\');return false" style="color:var(--purple)">Add key →</a>'; hintEl.style.color = 'var(--amber)'; }
    return;
  }

  if (hintEl) { hintEl.textContent = 'Reading URL…'; hintEl.style.color = 'var(--muted)'; }

  const prompt = `You have web search access. Visit this job posting URL and extract details: ${url}

Return ONLY this JSON (no other text):
{"success":true,"title":"exact job title","company":"company name","refId":"job reference ID or requisition number if visible, else null","location":"city or remote"}

If you cannot access the page, return: {"success":false,"reason":"brief reason"}`;

  try {
    const raw    = await callAI(prompt, 400, cfg.provider === 'anthropic');
    const match  = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('no json');
    const result = JSON.parse(match[0]);

    if (!result.success) {
      if (hintEl) { hintEl.textContent = `⚠️ Couldn't read URL: ${result.reason || 'blocked'}. Fill manually.`; hintEl.style.color = 'var(--amber)'; }
      return;
    }

    // Fill fields (only if currently empty)
    const set = (id, val) => { if (val) { const el = document.getElementById(id); if (el && !el.value) el.value = val; } };
    set('jf-title',   result.title);
    set('jf-company', result.company);
    if (result.refId) {
      const notes = document.getElementById('jf-notes');
      if (notes && !notes.value) notes.value = `Ref: ${result.refId}`;
    }

    // Duplicate check
    const dupTitle   = (result.title   || '').toLowerCase();
    const dupCompany = (result.company || '').toLowerCase();
    const dupRef     = result.refId;
    const duplicate  = state.JOBS.find(j =>
      (dupRef && (j.notes || '').includes(dupRef)) ||
      (j.title.toLowerCase() === dupTitle && j.company.toLowerCase() === dupCompany)
    );

    if (duplicate) {
      if (hintEl) {
        hintEl.innerHTML = `⚠️ <strong>Possible duplicate</strong> — "${h(duplicate.title)}" @ ${h(duplicate.company)} already in Jobs (${duplicate.status}). <button class="btn btn-sm btn-ghost" style="font-size:11px;padding:1px 6px" onclick="showAddJobForm=false;renderJobsTab()">Cancel</button>`;
        hintEl.style.color = 'var(--amber)';
      }
      return;
    }

    const parts = [result.title, result.company, result.refId ? `#${result.refId}` : '', result.location].filter(Boolean);
    if (hintEl) { hintEl.textContent = `✓ ${parts.join(' · ')}`; hintEl.style.color = 'var(--teal)'; }

  } catch(e) {
    if (hintEl) { hintEl.textContent = '✗ Error reading URL — fill fields manually.'; hintEl.style.color = 'var(--red)'; }
  }
}

function parseJobUrl(url) {
  if (!url) return null;
  try {
    const u    = new URL(url);
    const host = u.hostname.toLowerCase();
    const path = u.pathname;
    const slug = s => s.replace(/[-_]+/g,' ').replace(/\b\w/g, c => c.toUpperCase()).trim();

    if (host.includes('greenhouse.io')) {
      const m = path.match(/\/([^/]+)\/jobs\/(\d+)/);
      if (m) return { company: slug(m[1]), refId: m[2], source:'Company site' };
    }
    if (host.includes('lever.co')) {
      const m = path.match(/\/([^/]+)\/([a-f0-9-]{36})/i);
      if (m) return { company: slug(m[1]), refId: m[2].slice(0,8), source:'Company site' };
    }
    if (host.includes('ashbyhq.com')) {
      const m = path.match(/\/([^/]+)\/.+/);
      if (m) return { company: slug(m[1]), source:'Company site' };
    }
    if (host.includes('myworkdayjobs.com')) {
      const coM = host.match(/^([^.]+)\./);
      const company = coM ? slug(coM[1]) : '';
      const parts = path.split('/').filter(Boolean);
      const refId = parts[parts.length - 1] || '';
      const titleSlug = parts[parts.length - 2] || '';
      const title = titleSlug ? slug(titleSlug) : '';
      return { company, title, refId, source:'Company site' };
    }
    if (host.includes('linkedin.com')) {
      const m = path.match(/\/jobs\/view\/[^/]*?-(\d{10,})/);
      if (m) return { refId: m[1], source:'LinkedIn' };
      const m2 = path.match(/\/jobs\/(\d+)/);
      if (m2) return { refId: m2[1], source:'LinkedIn' };
    }
    if (host.includes('indeed.com')) {
      const jk = u.searchParams.get('jk');
      if (jk) return { refId: jk, source:'Indeed' };
    }
    if (host.includes('naukri.com')) {
      const m = path.match(/-(\d{15,})(?:\.htm)?$/);
      if (m) return { refId: m[1], source:'Naukri' };
    }
    // Generic: use subdomain as company hint if not a common word
    const sub = host.split('.')[0];
    if (!['jobs','careers','www','apply','hiring','boards','recruit'].includes(sub)) {
      return { company: slug(sub), source:'Company site' };
    }
  } catch(e) {}
  return null;
}

function prefillJobFromUrl(url) {
  if (!url || !url.startsWith('http')) return;
  const parsed = parseJobUrl(url);
  if (!parsed) return;
  const set = (id, val) => { if (val) { const el = document.getElementById(id); if (el && !el.value) el.value = val; }};
  set('jf-company', parsed.company);
  set('jf-title',   parsed.title);
  if (parsed.source) {
    const src = document.getElementById('jf-source');
    if (src) src.value = parsed.source;
  }
  if (parsed.refId) {
    const notes = document.getElementById('jf-notes');
    if (notes && !notes.value) notes.value = `Ref: ${parsed.refId}`;
  }
  // Show a small hint
  const hint = document.getElementById('jf-url-hint');
  if (hint) {
    const parts = [parsed.company, parsed.title, parsed.refId ? `#${parsed.refId}` : ''].filter(Boolean);
    hint.textContent = parts.length ? `✓ Detected: ${parts.join(' · ')}` : '';
    hint.style.color = 'var(--teal)';
  }
}

function moveJobToApplications(jobId) {
  const job = state.JOBS.find(j => j.id === jobId);
  if (!job) return;
  if (!confirm(`Move "${job.title}" @ ${job.company} to Applications?\nThis will mark the job as Closed in the Jobs tab.`)) return;
  clearSampleData();
  const appStatus = job.status === 'Interviewing' ? 'Screening' : 'Applied';
  // Find any referred contact to pre-fill referredBy
  const referralRec = state.OUTREACH.find(o => o.jobId === jobId && o.status === 'referred');
  const referredBy = referralRec ? (state.contacts[referralRec.contactIdx]?.name || '') : '';
  state.applications.unshift({
    company: job.company,
    role: job.title,
    via: referredBy ? 'Referral' : 'Direct apply',
    referredBy,
    status: appStatus,
    dateApplied: new Date().toISOString().slice(0,10),
    nextDate: '',
    interviewer: '',
    notes: job.notes || '',
    feedback: []
  });
  saveApplications();
  updateJobField(jobId, 'status', 'Closed');
  updateNavCounts();
  renderJobsTab();
  showBanner(`"${job.title}" moved to Applications as ${appStatus} ✓`, 'success');
}

function filterLinkContactSelect(jobId, query) {
  const sel = document.getElementById(`link-contact-${jobId}`);
  const job = state.JOBS.find(j => j.id === jobId);
  if (!sel || !job) return;
  const q = query.trim().toLowerCase();
  const coLower = (job.company || '').toLowerCase();
  let candidates = state.contacts.map((c, i) => ({ c, i }));
  if (q) candidates = candidates.filter(({ c }) =>
    c.name.toLowerCase().includes(q) || (c.company || '').toLowerCase().includes(q)
  );
  const atCo = candidates.filter(({ c }) => (c.company || '').toLowerCase() === coLower)
    .sort((a, b) => (b.c.score || 0) - (a.c.score || 0));
  const rest = candidates.filter(({ c }) => (c.company || '').toLowerCase() !== coLower)
    .sort((a, b) => (b.c.score || 0) - (a.c.score || 0))
    .slice(0, q ? 60 : 40);
  const mkOpt = ({ c, i }, showCo) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `${c.name} · ${c.score || 0} pts${c.grade ? ' (' + c.grade + ')' : ''}${showCo && c.company ? ' @ ' + c.company : ''}`;
    return o;
  };
  sel.innerHTML = '';
  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '— Link a contact —';
  sel.appendChild(placeholder);
  if (atCo.length) {
    const grp = document.createElement('optgroup');
    grp.label = `At ${job.company}`;
    atCo.forEach(x => grp.appendChild(mkOpt(x, false)));
    sel.appendChild(grp);
  }
  if (rest.length) {
    const grp = document.createElement('optgroup');
    grp.label = q ? 'Other matches' : 'Other contacts';
    rest.forEach(x => grp.appendChild(mkOpt(x, true)));
    sel.appendChild(grp);
  }
}

function linkContactToJob(jobId) {
  const sel = document.getElementById(`link-contact-${jobId}`);
  const contactIdx = parseInt(sel?.value, 10);
  if (isNaN(contactIdx)) return;
  const result = addOutreachRecord(contactIdx, jobId);
  if (!result) { alert('This contact is already linked to this job.'); return; }
  renderJobsTab();
}

function deleteOutreachRecord(outreachId) {
  state.OUTREACH = state.OUTREACH.filter(o => o.id !== outreachId);
  saveOutreach();
  renderJobsTab();
}

let appPipelineFilter = '';
let appReferrerFilter = '';

const PIPELINE_STAGES = [
  { label: 'Applied',     statuses: ['Applied'] },
  { label: 'Screening',   statuses: ['Screening'] },
  { label: 'Interviewing',statuses: ['Round 1','Round 2','Round 3'] },
  { label: 'Final',       statuses: ['Final round'] },
  { label: 'Offer',       statuses: ['Offer received','Offer accepted'] },
  { label: 'Closed',      statuses: ['Rejected','Withdrawn','On hold'] }
];

function renderApplicationsTab() {
  const el = document.getElementById('tab-applications');
  const apps = state.applications;

  const hasRealApps = apps.some(a => !a._sample);
  const appBannerDismissed = localStorage.getItem('wp_app_sample_banner_dismissed') === '1';
  const showAppBanner = !hasRealApps && !appBannerDismissed;
  const hasSampleApps = apps.some(a => a._sample);
  const appBannerMsg = hasSampleApps
    ? 'These are <strong>sample applications</strong> to help you explore the pipeline. Add your own when you formally apply to a role.'
    : 'No applications tracked yet. Use <strong>→ Move to Applications</strong> from the Jobs tab, or add one manually here.';
  const appSampleBanner = showAppBanner ? `
    <div id="app-sample-banner" style="display:flex;align-items:flex-start;gap:10px;background:#fffbeb;border:1px solid #f59e0b;border-radius:10px;padding:12px 14px;margin-bottom:16px">
      <span style="font-size:18px;line-height:1.2">📋</span>
      <span style="flex:1;font-size:13px;color:#92400e;line-height:1.5">${appBannerMsg}</span>
      <button onclick="localStorage.setItem('wp_app_sample_banner_dismissed','1');document.getElementById('app-sample-banner')?.remove()" style="background:none;border:none;cursor:pointer;font-size:16px;color:#b45309;line-height:1;padding:0 2px;flex-shrink:0" title="Dismiss">✕</button>
    </div>` : '';

  // Pipeline counts
  const pipelineHtml = PIPELINE_STAGES.map(stage => {
    const count = apps.filter(a => stage.statuses.includes(a.status)).length;
    const isActive = stage.statuses.some(s => appPipelineFilter === s);
    const isClosed = stage.label === 'Closed';
    return `<div class="pipeline-col ${isActive ? 'active' : ''} ${isClosed ? 'closed' : ''}"
      onclick="appPipelineFilter='${isActive ? '' : stage.statuses[0]}'; renderApplicationsTab()">
      <div class="pipeline-num">${count}</div>
      <div class="pipeline-label">${isClosed ? '✕ Closed' : stage.label}</div>
    </div>`;
  }).join('');

  // Filter apps
  let filtered = apps;
  if (appPipelineFilter) {
    const stage = PIPELINE_STAGES.find(s => s.statuses.includes(appPipelineFilter));
    if (stage) filtered = apps.filter(a => stage.statuses.includes(a.status));
  }
  if (appReferrerFilter) {
    filtered = filtered.filter(a =>
      (a.referredBy || '').toLowerCase().trim() === appReferrerFilter.toLowerCase().trim()
    );
  }
  // Sort: active first, then by dateApplied desc
  filtered = [...filtered].sort((a, b) => {
    const aActive = ACTIVE_APP_STATUSES.has(a.status) ? 1 : 0;
    const bActive = ACTIVE_APP_STATUSES.has(b.status) ? 1 : 0;
    if (aActive !== bActive) return bActive - aActive;
    return (b.dateApplied || '').localeCompare(a.dateApplied || '');
  });

  let html = `
    ${appSampleBanner}
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
      <div>
        ${appReferrerFilter ? `<span class="banner banner-info" style="display:inline-flex;padding:6px 12px">
          Referred by: <strong style="margin:0 6px">${h(appReferrerFilter)}</strong>
          <button class="banner-close" onclick="appReferrerFilter=''; renderApplicationsTab()">✕</button>
        </span>` : ''}
      </div>
      <button class="btn btn-primary" onclick="openAppModal()">+ Add application</button>
    </div>
    <div class="pipeline">${pipelineHtml}</div>`;

  if (filtered.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title">${apps.length === 0 ? 'No applications yet' : 'No applications in this stage'}</div>
      <div class="empty-state-sub">${apps.length === 0 ? 'Click "+ Add application" to start tracking.' : ''}</div>
    </div>`;
  } else {
    filtered.forEach(app => {
      const idx = state.applications.indexOf(app);
      html += renderAppCard(app, idx);
    });
  }

  // HR email templates
  html += renderHRTemplates();

  el.innerHTML = html;
}

function renderAppCard(app, idx) {
  const nextInfo = app.nextDate
    ? `${fmtDate(app.nextDate)}${app.interviewer ? ' · ' + app.interviewer : ''}`
    : '';
  const feedbackHtml = (app.feedback || []).map(fb => `
    <div class="feedback-entry">
      <div class="feedback-round">${h(fb.round)} · ${h(fmtDate(fb.date))} · <span style="color:${fb.outcome==='Passed'?'var(--green)':'var(--red)'}">${h(fb.outcome)}</span></div>
      <div class="feedback-notes">${h(fb.notes || '')}</div>
    </div>`).join('');

  return `<div class="app-card">
    <div class="app-card-header">
      <div class="app-title-row">
        <span class="app-company">${h(app.company)}</span>
        ${appStatusBadge(app.status)}
        ${app.via === 'Referral' ? `<span class="badge badge-referral">via Referral</span>` : ''}
      </div>
      <div class="app-role">${h(app.role)}</div>
      <div class="app-meta">
        ${app.referredBy ? `<span>Referred by: ${h(app.referredBy)}</span>` : ''}
        ${nextInfo ? `<span>Next: ${h(nextInfo)}</span>` : ''}
        ${app.dateApplied ? `<span>Applied: ${h(fmtDate(app.dateApplied))}</span>` : ''}
        ${app.notes ? `<span style="max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(app.notes)}</span>` : ''}
      </div>
      <div class="app-actions">
        <button class="btn btn-secondary btn-sm" onclick="openFeedbackModal(${idx})">+ Feedback</button>
        <button class="btn btn-secondary btn-sm" onclick="openAppModal(${idx})">Edit</button>
        <button class="btn btn-red btn-sm" onclick="removeApp(${idx})">Remove</button>
        ${app.company ? `<button class="btn btn-ghost btn-sm" onclick="loadAppCompanyIntel(${idx})" id="app-intel-btn-${idx}">Load intel</button>` : ''}
      </div>
      ${(() => { const ci = app.company ? state.COMPANY_INTEL[coKey(app.company)] : null; return ci?.glassdoorRating ? `<div style="margin-top:8px"><span class="intel-chip">Glassdoor ${ci.glassdoorRating} ★</span></div>` : ''; })()}
    </div>

function saveAppModal(idx) {
  const company    = document.getElementById('af-company')?.value?.trim() || '';
  const role       = document.getElementById('af-role')?.value?.trim()    || '';
  if (!company || !role) { alert('Company and role are required.'); return; }

  const referredBy = document.getElementById('af-ref')?.value?.trim() || '';
  const via        = document.getElementById('af-via')?.value || 'Direct apply';

  const appData = {
    company, role, via, referredBy,
    dateApplied: document.getElementById('af-date')?.value || new Date().toISOString().slice(0,10),
    status:      document.getElementById('af-status')?.value || 'Applied',
    nextDate:    document.getElementById('af-next')?.value || '',
    interviewer: document.getElementById('af-interviewer')?.value?.trim() || '',
    notes:       document.getElementById('af-notes')?.value?.trim() || '',
    feedback:    idx !== null && state.applications[idx] ? state.applications[idx].feedback || [] : []
  };

  if (idx !== null && state.applications[idx]) {
    state.applications[idx] = { ...state.applications[idx], ...appData };
  } else {
    state.applications.unshift(appData);
  }
  saveApplications();
  updateNavCounts();
  // Auto-dismiss Applications sample banner on first real entry
  localStorage.setItem('wp_app_sample_banner_dismissed', '1');

  // If referredBy is set and via Referral, update that contact's status
  if (referredBy && via === 'Referral') {
    const refContact = state.contacts.find(c =>
      c.name.toLowerCase().trim() === referredBy.toLowerCase().trim()
    );
    if (refContact) {
      refContact.status = 'Referred me';
      saveContacts();
    } else {
      // Referrer not in contacts — offer to add them
      if (confirm(`"${referredBy}" is not in your contacts. Add them now?`)) {
        const newC = {
          name: referredBy, company, position: '', role: `Referrer at ${company}`,
          relationship: 'Referral contact', grade: 'A', score: 60,
          gradeReasons: ['referred you'], warmthTier: 'known', msgCount: 0,
          status: 'Referred me', notes: `Referred for ${role} at ${company}`,
          url: '', connectedOn: '', source: 'manual',
          lastContacted: new Date().toISOString().slice(0,10), savedRole: role
        };
        state.contacts.unshift(newC);
        saveContacts();
        updateNavCounts();
      }
    }
  }

  closeAppModal();
  renderApplicationsTab();
}

async function loadAppCompanyIntel(idx) {
  const app = state.applications[idx];
  if (!app || !app.company) return;
  const cfg = getAIConfig();
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    alert('Add an AI provider in Setup first.');
    return;
  }

  const key = coKey(app.company);

  // If cached and less than 7 days old, just re-render (no fetch needed)
  const cached = state.COMPANY_INTEL[key];
  if (cached?.fetchedAt) {
    const ageDays = (Date.now() - new Date(cached.fetchedAt)) / 86400000;
    if (ageDays < 7) { renderApplicationsTab(); return; }
  }

  const btn = document.getElementById(`app-intel-btn-${idx}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }

  const prompt = `What is the Glassdoor overall company rating for "${app.company}"?
Return ONLY a JSON object: {"glassdoorRating":number_or_null}
Use null if unknown. No other text.`;

  try {
    let text = '';
    try {
      text = await callAI(prompt, 300, cfg.provider === 'anthropic');
    } catch(e2) {
      text = await callAI(prompt, 300, false);
    }
    const match = text.match(/\{[\s\S]*\}/);
    const intel = match ? JSON.parse(match[0]) : {};
    intel.fetchedAt = new Date().toISOString();

    // Write to shared cache
    state.COMPANY_INTEL[key] = intel;
    saveCompanyIntel();

    // Refresh contacts at this company + all app cards
    state.contacts.forEach((ct, i) => {
      if (coKey(ct.company) === key) renderDrawerContent(i);
    });
    renderApplicationsTab();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Load intel'; }
    alert(`Failed: ${e.message}`);
  }
}

function saveProfileForm() {
  state.profile.name          = document.getElementById('sp-name')?.value?.trim()      || '';
  state.profile.headline      = document.getElementById('sp-headline')?.value?.trim()  || '';
  state.profile.currentLevel  = document.getElementById('sp-level')?.value?.trim()     || '';
  state.profile.currentCompany= document.getElementById('sp-currentco')?.value?.trim() || '';
  state.profile.location      = document.getElementById('sp-location')?.value?.trim()  || '';
  state.profile.email         = document.getElementById('sp-email')?.value?.trim()     || '';
  state.profile.phone         = document.getElementById('sp-phone')?.value?.trim()     || '';
  state.profile.linkedinUrl   = document.getElementById('sp-linkedin')?.value?.trim()  || '';
  state.profile.companyType   = document.getElementById('sp-cotype')?.value           || '';
  state.profile.domain        = document.getElementById('sp-domain')?.value            || '';
  state.profile.primaryGoal   = document.getElementById('sp-goal')?.value              || '';
  state.profile.bg            = document.getElementById('sp-bg')?.value?.trim()        || '';
  state.profile.target        = document.getElementById('sp-target')?.value?.trim()    || '';
  state.profile.whyLooking    = document.getElementById('sp-why')?.value?.trim()       || '';

  const resumeText = document.getElementById('sp-resume')?.value?.trim() || '';

  if (el) { el.textContent = 'Saved ✓'; setTimeout(() => { el.textContent = ''; }, 2000); }
}

function saveCustomTargetsForm() {
  const raw = document.getElementById('sp-custom-targets')?.value || '';
  const arr = raw.split(/[\n,]/).map(t => t.trim().toLowerCase()).filter(Boolean);
  saveCustomTargets(arr);
  reScoreAll();
  updateNavCounts();
  const el = document.getElementById('suggest-co-status');
  if (el) { el.style.color = 'var(--teal)'; el.textContent = `Saved ${arr.length} custom targets — contacts re-scored ✓`; }
  renderSetupTab();
  if (activeTab === 'contacts') renderContactsList();
}

async function suggestTargetCompanies() {
  const cfg = getAIConfig();
  const statusEl = document.getElementById('suggest-co-status');
  const resultsEl = document.getElementById('suggest-co-results');
  const btn = document.getElementById('suggest-co-btn');
  if (!cfg.apiKey && cfg.provider !== 'ollama') {
    if (statusEl) statusEl.textContent = 'Add an AI key in AI Settings to use this feature.';
    return;
  }
  const p = state.profile;
  if (!p.target && !p.bg && !p.currentLevel) {
    if (statusEl) statusEl.textContent = 'Fill in your profile (target role, background) first.';
    return;
  }
  if (btn) btn.disabled = true;
  if (statusEl) { statusEl.style.color = 'var(--muted)'; statusEl.textContent = 'Thinking…'; }
  if (resultsEl) resultsEl.style.display = 'none';

  const prompt = `You are helping a senior professional identify the best target companies for their job search.

THEIR PROFILE:
Role/level: ${p.currentLevel || ''}
Target: ${p.target || ''}
Background: ${p.bg || ''}
Company type preference: ${p.companyType || 'any'}
Location: ${p.location || 'India'}
Why looking: ${p.whyLooking || ''}
Current company (exclude this): ${p.currentCompany || ''}

TASK: Suggest 15 specific companies that are an excellent fit for this person's job search.
Focus on companies that:
1. Hire for roles like "${p.target || p.currentLevel || 'senior product manager'}"
2. Match the company type preference: ${p.companyType || 'any size'}
3. Are realistic targets (not too large/small for their level)
4. Are in ${p.location || 'India'} or hire remotely

Return ONLY a JSON array of company names (no descriptions, no markdown):
["Company A", "Company B", "Company C", ...]`;

  try {
    const raw = await callAI(prompt, 600);
    const match = raw.match(/\[[\s\S]*?\]/);
    if (!match) throw new Error('No array found in response');
    const suggestions = JSON.parse(match[0]).filter(Boolean);
    const existing = [...state.TARGET_COS];
    if (btn) btn.disabled = false;
    if (statusEl) { statusEl.style.color = 'var(--teal)'; statusEl.textContent = `${suggestions.length} suggestions ready`; }
    if (resultsEl) {
      resultsEl.style.display = 'block';
      resultsEl.innerHTML = `
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">Select companies to add to your target list:</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
          ${suggestions.map((co, i) => {
            const already = existing.some(t => co.toLowerCase().includes(t) || t.includes(co.toLowerCase()));
            return `<label style="display:inline-flex;align-items:center;gap:5px;font-size:13px;padding:4px 10px;
              border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--surface2)">
              <input type="checkbox" class="co-suggestion-cb" value="${h(co)}" ${already?'':'checked'}>
              ${h(co)}${already?' <span style="color:var(--teal);font-size:11px">✓ in list</span>':''}
            </label>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="addSuggestedCompanies()">Add selected to my list</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('suggest-co-results').style.display='none'">Dismiss</button>
        </div>`;
    }
  } catch(e) {
    if (btn) btn.disabled = false;
    if (statusEl) { statusEl.style.color = 'var(--red)'; statusEl.textContent = 'Error: ' + e.message.slice(0, 60); }
  }
}

function addSuggestedCompanies() {
  const cbs = document.querySelectorAll('.co-suggestion-cb:checked');
  const newCos = Array.from(cbs).map(cb => cb.value.toLowerCase().trim()).filter(Boolean);
  if (!newCos.length) return;
  const merged = [...new Set([...state.TARGET_COS, ...newCos])];
  saveCustomTargets(merged);
  // Update textarea
  const ta = document.getElementById('sp-custom-targets');
  if (ta) ta.value = merged.join('\n');
  reScoreAll();
  updateNavCounts();
  const statusEl = document.getElementById('suggest-co-status');
  if (statusEl) { statusEl.style.color = 'var(--teal)'; statusEl.textContent = `Added ${newCos.length} companies — contacts re-scored ✓`; }
  document.getElementById('suggest-co-results').style.display = 'none';
  if (activeTab === 'contacts') renderContactsList();
}

function saveAISettings() {
  const provider = document.getElementById('sp-ai-provider')?.value || 'anthropic';
  const model    = document.getElementById('sp-ai-model')?.value?.trim() || '';
  const key      = document.getElementById('sp-apikey')?.value?.trim() || '';
  const baseurl  = document.getElementById('sp-ai-baseurl')?.value?.trim() || '';
  localStorage.setItem(LS.ai_provider, provider);
  if (model)   localStorage.setItem(LS.ai_model, model);
  else         localStorage.removeItem(LS.ai_model);
  if (key)     setApiKey(key);
  if (baseurl) localStorage.setItem(LS.ai_baseurl, baseurl);
  // Save ranked location preferences
  const locPrefs = [0,1,2].map(i => (document.getElementById(`sp-loc-pref-${i}`)?.value?.trim() || '')).filter(Boolean);
  localStorage.setItem(LS.job_loc_prefs, JSON.stringify(locPrefs));
  // Keep legacy job_location as first preference for LinkedIn URL construction
  if (locPrefs[0]) localStorage.setItem(LS.job_location, locPrefs[0]);
  const el = document.getElementById('ai-save-status');
  if (el) { el.textContent = 'Saved ✓'; setTimeout(() => { el.textContent = ''; }, 2000); }
}

function updateAIProviderUI() {
  const provider = document.getElementById('sp-ai-provider')?.value || 'anthropic';
  const defaults = AI_DEFAULTS[provider] || AI_DEFAULTS.anthropic;
  const modelInput   = document.getElementById('sp-ai-model');
  const baseurlRow   = document.getElementById('sp-baseurl-row');
  const apikeyRow    = document.getElementById('sp-apikey-row');
  if (modelInput && !modelInput.value) modelInput.placeholder = defaults.model;
  if (baseurlRow) baseurlRow.style.display = (provider === 'ollama' || provider === 'custom') ? '' : 'none';
  if (apikeyRow)  apikeyRow.style.display  = provider === 'ollama' ? 'none' : '';
  const baseurlInput = document.getElementById('sp-ai-baseurl');
  if (baseurlInput && !baseurlInput.value) baseurlInput.placeholder = defaults.baseurl;
}

async function handleZipInput(input) {
  const file = input.files[0];
  if (!file) return;
  handleZipFile(file);
}

function handleZipDrop(event) {

}

async function handleZipFile(file) {
  const statusEl = document.getElementById('zip-status');
  if (statusEl) statusEl.innerHTML = `<div class="banner banner-info">Processing ${h(file.name)}…</div>`;
  try {
    const results = await processZipFile(file);
    let added=0, merged=0, loaded=[];
    results.forEach(r => {
      if (r.error) { fileStatuses[r.type] = 'failed'; }
      else {
        fileStatuses[r.type] = 'loaded';
        loaded.push(r.type);
        if (r.result?.added)  added  += r.result.added;
        if (r.result?.merged) merged += r.result.merged;
      }
    });
    updateNavCounts();
    const aCount = state.contacts.filter(c => c.grade==='A').length;
    const bCount = state.contacts.filter(c => c.grade==='B').length;
    const msg = `${state.contacts.length} contacts loaded — ${aCount} Grade A · ${bCount} Grade B${merged ? ` · ${merged} merged` : ''}`;
    localStorage.setItem(LS.onboarded, '1');
    localStorage.setItem(LS.last_import, new Date().toISOString().slice(0,10));
    importBanner = { msg, type: 'success' };
    // Offer memory cleanup if message data was loaded (it can be 3-5MB)
    const msgCount = Object.keys(state.MSG_LOOKUP).length;
    if (msgCount > 0) {
      importBanner.memOffer = true;
    }
    renderSetupTab();
    if (activeTab === 'contacts') { renderContactsTab(); } else { renderContactsList(); }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<div class="banner banner-error">${h(e.message)}</div>`;
  }
}

async function handleSingleFile(type, input) {
  const file = input.files[0];
  if (!file) return;
  clearSampleData();
  try {
    const text = await file.text();
    const result = processFile(file.name, text);
    fileStatuses[type] = 'loaded';
    updateNavCounts();
    const el = document.getElementById(`fstat-${type}`);
    if (el) { el.className = 'file-status loaded'; el.textContent = '✓ Loaded'; }
    let msg = `${file.name} loaded`;
    if (result?.added)  msg += ` — ${result.added} added`;
    if (result?.merged) msg += `, ${result.merged} merged`;
    if (result?.total)  msg += ` (${result.total} total)`;
    importBanner = { msg, type: 'success' };
    localStorage.setItem(LS.onboarded, '1');
    renderSetupTab();
    if (activeTab === 'contacts') { renderContactsTab(); } else { renderContactsList(); }
  } catch(e) {
    fileStatuses[type] = 'failed';
    const el = document.getElementById(`fstat-${type}`);
    if (el) { el.className = 'file-status failed'; el.textContent = '✗ Failed'; }
    alert(`Error processing ${file.name}: ${e.message}`);
  }
}

function getFilteredContacts() {
  let list = [...state.contacts];
  const { grade, status, relationship, search, targetOnly, company } = contactFilters;
  if (grade === 'AB') list = list.filter(c => c.grade === 'A' || c.grade === 'B');
  else if (grade)     list = list.filter(c => c.grade === grade);
  // Target company filter — restrict to contacts whose company is in TARGET_COS
  if (targetOnly || company) {
    list = list.filter(c => {
      const co = (c.company || '').toLowerCase().trim();
      return co && state.TARGET_COS.some(t => co.includes(t));
    });
  }
  // Company sub-filter — drill down to a specific company
  if (company) {
    list = list.filter(c => (c.company || '').toLowerCase().includes(company));
  }
  if (status)       list = list.filter(c => c.status === status);
  if (relationship) list = list.filter(c => (c.relationship || '').toLowerCase().includes(relationship.toLowerCase()));
  if (search) {
    const q = search.toLowerCase();
    list = list.filter(c =>
      (c.name    || '').toLowerCase().includes(q) ||
      (c.company || '').toLowerCase().includes(q) ||
      (c.role    || '').toLowerCase().includes(q)
    );
  }
  const gradeOrder = { A: 0, B: 1, C: 2 };
  list.sort((a, b) => {
    const ga = gradeOrder[a.grade] ?? 2;
    const gb = gradeOrder[b.grade] ?? 2;
    if (ga !== gb) return ga - gb;
    return (b.score || 0) - (a.score || 0);
  });
  return list;
}
